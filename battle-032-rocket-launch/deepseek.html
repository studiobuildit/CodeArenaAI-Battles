<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Rocket Launch - Deepseek</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}body{display:flex;align-items:center;justify-content:center}canvas{display:block}</style></head><body><canvas id="c"></canvas><script>
(()=>{const W=540,H=960,c=document.getElementById("c"),x=c.getContext("2d"),TA=Math.PI*2,r=(a,b)=>a+Math.random()*(b-a);let d=1,s=1;function rs(){const vw=innerWidth,vh=innerHeight;s=Math.min(vw/W,vh/H);const cw=W*s,ch=H*s;d=Math.max(1,Math.min(3,devicePixelRatio||1));c.style.width=cw+"px";c.style.height=ch+"px";c.width=cw*d;c.height=ch*d;x.setTransform(d*s,0,0,d*s,0,0)}addEventListener("resize",rs,{passive:true});rs();
const S={COUNT:0,LIFT:1,ASC:2,SEP:3,SPACE:4,RESET:5};let st=S.COUNT,cd=5,ct=40,t=0,alt=0,vy=0,rx=W/2,ry=H-180,prog=0,reset=0;
let boosters=[{x:rx-24,y:ry+28,a:true,ox:-24,oy:28},{x:rx+24,y:ry+28,a:true,ox:24,oy:28}],sm=[],fl=[],stars=[];for(let i=0;i<200;i++)stars.push({x:r(0,W),y:r(0,H),s:r(.6,2.4),a:r(.2,1),tw:r(0,TA)});
function smoke(n){for(let i=0;i<n;i++)sm.push({x:rx+r(-16,16),y:ry+35+r(-5,5),vx:r(-1.2,1.2),vy:r(1,3),r:r(8,20),l:r(20,60)})}
function flame(n){for(let i=0;i<n;i++)fl.push({x:rx+r(-10,10),y:ry+36,vx:r(-2,2),vy:r(2,8),r:r(2,6),l:r(12,32)})}
function update(){t++;if(st===S.COUNT){if(ct--<=0){cd--;ct=45;if(cd<0){st=S.LIFT;}}smoke(2);}
else if(st===S.LIFT){vy-=0.65;ry+=vy;flame(10);smoke(10);prog=Math.min(1,(H-ry)/700);if(ry<H-380)st=S.ASC;if(ry<200)ry=200;}
else if(st===S.ASC){vy-=0.38;ry+=vy;flame(7);smoke(4);prog=Math.min(1,(H-ry)/700);if(ry<H-520&&boosters[0].a){st=S.SEP;}if(ry<60){ry=60;st=S.SPACE;}}
else if(st===S.SEP){vy-=0.32;ry+=vy;flame(6);for(const b of boosters){if(b.a)b.a=false;b.x+=(b.ox>0?1.8:-1.8);b.y+=1.5;}prog=Math.min(1,(H-ry)/700);if(++reset>55){st=S.ASC;reset=0;}}
else if(st===S.SPACE){prog=1;flame(3);if(++reset>220){st=S.RESET;reset=90;}}
else if(st===S.RESET){if(--reset<=0){st=S.COUNT;cd=5;ct=40;alt=0;vy=0;ry=H-180;prog=0;boosters=[{x:rx-24,y:ry+28,a:true,ox:-24,oy:28},{x:rx+24,y:ry+28,a:true,ox:24,oy:28}];sm=[];fl=[];}}
for(let i=sm.length-1;i>=0;i--){const p=sm[i];p.x+=p.vx;p.y+=p.vy;p.r+=.22;p.l--;if(p.l<=0)sm.splice(i,1)}
for(let i=fl.length-1;i>=0;i--){const p=fl[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.l--;if(p.l<=0)fl.splice(i,1)}
alt=Math.max(0,(H-180-ry)*10);for(const s of stars)s.tw+=.03;
}
function draw(){const p=prog,top=`rgb(${Math.floor((1-p)*42)},${Math.floor((1-p)*26)},${Math.floor(40+(1-p)*70)})`,bot=`rgb(${Math.floor((1-p)*90)},${Math.floor((1-p)*60)},${Math.floor(100+(1-p)*90)})`;const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,top);g.addColorStop(1,bot);x.fillStyle=g;x.fillRect(0,0,W,H);
if(p>.25){for(const s of stars){x.fillStyle=`rgba(255,240,200,${Math.max(0,(p-.2)/.8)*s.a*(.6+Math.sin(s.tw)*.3)})`;x.beginPath();x.arc(s.x,s.y,s.s,0,TA);x.fill();}}
if(p<.5){x.fillStyle="#2a4a2a";x.fillRect(0,H-80,W,80);x.fillStyle="#5a5a4a";x.fillRect(rx-30,H-82,60,12);}
for(const q of sm){x.globalAlpha=q.l/60;x.fillStyle="rgba(140,140,150,.45)";x.beginPath();x.arc(q.x,q.y,q.r,0,TA);x.fill();}x.globalAlpha=1;
for(const q of fl){x.globalAlpha=q.l/32;x.fillStyle="#ff8a22";x.beginPath();x.arc(q.x,q.y,q.r,0,TA);x.fill();}x.globalAlpha=1;
x.save();x.translate(rx,ry);x.fillStyle="#e0e8f0";x.fillRect(-9,-27,18,54);x.fillStyle="#ff6644";x.beginPath();x.moveTo(-9,-27);x.lineTo(0,-43);x.lineTo(9,-27);x.fill();x.fillStyle="#88ccff";x.beginPath();x.arc(0,-14,5,0,TA);x.fill();x.restore();
for(const b of boosters){if(b.a||b.y<H+50){x.fillStyle="#b8a88a";x.fillRect((b.a?rx+b.ox:b.x)-6,(b.a?ry+b.oy:b.y)-12,12,28);}}
if(st===S.COUNT&&cd>0){x.font="bold 56px Courier New";x.fillStyle="#ffcc88";x.textAlign="center";x.fillText(cd,W/2,H/2-60);x.font="20px monospace";x.fillStyle="#ffaa66";x.fillText("LAUNCH SEQUENCE",W/2,H/2+20);x.textAlign="start";}
x.fillStyle="#0f0";x.font="14px monospace";x.fillText(`ALT ${Math.floor(alt)} m`,16,24);
}
function loop(){update();draw();requestAnimationFrame(loop)}loop();
})();
</script></body></html>
