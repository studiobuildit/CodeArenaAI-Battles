<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campfire Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            margin: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: black;
        }
        canvas { 
            width: 100vw; 
            height: 100vh; 
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const W = 540;
        const H = 960;
        
        let dpr = window.devicePixelRatio || 1;
        let vpw, vph;
        
        function resize() {
            vpw = window.innerWidth;
            vph = window.innerHeight;
            dpr = window.devicePixelRatio || 1;
            canvas.width = vpw * dpr;
            canvas.height = vph * dpr;
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }
        
        const stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: random(0, W),
                y: random(0, H * 0.6),
                size: random(0.5, 2),
                alpha: random(0.3, 1),
                twinkleSpeed: random(0.02, 0.05)
            });
        }
        
        const flames = [];
        const embers = [];
        const smoke = [];
        const maxFlames = 60;
        const maxEmbers = 40;
        const maxSmoke = 30;
        
        const fireX = W / 2;
        const fireY = H * 0.75;
        const fireBaseWidth = 80;
        
        class FlameParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = fireX + random(-fireBaseWidth/3, fireBaseWidth/3);
                this.y = fireY - random(0, 20);
                this.vx = random(-0.5, 0.5);
                this.vy = random(-2, -4);
                this.life = 1;
                this.decay = random(0.01, 0.03);
                this.size = random(20, 50);
                this.hue = random(10, 40);
                this.saturation = random(80, 100);
            }
            update() {
                this.x += this.vx + random(-0.3, 0.3);
                this.y += this.vy;
                this.vx *= 0.98;
                this.life -= this.decay;
                this.size *= 0.98;
                this.hue += random(-1, 1);
                if (this.life <= 0 || this.size < 5) this.reset();
            }
            draw(ctx) {
                const alpha = this.life * 0.8;
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `hsla(${this.hue}, ${this.saturation}%, 60%, ${alpha})`);
                gradient.addColorStop(0.4, `hsla(${this.hue - 10}, ${this.saturation}%, 50%, ${alpha * 0.6})`);
                gradient.addColorStop(1, `hsla(${this.hue - 20}, ${this.saturation}%, 40%, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        class EmberParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = fireX + random(-30, 30);
                this.y = fireY - random(10, 40);
                this.vx = random(-1, 1);
                this.vy = random(-1, -3);
                this.life = 1;
                this.decay = random(0.005, 0.015);
                this.size = random(1, 4);
                this.wobble = random(0, Math.PI * 2);
                this.wobbleSpeed = random(0.05, 0.1);
            }
            update() {
                this.wobble += this.wobbleSpeed;
                this.x += this.vx + Math.sin(this.wobble) * 0.5;
                this.y += this.vy;
                this.life -= this.decay;
                this.size *= 0.995;
                if (this.life <= 0 || this.y < 0) this.reset();
            }
            draw(ctx) {
                ctx.fillStyle = `rgba(255, ${Math.floor(100 + this.life * 100)}, 50, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        class SmokeParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = fireX + random(-20, 20);
                this.y = fireY - random(40, 80);
                this.vx = random(-0.3, 0.3);
                this.vy = random(-0.5, -1.5);
                this.life = 1;
                this.decay = random(0.003, 0.008);
                this.size = random(10, 30);
                this.wobble = random(0, Math.PI * 2);
                this.wobbleSpeed = random(0.02, 0.05);
            }
            update() {
                this.wobble += this.wobbleSpeed;
                this.x += this.vx + Math.sin(this.wobble) * 0.3;
                this.y += this.vy;
                this.life -= this.decay;
                this.size *= 1.005;
                if (this.life <= 0 || this.y < 0) this.reset();
            }
            draw(ctx) {
                ctx.fillStyle = `rgba(80, 80, 80, ${this.life * 0.3})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        for (let i = 0; i < maxFlames; i++) flames.push(new FlameParticle());
        for (let i = 0; i < maxEmbers; i++) embers.push(new EmberParticle());
        for (let i = 0; i < maxSmoke; i++) smoke.push(new SmokeParticle());
        
        function drawSky(ctx) {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#050714');
            gradient.addColorStop(0.5, '#0a0f1e');
            gradient.addColorStop(1, '#14182b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            for (const star of stars) {
                star.alpha += Math.sin(Date.now() * star.twinkleSpeed) * 0.01;
                star.alpha = Math.max(0.2, Math.min(1, star.alpha));
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawGround(ctx) {
            const gradient = ctx.createLinearGradient(0, H * 0.65, 0, H);
            gradient.addColorStop(0, '#1a1510');
            gradient.addColorStop(0.3, '#0f0c09');
            gradient.addColorStop(1, '#050403');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, H * 0.65, W, H * 0.35);
        }
        
        function drawGlow(ctx) {
            const gradient = ctx.createRadialGradient(
                fireX, fireY, 0,
                fireX, fireY, 200
            );
            gradient.addColorStop(0, 'rgba(255, 100, 30, 0.4)');
            gradient.addColorStop(0.3, 'rgba(255, 80, 20, 0.2)');
            gradient.addColorStop(0.6, 'rgba(255, 60, 10, 0.05)');
            gradient.addColorStop(1, 'rgba(255, 40, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(fireX - 200, fireY - 100, 400, 300);
        }
        
        function drawLogs(ctx) {
            ctx.save();
            ctx.fillStyle = '#3d2817';
            ctx.strokeStyle = '#2a1b0f';
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.ellipse(fireX - 50, fireY + 15, 70, 20, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.ellipse(fireX + 50, fireY + 15, 70, 20, 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#4a3020';
            ctx.beginPath();
            ctx.ellipse(fireX, fireY + 5, 60, 18, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#5c3d2a';
            ctx.beginPath();
            ctx.arc(fireX - 110, fireY + 35, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(fireX + 110, fireY + 35, 12, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#2a1b0f';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(fireX - 80, fireY + 15);
            ctx.lineTo(fireX - 20, fireY + 15);
            ctx.moveTo(fireX + 20, fireY + 15);
            ctx.lineTo(fireX + 80, fireY + 15);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function animate() {
            ctx.setTransform((vpw/W)*dpr, 0, 0, (vph/H)*dpr, 0, 0);
            ctx.clearRect(0, 0, W, H);
            
            drawSky(ctx);
            drawGround(ctx);
            drawGlow(ctx);
            
            for (const p of smoke) { p.update(); p.draw(ctx); }
            drawLogs(ctx);
            for (const p of flames) { p.update(); p.draw(ctx); }
            for (const p of embers) { p.update(); p.draw(ctx); }
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
