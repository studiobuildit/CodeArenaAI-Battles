<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campfire Night</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

const flames = [];
const embers = [];
const smoke = [];
const stars = [];

for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random()*W,
    y: Math.random()*H*0.5,
    a: Math.random()
  });
}

function spawnFlame() {
  flames.push({
    x: W/2 + (Math.random()-0.5)*40,
    y: H-180,
    vx: (Math.random()-0.5)*0.8,
    vy: -2 - Math.random()*2,
    life: 60,
    size: 10 + Math.random()*10
  });
}

function spawnEmber() {
  embers.push({
    x: W/2 + (Math.random()-0.5)*30,
    y: H-180,
    vx: (Math.random()-0.5)*1,
    vy: -2 - Math.random()*1,
    life: 80
  });
}

function spawnSmoke() {
  smoke.push({
    x: W/2 + (Math.random()-0.5)*20,
    y: H-200,
    vx: (Math.random()-0.5)*0.5,
    vy: -1 - Math.random()*0.5,
    life: 120,
    size: 20 + Math.random()*20
  });
}

function update() {
  if (Math.random() < 0.6) spawnFlame();
  if (Math.random() < 0.1) spawnEmber();
  if (Math.random() < 0.05) spawnSmoke();

  flames.forEach(f => {
    f.x += f.vx;
    f.y += f.vy;
    f.life--;
  });

  embers.forEach(e => {
    e.x += e.vx;
    e.y += e.vy;
    e.life--;
  });

  smoke.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.life--;
  });

  for (let arr of [flames, embers, smoke]) {
    for (let i = arr.length-1; i >= 0; i--) {
      if (arr[i].life <= 0) arr.splice(i,1);
    }
  }
}

function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#02020a");
  g.addColorStop(1,"#000000");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function drawStars() {
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(Date.now()*0.002+s.a)*0.5})`;
    ctx.fillRect(s.x, s.y, 2, 2);
  });
}

function drawGroundGlow() {
  const g = ctx.createRadialGradient(W/2, H-180, 0, W/2, H-180, 200);
  g.addColorStop(0,"rgba(255,140,0,0.5)");
  g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function drawLogs() {
  ctx.fillStyle = "#3b2a1a";
  ctx.fillRect(W/2-60, H-160, 120, 20);
  ctx.fillRect(W/2-50, H-140, 100, 20);
}

function drawFlames() {
  flames.forEach(f => {
    const alpha = f.life / 60;
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size);
    g.addColorStop(0, `rgba(255,200,50,${alpha})`);
    g.addColorStop(0.5, `rgba(255,100,0,${alpha})`);
    g.addColorStop(1, "rgba(255,0,0,0)");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawEmbers() {
  embers.forEach(e => {
    ctx.fillStyle = `rgba(255,150,50,${e.life/80})`;
    ctx.beginPath();
    ctx.arc(e.x, e.y, 2, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawSmoke() {
  smoke.forEach(s => {
    ctx.fillStyle = `rgba(200,200,200,${s.life/120*0.3})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
  });
}

function draw() {
  drawSky();
  drawStars();
  drawGroundGlow();
  drawLogs();
  drawFlames();
  drawEmbers();
  drawSmoke();
}

function animate() {
  update();

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw/W)*dpr, 0, 0, (vph/H)*dpr, 0, 0);

  draw();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
