<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tetris Infinite Loop</title>
<style>
      body {
        margin: 0;
        background: #0d0d0d;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        background: #111;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
      }
    </style>
    </head>
    <body>
    
    <canvas id="tetris" width="300" height="600"></canvas>
    
    <script>
    const canvas = document.getElementById("tetris");
    const ctx = canvas.getContext("2d");
    
    const COLS = 10;
    const ROWS = 20;
    const SIZE = 30;
    
    const colors = [
      null,
      "#FF4C4C", // Z
      "#4CFF4C", // S
      "#4C4CFF", // J
      "#FFFF4C", // O
      "#FF4CFF", // T
      "#4CFFFF", // I
      "#FFA500"  // L
    ];
    
    const pieces = [
      [],
      [[1,1,0],[0,1,1]],      // Z
      [[0,2,2],[2,2,0]],      // S
      [[3,0,0],[3,3,3]],      // J
      [[4,4],[4,4]],          // O
      [[0,5,0],[5,5,5]],      // T
      [[6,6,6,6]],            // I
      [[0,0,7],[7,7,7]]       // L
    ];
    
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * SIZE, y * SIZE, SIZE - 1, SIZE - 1);
    }
    
    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      board.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) drawCell(x, y, colors[value]);
        });
      });
    }
    
    function merge(piece) {
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            board[y + piece.y][x + piece.x] = value;
          }
        });
      });
    }
    
    function collide(piece) {
      return piece.shape.some((row, y) =>
        row.some((value, x) =>
          value &&
          (board[y + piece.y] &&
           board[y + piece.y][x + piece.x]) !== 0
        )
      );
    }
    
    function clearLines() {
      for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(v => v !== 0)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(0));
          y++;
        }
      }
    }
    
    function createPiece() {
      const type = Math.floor(Math.random() * (pieces.length - 1)) + 1;
      return {
        shape: pieces[type],
        x: Math.floor(COLS / 2) - 1,
        y: 0
      };
    }
    
    let current = createPiece();
    let dropCounter = 0;
    let dropInterval = 500;
    let lastTime = 0;
    
    function drawPiece(piece) {
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            drawCell(x + piece.x, y + piece.y, colors[value]);
          }
        });
      });
    }
    
    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;
    
      if (dropCounter > dropInterval) {
        current.y++;
        if (collide(current)) {
          current.y--;
          merge(current);
          clearLines();
          current = createPiece();
    
          // reset if overflow (loop effect)
          if (collide(current)) {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
          }
        }
        dropCounter = 0;
      }
    
      drawBoard();
      drawPiece(current);
      requestAnimationFrame(update);
    }
    
    update();
    </script>
    
</body>
</html>
