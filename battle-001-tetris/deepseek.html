<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>✨ TETRIS INFINITY ✨ | Satisfying Line Clear Loop</title>
        <style>
            * {
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }
    
            body {
                background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: 'Segoe UI', 'Courier New', 'Fira Code', monospace;
                margin: 0;
                padding: 20px;
            }
    
            .game-container {
                background: rgba(0, 0, 0, 0.55);
                backdrop-filter: blur(3px);
                border-radius: 2.5rem;
                padding: 1.2rem 2rem 1.8rem 2rem;
                box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
    
            canvas {
                display: block;
                margin: 0 auto;
                border-radius: 1.2rem;
                box-shadow: 0 0 0 2px #2a2f3f, 0 15px 30px rgba(0, 0, 0, 0.6);
                background-color: #0a0c14;
                cursor: pointer;
            }
    
            .info-panel {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-top: 1.3rem;
                gap: 2rem;
                flex-wrap: wrap;
                justify-content: center;
            }
    
            .score-card {
                background: #0f121cb3;
                backdrop-filter: blur(4px);
                padding: 0.4rem 1.2rem;
                border-radius: 3rem;
                font-weight: bold;
                font-size: 1.6rem;
                letter-spacing: 2px;
                color: #f2e9c7;
                text-shadow: 0 2px 3px #00000050;
                border: 1px solid #ffd96650;
                font-family: monospace;
            }
    
            .score-card span {
                color: #ffd966;
                font-size: 2rem;
                margin-right: 0.4rem;
            }
    
            .controls {
                background: #0f121cb3;
                backdrop-filter: blur(4px);
                padding: 0.3rem 1.2rem;
                border-radius: 2rem;
                font-size: 0.85rem;
                color: #bbd9ff;
                display: flex;
                gap: 1rem;
                font-weight: 500;
            }
    
            .controls kbd {
                background: #1e2436;
                border-radius: 0.5rem;
                padding: 0.2rem 0.6rem;
                font-weight: bold;
                color: #fcd34d;
                margin: 0 0.2rem;
                box-shadow: inset 0 -1px 0 #00000055, 0 1px 0 #ffffff30;
            }
    
            button {
                background: #2c354b;
                border: none;
                color: white;
                font-weight: bold;
                font-family: monospace;
                font-size: 1rem;
                padding: 0.3rem 1.2rem;
                border-radius: 2rem;
                cursor: pointer;
                transition: 0.1s linear;
                box-shadow: 0 4px 0 #0b0e16;
            }
    
            button:active {
                transform: translateY(2px);
                box-shadow: 0 1px 0 #0b0e16;
            }
    
            @keyframes pulse {
                0% { text-shadow: 0 0 0px #ffd966; }
                100% { text-shadow: 0 0 8px #ffb347; }
            }
    
            .line-clear-effect {
                animation: pulse 0.2s ease-in-out 2;
            }
    
            @media (max-width: 550px) {
                .game-container {
                    padding: 1rem;
                }
                .controls {
                    font-size: 0.7rem;
                    gap: 0.5rem;
                }
                .score-card {
                    font-size: 1.2rem;
                }
            }
        </style>
    </head>
    <body>
    <div>
        <div class="game-container">
            <canvas id="tetrisCanvas" width="300" height="600"></canvas>
            <div class="info-panel">
                <div class="score-card"><span>🎯</span> <span id="scoreValue">0</span></div>
                <div class="controls">
                    <span><kbd>←</kbd> <kbd>→</kbd></span>
                    <span><kbd>↑</kbd> rotate</span>
                    <span><kbd>↓</kbd> soft</span>
                    <span><kbd>Space</kbd> hard</span>
                    <span><kbd>R</kbd> restart</span>
                </div>
                <button id="restartButton">🔄 RESTART</button>
            </div>
        </div>
    </div>
    
    <script>
        (function(){
            // -------------------- TETRIS CORE --------------------
            const canvas = document.getElementById('tetrisCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreValue');
    
            // Grid dimensions
            const COLS = 10;
            const ROWS = 20;
            const BLOCK_SIZE = canvas.width / COLS; // 30px
            
            // Game state
            let board = Array(ROWS).fill().map(() => Array(COLS).fill(0)); // 0 = empty, >0 = color index
            let activePiece = null;
            let nextPiece = null;
            let score = 0;
            let gameOver = false;
            let animationFrameId = null;
            let fallInterval = null;
            let baseFallDelay = 450; // ms per fall step
            let currentFallDelay = baseFallDelay;
            
            // Line clear animation flag (visual satisfaction)
            let linesClearing = false;
            let linesToClearIndices = [];
            let clearFlashTimer = null;
            
            // -------------------- TETROMINO SHAPES & COLORS --------------------
            const TETROMINOS = [
                {   // I
                    shape: [[1,1,1,1]],
                    color: '#2dd4bf' // teal cyan
                },
                {   // O
                    shape: [[1,1],[1,1]],
                    color: '#facc15' // golden yellow
                },
                {   // T
                    shape: [[0,1,0],[1,1,1]],
                    color: '#c084fc' // soft purple
                },
                {   // S
                    shape: [[0,1,1],[1,1,0]],
                    color: '#4ade80' // fresh green
                },
                {   // Z
                    shape: [[1,1,0],[0,1,1]],
                    color: '#f87171' // coral red
                },
                {   // L
                    shape: [[1,0,0],[1,1,1]],
                    color: '#fb923c' // orange
                },
                {   // J
                    shape: [[0,0,1],[1,1,1]],
                    color: '#60a5fa' // ocean blue
                }
            ];
            
            // Helper: random piece
            function getRandomTetromino() {
                const idx = Math.floor(Math.random() * TETROMINOS.length);
                const original = TETROMINOS[idx];
                // deep copy shape matrix
                const shapeCopy = original.shape.map(row => [...row]);
                return {
                    shape: shapeCopy,
                    color: original.color,
                    colorIndex: idx+1   // 1..7 for board ref
                };
            }
            
            // Rotate shape matrix (clockwise)
            function rotateShapeClockwise(shape) {
                const rows = shape.length, cols = shape[0].length;
                const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        rotated[j][rows - 1 - i] = shape[i][j];
                    }
                }
                return rotated;
            }
            
            // Check collision between piece shape and board at (offsetX, offsetY)
            function collides(shape, offsetX, offsetY) {
                for (let r = 0; r < shape.length; r++) {
                    for (let c = 0; c < shape[0].length; c++) {
                        if (shape[r][c] !== 0) {
                            const boardX = offsetX + c;
                            const boardY = offsetY + r;
                            if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) {
                                return true;
                            }
                            if (boardY >= 0 && board[boardY][boardX] !== 0) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            // Spawn a new piece from nextPiece or generate
            function spawnNewPiece() {
                if (!nextPiece) {
                    nextPiece = getRandomTetromino();
                }
                // active gets the prepared next piece
                const newPiece = {
                    shape: nextPiece.shape.map(row => [...row]),
                    color: nextPiece.color,
                    colorIndex: nextPiece.colorIndex,
                    x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                    y: 0
                };
                // generate next piece for future
                nextPiece = getRandomTetromino();
                
                activePiece = newPiece;
                
                // collision after spawn => game over condition
                if (collides(activePiece.shape, activePiece.x, activePiece.y)) {
                    gameOver = true;
                    if (fallInterval) clearInterval(fallInterval);
                    fallInterval = null;
                    activePiece = null;
                    return false;
                }
                return true;
            }
            
            // Merge active piece into the board grid
            function mergePiece() {
                if (!activePiece) return;
                for (let r = 0; r < activePiece.shape.length; r++) {
                    for (let c = 0; c < activePiece.shape[0].length; c++) {
                        if (activePiece.shape[r][c] !== 0) {
                            const boardX = activePiece.x + c;
                            const boardY = activePiece.y + r;
                            if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                                board[boardY][boardX] = activePiece.colorIndex;
                            }
                        }
                    }
                }
                
                // --- LINE CLEARING with satisfaction & effect ---
                const rowsCleared = [];
                for (let row = 0; row < ROWS; row++) {
                    let full = true;
                    for (let col = 0; col < COLS; col++) {
                        if (board[row][col] === 0) {
                            full = false;
                            break;
                        }
                    }
                    if (full) rowsCleared.push(row);
                }
                
                if (rowsCleared.length > 0) {
                    // Apply line clearing visual delay (satisfying)
                    linesClearing = true;
                    linesToClearIndices = rowsCleared;
                    // Clear lines after a tiny flash effect but before actual board update
                    // We'll animate a white flash then remove rows and shift
                    if (clearFlashTimer) clearTimeout(clearFlashTimer);
                    // First, mark for visual flash & update board after brief moment
                    clearFlashTimer = setTimeout(() => {
                        // perform actual removal and shifting
                        for (let i = rowsCleared.length - 1; i >= 0; i--) {
                            const rowIndex = rowsCleared[i];
                            // shift everything above down
                            for (let r = rowIndex; r > 0; r--) {
                                board[r] = [...board[r-1]];
                            }
                            board[0] = Array(COLS).fill(0);
                        }
                        // Update score: classic scoring 100 * lines^2 (satisfying bursts)
                        const addScore = rowsCleared.length === 1 ? 100 :
                                         rowsCleared.length === 2 ? 250 :
                                         rowsCleared.length === 3 ? 450 : 700;
                        score += addScore;
                        updateScoreUI();
                        
                        // add a subtle DOM flash on score panel
                        const scoreElem = document.getElementById('scoreValue');
                        scoreElem.classList.add('line-clear-effect');
                        setTimeout(() => scoreElem.classList.remove('line-clear-effect'), 300);
                        
                        linesClearing = false;
                        linesToClearIndices = [];
                        // After line clear, spawn next piece
                        const success = spawnNewPiece();
                        if (!success) {
                            if (fallInterval) clearInterval(fallInterval);
                            fallInterval = null;
                        }
                        draw(); // immediate redraw after line clear
                    }, 45); // tiny delay to make flash visible, but smooth
                    
                    draw(); // draw flash effect before clear
                    return;
                } else {
                    // no line cleared -> spawn normally
                    const success = spawnNewPiece();
                    if (!success) {
                        if (fallInterval) clearInterval(fallInterval);
                        fallInterval = null;
                    }
                    draw();
                    return;
                }
            }
            
            // Move piece left/right
            function movePiece(dx) {
                if (!activePiece || gameOver || linesClearing) return false;
                const newX = activePiece.x + dx;
                if (!collides(activePiece.shape, newX, activePiece.y)) {
                    activePiece.x = newX;
                    draw();
                    return true;
                }
                return false;
            }
            
            // Rotate active piece
            function rotatePiece() {
                if (!activePiece || gameOver || linesClearing) return;
                const originalShape = activePiece.shape;
                const rotated = rotateShapeClockwise(originalShape);
                const oldX = activePiece.x;
                const oldY = activePiece.y;
                // try kick to left/right if needed (simple wall kicks)
                if (!collides(rotated, oldX, oldY)) {
                    activePiece.shape = rotated;
                    draw();
                    return;
                }
                // try shift left once
                if (!collides(rotated, oldX - 1, oldY)) {
                    activePiece.shape = rotated;
                    activePiece.x -= 1;
                    draw();
                    return;
                }
                // try shift right once
                if (!collides(rotated, oldX + 1, oldY)) {
                    activePiece.shape = rotated;
                    activePiece.x += 1;
                    draw();
                    return;
                }
                // optional: no kick further
            }
            
            // Hard drop
            function hardDrop() {
                if (!activePiece || gameOver || linesClearing) return;
                while (!collides(activePiece.shape, activePiece.x, activePiece.y + 1)) {
                    activePiece.y++;
                }
                // merge immediately after drop
                mergePiece();
                draw();
            }
            
            // Soft drop (move down one step, if can't then merge)
            function softDrop() {
                if (!activePiece || gameOver || linesClearing) return;
                if (!collides(activePiece.shape, activePiece.x, activePiece.y + 1)) {
                    activePiece.y++;
                    draw();
                } else {
                    // piece landed, merge and generate next
                    mergePiece();
                    draw();
                }
            }
            
            // Fall interval tick
            function fallTick() {
                if (gameOver || linesClearing) return;
                if (activePiece) {
                    if (!collides(activePiece.shape, activePiece.x, activePiece.y + 1)) {
                        activePiece.y++;
                        draw();
                    } else {
                        mergePiece();
                        draw();
                    }
                }
            }
            
            // UI update
            function updateScoreUI() {
                scoreSpan.innerText = score;
            }
            
            // -------------------- DRAW EVERYTHING (canvas with glow & satisfaction) --------------------
            function draw() {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw board grid background (dark)
                ctx.shadowBlur = 0;
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const cell = board[row][col];
                        const x = col * BLOCK_SIZE;
                        const y = row * BLOCK_SIZE;
                        if (cell !== 0) {
                            const color = TETROMINOS[cell-1]?.color || '#aaa';
                            ctx.fillStyle = color;
                            ctx.fillRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                            // Inner highlight
                            ctx.fillStyle = 'rgba(255,255,240,0.25)';
                            ctx.fillRect(x+1, y+1, BLOCK_SIZE-2.5, 3);
                            // subtle border
                            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                            ctx.strokeRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        } else {
                            // subtle grid
                            ctx.fillStyle = '#0f121f';
                            ctx.fillRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                            ctx.strokeStyle = '#202433';
                            ctx.strokeRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        }
                    }
                }
                
                // Draw flashing line clear effect (satisfying white overlay)
                if (linesClearing && linesToClearIndices.length > 0) {
                    for (let idx of linesToClearIndices) {
                        for (let c = 0; c < COLS; c++) {
                            const x = c * BLOCK_SIZE;
                            const y = idx * BLOCK_SIZE;
                            ctx.fillStyle = 'rgba(255, 255, 210, 0.8)';
                            ctx.fillRect(x, y, BLOCK_SIZE, BLOCK_SIZE);
                            ctx.fillStyle = 'rgba(255, 255, 180, 0.9)';
                            ctx.fillRect(x+2, y+2, BLOCK_SIZE-4, BLOCK_SIZE-4);
                        }
                    }
                }
                
                // Draw active piece with glow & shadow (vivid)
                if (activePiece && !gameOver) {
                    const shape = activePiece.shape;
                    for (let r = 0; r < shape.length; r++) {
                        for (let c = 0; c < shape[0].length; c++) {
                            if (shape[r][c] !== 0) {
                                const x = (activePiece.x + c) * BLOCK_SIZE;
                                const y = (activePiece.y + r) * BLOCK_SIZE;
                                ctx.shadowBlur = 8;
                                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                                ctx.fillStyle = activePiece.color;
                                ctx.fillRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                                ctx.shadowBlur = 0;
                                // brilliant inner shine
                                ctx.fillStyle = 'rgba(255, 250, 210, 0.5)';
                                ctx.fillRect(x+2, y+2, BLOCK_SIZE-5, 4);
                                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                                ctx.fillRect(x+1, y+1, BLOCK_SIZE-2, 3);
                                // border definition
                                ctx.strokeStyle = '#ffffff80';
                                ctx.strokeRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                            }
                        }
                    }
                }
                
                // Game over overlay
                if (gameOver) {
                    ctx.globalAlpha = 0.85;
                    ctx.fillStyle = '#010014';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.globalAlpha = 1;
                    ctx.font = 'bold 20px "Segoe UI", "Courier New", monospace';
                    ctx.fillStyle = '#ffd966';
                    ctx.shadowBlur = 0;
                    ctx.fillText('⚡ GAME OVER ⚡', canvas.width/2-100, canvas.height/2-20);
                    ctx.font = '14px monospace';
                    ctx.fillStyle = '#aac8ff';
                    ctx.fillText('press  R  or  RESTART', canvas.width/2-95, canvas.height/2+30);
                }
                
                // draw subtle next piece preview on canvas corner (right top small)
                if (nextPiece && !gameOver) {
                    ctx.globalAlpha = 0.95;
                    const previewSize = BLOCK_SIZE * 0.7;
                    const startX = canvas.width - 62;
                    const startY = 8;
                    ctx.fillStyle = '#11161fcc';
                    ctx.shadowBlur = 0;
                    ctx.fillRect(startX-4, startY-4, 58, 58);
                    ctx.fillStyle = '#1e2538';
                    ctx.fillRect(startX-2, startY-2, 54, 54);
                    const shapePrev = nextPiece.shape;
                    const blockW = previewSize;
                    for (let r=0; r<shapePrev.length; r++) {
                        for (let c=0; c<shapePrev[0].length; c++) {
                            if (shapePrev[r][c]) {
                                ctx.fillStyle = nextPiece.color;
                                ctx.fillRect(startX + c*blockW, startY + r*blockW, blockW-1, blockW-1);
                                ctx.fillStyle = 'rgba(255,255,200,0.4)';
                                ctx.fillRect(startX + c*blockW+1, startY + r*blockW+1, blockW-3, 3);
                            }
                        }
                    }
                    ctx.globalAlpha = 1;
                    ctx.font = 'bold 8px monospace';
                    ctx.fillStyle = '#b9c8ff';
                    ctx.fillText('NEXT', startX+10, startY-2);
                }
            }
            
            // -------------------- RESET FULL GAME --------------------
            function resetGame() {
                if (fallInterval) {
                    clearInterval(fallInterval);
                    fallInterval = null;
                }
                if (clearFlashTimer) clearTimeout(clearFlashTimer);
                // reset board
                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0;
                gameOver = false;
                linesClearing = false;
                linesToClearIndices = [];
                updateScoreUI();
                // reset pieces
                nextPiece = getRandomTetromino();
                const spawnSuccess = spawnNewPiece();  // will generate active from next and create new next
                if (!spawnSuccess) {
                    // if somehow spawn fails on reset (should not) force board clear again
                    board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                    nextPiece = getRandomTetromino();
                    spawnNewPiece();
                }
                // restart fall interval
                currentFallDelay = baseFallDelay;
                fallInterval = setInterval(() => fallTick(), currentFallDelay);
                draw();
            }
            
            // -------------------- KEYBOARD CONTROLS --------------------
            function handleKeyDown(e) {
                const key = e.key;
                if (gameOver) {
                    if (key === 'r' || key === 'R') {
                        e.preventDefault();
                        resetGame();
                    }
                    return;
                }
                if (linesClearing) {
                    // prevent actions during line clear animation (smooth)
                    e.preventDefault();
                    return;
                }
                switch (key) {
                    case 'ArrowLeft': e.preventDefault(); movePiece(-1); break;
                    case 'ArrowRight': e.preventDefault(); movePiece(1); break;
                    case 'ArrowDown': e.preventDefault(); softDrop(); break;
                    case 'ArrowUp': e.preventDefault(); rotatePiece(); break;
                    case ' ': case 'Space': e.preventDefault(); hardDrop(); break;
                    case 'r': case 'R': e.preventDefault(); resetGame(); break;
                    default: break;
                }
            }
            
            // restart button event
            document.getElementById('restartButton').addEventListener('click', () => {
                resetGame();
            });
            
            // disable page scroll with arrows
            window.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Space') {
                    if (e.target === document.body || e.target === document.documentElement) {
                        e.preventDefault();
                    }
                }
            });
            
            document.addEventListener('keydown', handleKeyDown);
            
            // INITIALIZE GAME
            function init() {
                resetGame();  // starts interval & spawns pieces
            }
            
            init();
            
            // optional: window focus re-draw
            window.addEventListener('resize', () => draw());
        })();
</script>
</body>
</html>
