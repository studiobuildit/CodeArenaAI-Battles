<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Winter Snow Scene</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

const flakes = [];
const COUNT = 350;

for (let i = 0; i < COUNT; i++) {
  flakes.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 3 + 1,
    vy: 0.5 + Math.random() * 1.2,
    drift: Math.random() * Math.PI * 2
  });
}

let snowLevel = 0;
let t = 0;

function update() {
  t += 0.01;

  flakes.forEach(f => {
    f.y += f.vy;
    f.x += Math.sin(f.drift + t) * 0.5;

    if (f.y > H - 80 - snowLevel) {
      snowLevel += 0.01;
      f.y = -10;
      f.x = Math.random() * W;
    }

    if (f.x < 0) f.x = W;
    if (f.x > W) f.x = 0;
  });

  snowLevel = Math.min(snowLevel, 80);
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#0b1a2a");
  g.addColorStop(1, "#000000");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawMoon() {
  const x = W - 120;
  const y = 140;

  const g = ctx.createRadialGradient(x, y, 0, x, y, 80);
  g.addColorStop(0, "rgba(200,220,255,0.9)");
  g.addColorStop(1, "rgba(200,220,255,0)");

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, 80, 0, Math.PI * 2);
  ctx.fill();
}

function drawTrees() {
  ctx.fillStyle = "#020202";

  for (let i = 0; i < 6; i++) {
    const x = i * 100 + 40;
    const baseY = H - 80;

    ctx.beginPath();
    ctx.moveTo(x, baseY - 120);
    ctx.lineTo(x - 40, baseY);
    ctx.lineTo(x + 40, baseY);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(x, baseY - 80);
    ctx.lineTo(x - 30, baseY);
    ctx.lineTo(x + 30, baseY);
    ctx.closePath();
    ctx.fill();
  }
}

function drawSnowGround() {
  ctx.fillStyle = "#e6f2ff";
  ctx.fillRect(0, H - 80 - snowLevel, W, 80 + snowLevel);
}

function drawFlakes() {
  flakes.forEach(f => {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.fill();
  });
}

function draw() {
  drawSky();
  drawMoon();
  drawTrees();
  drawSnowGround();
  drawFlakes();
}

function animate() {
  update();

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw/W)*dpr, 0, 0, (vph/H)*dpr, 0, 0);

  draw();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
