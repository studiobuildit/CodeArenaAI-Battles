<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const LW = 400;
const LH = 400;
const cx = 200;
const cy = 200;
let viewW = 400;
let viewH = 400;
let dpr = 1;

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  canvas.width = Math.max(1, Math.floor(viewW * dpr));
  canvas.height = Math.max(1, Math.floor(viewH * dpr));
}
resize();
window.addEventListener("resize", resize);

const particles = [];
const count = 700;
for (let i = 0; i < count; i++) {
  particles.push({
    r: 60 + Math.random() * 120,
    angle: Math.random() * Math.PI * 2,
    speed: 0.002 + Math.random() * 0.003,
    size: 0.5 + Math.random() * 1.5
  });
}

function drawBackground() {
  const gradient = ctx.createRadialGradient(cx, cy, 10, cx, cy, 200);
  gradient.addColorStop(0, "rgba(255,255,255,0.05)");
  gradient.addColorStop(1, "rgba(0,0,0,1)");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, LW, LH);
}

function drawCore() {
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
  g.addColorStop(0, "rgba(255,255,255,1)");
  g.addColorStop(0.2, "rgba(255,200,50,0.8)");
  g.addColorStop(0.5, "rgba(255,100,0,0.4)");
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, 40, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    // Spiral inward
    p.angle += p.speed * (2 + (120 - p.r) / 60);
    p.r -= 0.05 + (120 - p.r) * 0.002;

    if (p.r < 20) {
      p.r = 120 + Math.random() * 60;
      p.angle = Math.random() * Math.PI * 2;
    }

    let x = cx + Math.cos(p.angle) * p.r;
    let y = cy + Math.sin(p.angle) * p.r;

    // Gravitational lensing distortion
    const dx = x - cx;
    const dy = y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 100) {
      const factor = 1 + (100 - dist) * 0.01;
      x = cx + dx * factor;
      y = cy + dy * factor;
    }
    ctx.beginPath();
    ctx.fillStyle = "rgba(255,180,80,0.9)";
    ctx.shadowBlur = 8;
    ctx.shadowColor = "rgba(255,150,50,0.8)";
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawDiskGlow() {
  const g = ctx.createRadialGradient(cx, cy, 50, cx, cy, 180);
  g.addColorStop(0, "rgba(255,120,40,0.1)");
  g.addColorStop(0.5, "rgba(255,80,20,0.05)");
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, LW, LH);
}

function animate() {
  const sx = viewW / LW;
  const sy = viewH / LH;
  ctx.setTransform(sx * dpr, 0, 0, sy * dpr, 0, 0);
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, LW, LH);
  drawBackground();
  drawParticles();
  drawDiskGlow();
  drawCore();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
