<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole</title>
<style>
body { margin: 0; background: #000; overflow: hidden; }
html, body { width: 100vw; height: 100vh; }
canvas { display: block; margin: 0; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c'), x = c.getContext('2d');
const W = 800, H = 800, CX = W/2, CY = H/2;
const EH = 45;
let viewW = 800, viewH = 800, dpr = 1;

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  c.width = Math.max(1, Math.floor(viewW * dpr));
  c.height = Math.max(1, Math.floor(viewH * dpr));
}
resize();
window.addEventListener('resize', resize);

const particles = Array(4000).fill().map(() => ({
    r: 60 + Math.random() * 340,
    th: Math.random() * Math.PI * 2,
    v: 0,
    size: Math.random() * 1.5 + 0.5
}));

const stars = Array(800).fill().map(() => ({
    x: Math.random() * W,
    y: Math.random() * H,
    a: Math.random()
}));

function lens(s) {
    const dx = s.x - CX, dy = s.y - CY;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < EH*4 && d > EH*0.8) {
        const f = Math.max(0, 1 - (d - EH) / (EH*3));
        const angle = Math.atan2(dy, dx) + f * 0.4;
        const r = EH*4 - (d - EH) * 0.8;
        return { x: CX + Math.cos(angle) * r, y: CY + Math.sin(angle) * r, a: f * s.a };
    }
    return null;
}

function loop() {
    const sx = viewW / W;
    const sy = viewH / H;
    x.setTransform(sx * dpr, 0, 0, sy * dpr, 0, 0);
    x.fillStyle = 'rgba(0,0,0,0.12)';
    x.fillRect(0,0,W,H);
    
    x.fillStyle = '#fff';
    stars.forEach(s => {
        const l = lens(s);
        if (l) {
            x.globalAlpha = l.a * 0.6;
            x.fillRect(l.x, l.y, 1.5, 1.5);
        }
        x.globalAlpha = s.a * 0.3;
        x.fillRect(s.x, s.y, 1, 1);
    });
    
    x.globalCompositeOperation = 'lighter';
    particles.forEach(p => {
        p.v = 3 / Math.sqrt(p.r);
        p.th += p.v * 0.015;
        p.r -= 0.08;
        
        if (p.r < EH + 8) {
            p.r = 60 + Math.random() * 340;
            p.th = Math.random() * Math.PI * 2;
        }
        
        const px = CX + Math.cos(p.th) * p.r;
        const py = CY + Math.sin(p.th) * p.r;
        
        const t = 1 - (p.r - 60) / 340;
        const hue = 40 - t * 40;
        const light = 60 + t * 40;
        
        x.fillStyle = `hsla(${hue}, 100%, ${light}%, ${0.2 + t*0.8})`;
        x.beginPath();
        x.arc(px, py, p.size * (0.5 + t), 0, Math.PI*2);
        x.fill();
    });
    
    const grad = x.createRadialGradient(CX, CY, EH, CX, CY, EH*2.2);
    grad.addColorStop(0, 'rgba(255,220,150,0.9)');
    grad.addColorStop(0.3, 'rgba(255,150,50,0.4)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    x.fillStyle = grad;
    x.beginPath();
    x.arc(CX, CY, EH*2.2, 0, Math.PI*2);
    x.fill();
    
    x.fillStyle = '#000';
    x.beginPath();
    x.arc(CX, CY, EH, 0, Math.PI*2);
    x.fill();
    
    x.shadowBlur = 60;
    x.shadowColor = 'rgba(255,200,100,1)';
    x.strokeStyle = 'rgba(255,255,255,0.95)';
    x.lineWidth = 3;
    x.beginPath();
    x.arc(CX, CY, EH+3, 0, Math.PI*2);
    x.stroke();
    x.shadowBlur = 0;
    
    x.globalCompositeOperation = 'source-over';
    x.globalAlpha = 1;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
