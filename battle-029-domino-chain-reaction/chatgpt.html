<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Domino Chain Reaction</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
}
canvas{
  display:block;
  background:#000;
  touch-action:none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
(() => {
  const W = 540, H = 960;
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  let scale = 1, dpr = 1;

  function resize(){
    const vw = innerWidth, vh = innerHeight;
    scale = Math.min(vw / W, vh / H);

    const cw = Math.round(W * scale);
    const ch = Math.round(H * scale);

    canvas.style.width = cw + "px";
    canvas.style.height = ch + "px";

    dpr = Math.max(1, Math.min(3, devicePixelRatio || 1));
    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);

    ctx.setTransform(dpr * scale,0,0,dpr * scale,0,0);
    ctx.imageSmoothingEnabled = true;
  }
  addEventListener("resize", resize, {passive:true});
  resize();

  const rand = (a,b)=>a+Math.random()*(b-a);
  const TAU = Math.PI*2;

  const COUNT = 30;
  const dominoes = [];
  const dust = [];

  function makeDominoes(){
    dominoes.length = 0;

    for(let i=0;i<COUNT;i++){
      const t = i/(COUNT-1);

      const y = 150 + t*650;
      const x = W/2 + Math.sin(t*2.4*Math.PI)*110 + Math.sin(t*6*Math.PI)*18;

      const t2 = Math.min(1, t+0.01);
      const y2 = 150 + t2*650;
      const x2 = W/2 + Math.sin(t2*2.4*Math.PI)*110 + Math.sin(t2*6*Math.PI)*18;
      const pathAng = Math.atan2(y2-y, x2-x);

      dominoes.push({
        x,y,
        baseAngle: pathAng + Math.PI/2,
        tilt:0,
        state:0,
        timer:0,
        hue:(i*360/COUNT)|0
      });
    }
  }

  makeDominoes();

  let phase = "waitStart";
  let phaseTimer = 40;

  function puff(x,y,color,n=8){
    for(let i=0;i<n;i++){
      dust.push({
        x,y,
        vx:rand(-1.6,1.6),
        vy:rand(-2.0,-0.3),
        r:rand(3,8),
        life:rand(18,34),
        color
      });
    }
  }

  function startFall(i){
    if(i<0 || i>=COUNT) return;
    const d = dominoes[i];
    if(d.state===0){
      d.state = 1;
      d.timer = 0;
      puff(d.x, d.y+28, `hsla(${d.hue},90%,70%,0.35)`, 10);
    }
  }

  function startRise(i){
    if(i<0 || i>=COUNT) return;
    const d = dominoes[i];
    if(d.state===2){
      d.state = 3;
      d.timer = 0;
      puff(d.x, d.y+28, `hsla(${d.hue},90%,80%,0.25)`, 7);
    }
  }

  function updateDominoes(){
    for(let i=0;i<COUNT;i++){
      const d = dominoes[i];

      if(d.state===1){
        d.timer++;
        d.tilt = Math.min(1, d.timer/11) * (Math.PI/2);

        if(d.timer===5) startFall(i+1);

        if(d.timer>=11){
          d.state = 2;
          d.tilt = Math.PI/2;
        }
      }
      else if(d.state===3){
        d.timer++;
        d.tilt = (1 - Math.min(1, d.timer/11)) * (Math.PI/2);

        if(d.timer===5) startRise(i-1);

        if(d.timer>=11){
          d.state = 0;
          d.tilt = 0;
        }
      }
    }
  }

  function updateDust(){
    for(let i=dust.length-1;i>=0;i--){
      const p = dust[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life--;
      if(p.life<=0) dust.splice(i,1);
    }
  }

  function updatePhase(){
    phaseTimer--;

    if(phase==="waitStart"){
      if(phaseTimer<=0){
        startFall(0);
        phase = "falling";
      }
    }
    else if(phase==="falling"){
      let done = true;
      for(const d of dominoes){
        if(d.state!==2){ done = false; break; }
      }
      if(done){
        phase = "waitDown";
        phaseTimer = 55;
      }
    }
    else if(phase==="waitDown"){
      if(phaseTimer<=0){
        startRise(COUNT-1);
        phase = "rising";
      }
    }
    else if(phase==="rising"){
      let done = true;
      for(const d of dominoes){
        if(d.state!==0){ done = false; break; }
      }
      if(done){
        phase = "waitStart";
        phaseTimer = 45;
      }
    }
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#050505");
    g.addColorStop(0.55,"#0d0d0d");
    g.addColorStop(1,"#000");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  }

  function drawFloor(){
    ctx.fillStyle = "#111";
    ctx.fillRect(0,820,W,140);

    ctx.strokeStyle = "#1d1d1d";
    ctx.lineWidth = 2;
    for(let x=0;x<W;x+=28){
      ctx.beginPath();
      ctx.moveTo(x,820);
      ctx.lineTo(x+14,960);
      ctx.stroke();
    }
  }

  function drawDust(){
    for(const p of dust){
      ctx.globalAlpha = p.life/34;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,TAU);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawDomino(d){
    ctx.save();
    ctx.translate(d.x,d.y+28);
    ctx.rotate(d.baseAngle + d.tilt);
    ctx.translate(0,-28);

    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.fillRect(-9,2,18,56);

    const grad = ctx.createLinearGradient(-9,0,9,56);
    grad.addColorStop(0,`hsl(${d.hue},90%,65%)`);
    grad.addColorStop(1,`hsl(${(d.hue+35)%360},90%,45%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(-8,0,16,56);

    ctx.fillStyle = "rgba(255,255,255,0.85)";
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.arc(0,14+i*12,2,0,TAU);
      ctx.fill();
    }

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-8,0,16,56);

    ctx.restore();
  }

  function drawTrail(){
    ctx.strokeStyle = "rgba(255,255,255,0.06)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    for(let i=0;i<dominoes.length;i++){
      const d = dominoes[i];
      if(i===0) ctx.moveTo(d.x,d.y+28);
      else ctx.lineTo(d.x,d.y+28);
    }
    ctx.stroke();
  }

  function render(){
    drawBackground();
    drawFloor();
    drawTrail();
    drawDust();

    for(const d of dominoes) drawDomino(d);
  }

  function loop(){
    updatePhase();
    updateDominoes();
    updateDust();
    render();
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
