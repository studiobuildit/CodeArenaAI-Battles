<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Domino Chain Reaction</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      background: #000;
      touch-action: none;
    }
  </style>
</head>
<body>
<canvas id="dominoCanvas"></canvas>

<script>
(() => {
  const W = 540;
  const H = 960;
  const COUNT = 30;
  const TAU = Math.PI * 2;
  const canvas = document.getElementById("dominoCanvas");
  const ctx = canvas.getContext("2d");

  function resize() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / W, vh / H);
    const cssW = Math.round(W * scale);
    const cssH = Math.round(H * scale);
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));

    // Keep canvas stable in iframe panel sizing.
    canvas.style.setProperty("width", cssW + "px", "important");
    canvas.style.setProperty("height", cssH + "px", "important");
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
    ctx.imageSmoothingEnabled = true;
  }
  window.addEventListener("resize", resize, { passive: true });
  window.addEventListener("load", () => requestAnimationFrame(resize), { once: true });
  resize();

  const dust = [];
  const dominoes = [];

  function rand(a, b) {
    return a + Math.random() * (b - a);
  }

  function createPathDominoes() {
    dominoes.length = 0;
    for (let i = 0; i < COUNT; i++) {
      const t = i / (COUNT - 1);
      const y = 140 + t * 690;
      const x = W / 2 + Math.sin(t * 2.35 * Math.PI) * 110 + Math.sin(t * 5.8 * Math.PI) * 16;
      const t2 = Math.min(1, t + 0.015);
      const y2 = 140 + t2 * 690;
      const x2 = W / 2 + Math.sin(t2 * 2.35 * Math.PI) * 110 + Math.sin(t2 * 5.8 * Math.PI) * 16;
      const tangent = Math.atan2(y2 - y, x2 - x);
      dominoes.push({
        x,
        y,
        baseAngle: tangent + Math.PI / 2,
        tilt: 0,
        state: 0, // 0 upright, 1 falling, 2 down, 3 rising
        timer: 0,
        hue: Math.floor((i * 360) / COUNT)
      });
    }
  }

  function addDust(x, y, hue, count) {
    for (let i = 0; i < count; i++) {
      dust.push({
        x,
        y,
        vx: rand(-1.8, 1.8),
        vy: rand(-1.9, -0.3),
        r: rand(2.8, 7.5),
        life: rand(16, 34),
        color: `hsla(${hue}, 85%, 72%, 0.36)`
      });
    }
  }

  function triggerFall(i) {
    if (i < 0 || i >= COUNT) return;
    const d = dominoes[i];
    if (d.state === 0) {
      d.state = 1;
      d.timer = 0;
      addDust(d.x, d.y + 24, d.hue, 9);
    }
  }

  function triggerRise(i) {
    if (i < 0 || i >= COUNT) return;
    const d = dominoes[i];
    if (d.state === 2) {
      d.state = 3;
      d.timer = 0;
      addDust(d.x, d.y + 24, d.hue, 6);
    }
  }

  let phase = "start_wait";
  let phaseTimer = 32;

  function updateDominoes() {
    for (let i = 0; i < COUNT; i++) {
      const d = dominoes[i];
      if (d.state === 1) {
        d.timer++;
        d.tilt = Math.min(1, d.timer / 11) * (Math.PI / 2);
        if (d.timer === 5) triggerFall(i + 1);
        if (d.timer >= 11) {
          d.state = 2;
          d.tilt = Math.PI / 2;
        }
      } else if (d.state === 3) {
        d.timer++;
        d.tilt = (1 - Math.min(1, d.timer / 11)) * (Math.PI / 2);
        if (d.timer === 5) triggerRise(i - 1);
        if (d.timer >= 11) {
          d.state = 0;
          d.tilt = 0;
        }
      }
    }
  }

  function updateDust() {
    for (let i = dust.length - 1; i >= 0; i--) {
      const p = dust[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life--;
      if (p.life <= 0) dust.splice(i, 1);
    }
  }

  function updatePhase() {
    phaseTimer--;
    if (phase === "start_wait") {
      if (phaseTimer <= 0) {
        triggerFall(0);
        phase = "falling";
      }
    } else if (phase === "falling") {
      const allDown = dominoes.every(d => d.state === 2);
      if (allDown) {
        phase = "down_wait";
        phaseTimer = 55;
      }
    } else if (phase === "down_wait") {
      if (phaseTimer <= 0) {
        triggerRise(COUNT - 1);
        phase = "rising";
      }
    } else if (phase === "rising") {
      const allUp = dominoes.every(d => d.state === 0);
      if (allUp) {
        phase = "start_wait";
        phaseTimer = 40;
      }
    }
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#05060b");
    g.addColorStop(0.55, "#0d1016");
    g.addColorStop(1, "#020202");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawFloor() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 812, W, 148);
    ctx.strokeStyle = "#1c1c1c";
    ctx.lineWidth = 2;
    for (let x = 0; x < W; x += 30) {
      ctx.beginPath();
      ctx.moveTo(x, 812);
      ctx.lineTo(x + 15, 960);
      ctx.stroke();
    }
  }

  function drawPathTrace() {
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i < dominoes.length; i++) {
      const d = dominoes[i];
      if (i === 0) ctx.moveTo(d.x, d.y + 24);
      else ctx.lineTo(d.x, d.y + 24);
    }
    ctx.stroke();
  }

  function drawDust() {
    for (const p of dust) {
      ctx.globalAlpha = p.life / 34;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, TAU);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawDomino(d) {
    ctx.save();
    ctx.translate(d.x, d.y + 24);
    ctx.rotate(d.baseAngle + d.tilt);
    ctx.translate(0, -24);

    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.fillRect(-9, 2, 18, 56);

    const grad = ctx.createLinearGradient(-9, 0, 9, 56);
    grad.addColorStop(0, `hsl(${d.hue},90%,66%)`);
    grad.addColorStop(1, `hsl(${(d.hue + 30) % 360},90%,46%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(-8, 0, 16, 56);

    ctx.fillStyle = "rgba(255,255,255,0.86)";
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(0, 14 + i * 12, 2, 0, TAU);
      ctx.fill();
    }

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-8, 0, 16, 56);
    ctx.restore();
  }

  function drawHud() {
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(12, 12, 186, 46);
    ctx.fillStyle = "#d8d8d8";
    ctx.font = "bold 16px monospace";
    const label =
      phase === "falling" ? "CHAIN REACTION" :
      phase === "rising" ? "RESTORE SEQUENCE" :
      "PAUSE";
    ctx.fillText(label, 20, 41);
  }

  function render() {
    drawBackground();
    drawFloor();
    drawPathTrace();
    drawDust();
    for (const d of dominoes) drawDomino(d);
    drawHud();
  }

  function tick() {
    updatePhase();
    updateDominoes();
    updateDust();
    render();
    requestAnimationFrame(tick);
  }

  createPathDominoes();
  tick();
})();
</script>
</body>
</html>
