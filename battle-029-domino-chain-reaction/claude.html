<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domino Chain Reaction</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #game {
    display: block;
    background: #000;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>
<script>
(() => {
  const LOGICAL_W = 540;
  const LOGICAL_H = 960;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const ratio = LOGICAL_W / LOGICAL_H;
    let cssW, cssH;
    if (vw / vh > ratio) {
      cssH = vh;
      cssW = vh * ratio;
    } else {
      cssW = vw;
      cssH = vw / ratio;
    }
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width = Math.floor(LOGICAL_W * dpr);
    canvas.height = Math.floor(LOGICAL_H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const W = LOGICAL_W;
  const H = LOGICAL_H;

  const DOMINO_W = 14;
  const DOMINO_H = 58;
  const NUM_DOMINOES = 30;

  function buildPath() {
    const pts = [];
    const marginX = 60;
    const topY = 140;
    const bottomY = H - 100;
    const passes = 3;
    const passHeight = (bottomY - topY) / (passes - 1);
    const samples = 600;
    for (let i = 0; i < samples; i++) {
      const t = i / (samples - 1);
      const totalLen = t * (passes);
      const passIdx = Math.floor(totalLen);
      const passT = totalLen - passIdx;
      const pIdx = Math.min(passIdx, passes - 1);
      const leftToRight = pIdx % 2 === 0;
      let x, y;
      const y0 = topY + pIdx * passHeight;

      if (passT < 0.8) {
        const segT = passT / 0.8;
        if (leftToRight) x = marginX + segT * (W - marginX * 2);
        else x = (W - marginX) - segT * (W - marginX * 2);
        y = y0 + Math.sin(segT * Math.PI) * 4;
      } else if (pIdx < passes - 1) {
        const curveT = (passT - 0.8) / 0.2;
        const startX = leftToRight ? (W - marginX) : marginX;
        const endX = startX;
        const cx = leftToRight ? (W - marginX + 40) : (marginX - 40);
        const cy = y0 + passHeight / 2;
        const p0 = { x: startX, y: y0 };
        const p1 = { x: cx, y: cy };
        const p2 = { x: endX, y: y0 + passHeight };
        const omt = 1 - curveT;
        x = omt * omt * p0.x + 2 * omt * curveT * p1.x + curveT * curveT * p2.x;
        y = omt * omt * p0.y + 2 * omt * curveT * p1.y + curveT * curveT * p2.y;
      } else {
        x = leftToRight ? (W - marginX) : marginX;
        y = y0;
      }
      pts.push({ x, y });
    }
    return pts;
  }

  const path = buildPath();
  const cumLen = [0];
  for (let i = 1; i < path.length; i++) {
    const dx = path[i].x - path[i - 1].x;
    const dy = path[i].y - path[i - 1].y;
    cumLen.push(cumLen[i - 1] + Math.sqrt(dx * dx + dy * dy));
  }
  const totalPathLen = cumLen[cumLen.length - 1];

  function pointAtDist(d) {
    let lo = 0, hi = cumLen.length - 1;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (cumLen[mid] < d) lo = mid + 1;
      else hi = mid;
    }
    const idx = Math.max(1, lo);
    const segD = cumLen[idx] - cumLen[idx - 1];
    const t = segD > 0 ? (d - cumLen[idx - 1]) / segD : 0;
    const p0 = path[idx - 1];
    const p1 = path[idx];
    const x = p0.x + (p1.x - p0.x) * t;
    const y = p0.y + (p1.y - p0.y) * t;
    const dx = p1.x - p0.x;
    const dy = p1.y - p0.y;
    const tangent = Math.atan2(dy, dx);
    return { x, y, tangent };
  }

  const dominoes = [];
  const palette = [
    ['#ff3366', '#cc1a44'],
    ['#ff6600', '#cc4400'],
    ['#ffcc00', '#cc9900'],
    ['#66ff33', '#44cc22'],
    ['#00cccc', '#008888'],
    ['#3366ff', '#1a44cc'],
    ['#9933ff', '#6622cc'],
    ['#ff33cc', '#cc1a99']
  ];

  function setupDominoes() {
    dominoes.length = 0;
    const padding = 50;
    const usable = totalPathLen - padding * 2;
    const step = usable / (NUM_DOMINOES - 1);
    for (let i = 0; i < NUM_DOMINOES; i++) {
      const d = padding + i * step;
      const p = pointAtDist(d);
      const colorSet = palette[i % palette.length];
      dominoes.push({
        index: i,
        baseX: p.x,
        baseY: p.y,
        tangent: p.tangent,
        angle: 0,
        angVel: 0,
        state: 'standing',
        color: colorSet[0],
        edge: colorSet[1],
        dotPattern: i % 7
      });
    }
  }

  const dustParticles = [];
  function spawnDustAt(x, y, intensity = 1) {
    const count = Math.floor(6 * intensity);
    for (let i = 0; i < count; i++) {
      dustParticles.push({
        x: x + (Math.random() - 0.5) * 10,
        y: y + (Math.random() - 0.5) * 8,
        vx: (Math.random() - 0.5) * 2,
        vy: -Math.random() * 1.5 - 0.3,
        r: 3 + Math.random() * 6,
        life: 1,
        decay: 0.012 + Math.random() * 0.012,
        alpha: 0.3 + Math.random() * 0.2
      });
    }
  }

  function updateDust() {
    for (let i = dustParticles.length - 1; i >= 0; i--) {
      const d = dustParticles[i];
      d.x += d.vx;
      d.y += d.vy;
      d.vy += 0.015;
      d.vx *= 0.98;
      d.r += 0.2;
      d.life -= d.decay;
      if (d.life <= 0) dustParticles.splice(i, 1);
    }
  }

  let phase = 'falling';
  let phaseTimer = 0;
  let currentFallIdx = 0;
  let currentRiseIdx = 0;
  let riseTriggerTimer = 0;

  setupDominoes();

  function resetCycle() {
    phase = 'falling';
    currentFallIdx = 0;
    for (const d of dominoes) {
      d.angle = 0;
      d.angVel = 0;
      d.state = 'standing';
    }
  }

  function updateDominoes() {
    const MAX_ANGLE = Math.PI / 2;
    if (phase === 'falling') {
      if (currentFallIdx < dominoes.length && dominoes[currentFallIdx].state === 'standing') {
        dominoes[currentFallIdx].state = 'falling';
        dominoes[currentFallIdx].angVel = 0.04;
        currentFallIdx++;
      }

      for (let i = 0; i < dominoes.length; i++) {
        const d = dominoes[i];
        if (d.state === 'falling') {
          d.angVel += 0.008;
          d.angle += d.angVel;
          if (d.angle >= MAX_ANGLE) {
            d.angle = MAX_ANGLE;
            d.angVel = 0;
            d.state = 'fallen';
            spawnDustAt(d.baseX, d.baseY, 1);
          }
        }
      }

      if (dominoes.every(d => d.state === 'fallen')) {
        phase = 'paused';
        phaseTimer = 60;
      }
    } else if (phase === 'paused') {
      phaseTimer--;
      if (phaseTimer <= 0) {
        phase = 'rising';
        currentRiseIdx = dominoes.length - 1;
        riseTriggerTimer = 0;
      }
    } else if (phase === 'rising') {
      if (currentRiseIdx >= 0) {
        const d = dominoes[currentRiseIdx];
        if (d.state === 'fallen') d.state = 'rising';
        if (d.state === 'rising') {
          d.angle -= 0.06;
          if (d.angle <= 0) {
            d.angle = 0;
            d.state = 'standing';
            spawnDustAt(d.baseX, d.baseY, 0.4);
            currentRiseIdx--;
            riseTriggerTimer = 4;
            phase = 'riseWait';
          }
        }
      } else {
        phase = 'paused2';
        phaseTimer = 50;
      }
    } else if (phase === 'riseWait') {
      riseTriggerTimer--;
      if (riseTriggerTimer <= 0) phase = 'rising';
    } else if (phase === 'paused2') {
      phaseTimer--;
      if (phaseTimer <= 0) resetCycle();
    }
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0a0a18');
    g.addColorStop(0.5, '#0d1128');
    g.addColorStop(1, '#050810');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawPath() {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
    ctx.lineWidth = DOMINO_W + 6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < path.length; i += 4) {
      if (i === 0) ctx.moveTo(path[i].x, path[i].y);
      else ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();
  }

  function drawDominoShadow(d) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.beginPath();
    ctx.ellipse(d.baseX, d.baseY + 4, DOMINO_W * 0.9, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawDomino(d) {
    ctx.save();
    const tangentX = Math.cos(d.tangent);
    const tangentY = Math.sin(d.tangent);
    const pivotX = d.baseX + tangentX * (DOMINO_W / 2);
    const pivotY = d.baseY + tangentY * (DOMINO_W / 2);

    ctx.translate(pivotX, pivotY);
    ctx.rotate(d.tangent);
    ctx.rotate(d.angle);

    const x0 = -DOMINO_W;
    const y0 = -DOMINO_H;
    const w = DOMINO_W;
    const h = DOMINO_H;

    ctx.fillStyle = d.edge;
    ctx.fillRect(x0, y0, w, h);
    const grad = ctx.createLinearGradient(x0, y0, x0, y0 + h);
    grad.addColorStop(0, d.color);
    grad.addColorStop(1, d.edge);
    ctx.fillStyle = grad;
    ctx.fillRect(x0 + 1, y0 + 1, w - 2, h - 2);

    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x0 + 2, y0 + h / 2);
    ctx.lineTo(x0 + w - 2, y0 + h / 2);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    dot(x0 + w / 2, y0 + h * 0.25, 1.8);
    dot(x0 + w / 2, y0 + h * 0.75, 1.8);

    ctx.restore();
  }

  function dot(x, y, s) {
    ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawDust() {
    for (const d of dustParticles) {
      ctx.fillStyle = `rgba(220, 220, 230, ${d.life * d.alpha})`;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawCounter() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(0, 0, W, 48);
    ctx.fillStyle = '#ff6bba';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('CHAIN REACTION', 16, 30);
  }

  function loop() {
    updateDominoes();
    updateDust();

    drawBackground();
    drawPath();
    for (const d of dominoes) drawDominoShadow(d);
    const sorted = [...dominoes].sort((a, b) => a.baseY - b.baseY);
    for (const d of sorted) drawDomino(d);
    drawDust();
    drawCounter();

    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
