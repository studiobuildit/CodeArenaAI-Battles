<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Volcano - Deepseek</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}body{display:flex;align-items:center;justify-content:center}canvas{display:block}</style></head><body><canvas id="c"></canvas><script>
(()=>{const W=540,H=960,c=document.getElementById("c"),x=c.getContext("2d"),TA=Math.PI*2,r=(a,b)=>a+Math.random()*(b-a);let d=1,s=1,t=0,sm=[],lava=[],rock=[];function rs(){const vw=innerWidth,vh=innerHeight;s=Math.min(vw/W,vh/H);const cw=W*s,ch=H*s;d=Math.max(1,Math.min(3,devicePixelRatio||1));c.style.width=cw+"px";c.style.height=ch+"px";c.width=cw*d;c.height=ch*d;x.setTransform(d*s,0,0,d*s,0,0)}addEventListener("resize",rs,{passive:true});rs();
function up(){t++;const i=.65+.25*Math.sin(t*.012);for(let k=0;k<8;k++)lava.push({x:W/2+r(-18,18),y:560,vx:r(-2.5,2.5),vy:r(-10,-4)*i,s:r(2,6),l:r(18,55)});for(let k=0;k<2;k++)sm.push({x:W/2+r(-20,20),y:560,vx:r(-1,1),vy:r(-2.2,-.8),r:r(18,36),l:r(90,180)});if(Math.random()<.09)rock.push({x:W/2+r(-12,12),y:560,vx:r(-3,3),vy:r(-8,-5),s:r(5,10),ro:0,vr:r(-.2,.2)});
for(let i=lava.length-1;i>=0;i--){const p=lava[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.l--;if(p.l<=0||p.y>H)lava.splice(i,1)}for(let i=sm.length-1;i>=0;i--){const p=sm[i];p.x+=p.vx;p.y+=p.vy;p.r+=.2;p.l--;if(p.l<=0)sm.splice(i,1)}for(let i=rock.length-1;i>=0;i--){const p=rock[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.ro+=p.vr;if(p.y>H)rock.splice(i,1)}}
function dr(){const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#180f0d");g.addColorStop(.5,"#24130e");g.addColorStop(1,"#090706");x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle="#3a2a1e";x.beginPath();x.moveTo(W/2-140,H-120);x.lineTo(W/2-18,H-380);x.lineTo(W/2+18,H-380);x.lineTo(W/2+140,H-120);x.fill();
x.fillStyle="rgba(255,90,20,.8)";x.beginPath();x.ellipse(W/2,H-380,32,18,0,0,TA);x.fill();for(const p of sm){x.fillStyle=`rgba(110,110,120,${p.l/180*.5})`;x.beginPath();x.ellipse(p.x,p.y,p.r,p.r*.7,0,0,TA);x.fill();}
for(const p of lava){x.fillStyle=`rgba(255,100,20,${p.l/55*.9})`;x.beginPath();x.arc(p.x,p.y,p.s*.8,0,TA);x.fill();x.fillStyle="#ffcc44";x.beginPath();x.arc(p.x-1,p.y-1,p.s*.4,0,TA);x.fill();}
for(const p of rock){x.save();x.translate(p.x,p.y);x.rotate(p.ro);x.fillStyle="#5a4a3a";x.fillRect(-p.s/2,-p.s/3,p.s,p.s*.8);x.restore();}
x.fillStyle="rgba(0,0,0,.35)";x.fillRect(12,12,150,36);x.fillStyle="#7fe0c0";x.font="bold 18px monospace";x.fillText("DEEPSEEK",22,36);}
function loop(){up();dr();requestAnimationFrame(loop)}loop()})();
</script></body></html>
