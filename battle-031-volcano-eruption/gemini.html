<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Volcano - Gemini</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}body{display:flex;align-items:center;justify-content:center}canvas{display:block}</style></head><body><canvas id="c"></canvas><script>
(()=>{const W=540,H=960,c=document.getElementById("c"),x=c.getContext("2d"),TA=Math.PI*2,r=(a,b)=>a+Math.random()*(b-a);let d=1,s=1,t=0,sm=[],lava=[],ash=[];function rs(){const vw=innerWidth,vh=innerHeight;s=Math.min(vw/W,vh/H);const cw=W*s,ch=H*s;d=Math.max(1,Math.min(3,devicePixelRatio||1));c.style.width=cw+"px";c.style.height=ch+"px";c.width=cw*d;c.height=ch*d;x.setTransform(d*s,0,0,d*s,0,0)}addEventListener("resize",rs,{passive:true});rs();for(let i=0;i<150;i++)ash.push({x:r(0,W),y:r(-H,0),vx:r(-.6,.5),vy:r(.9,2.2),s:r(1,2),l:r(140,260)});
function up(){t++;const k=.8+Math.sin(t*.01)*.4;for(let i=0;i<7;i++)lava.push({x:W/2+r(-12,12),y:560,vx:r(-2.4,2.4),vy:r(-9,-3)*k,s:r(2,5),l:r(20,70)});for(let i=0;i<3;i++)sm.push({x:W/2+r(-18,18),y:560,vx:r(-.8,.8),vy:r(-2.8,-1.1),r:r(14,34),l:r(80,160)});
for(let i=lava.length-1;i>=0;i--){const p=lava[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.14;p.l--;if(p.l<=0||p.y>H)lava.splice(i,1)}for(let i=sm.length-1;i>=0;i--){const p=sm[i];p.x+=p.vx;p.y+=p.vy;p.r+=.18;p.l--;if(p.l<=0)sm.splice(i,1)}for(let i=ash.length-1;i>=0;i--){const p=ash[i];p.x+=p.vx;p.y+=p.vy;p.l--;if(p.y>H||p.l<=0){p.x=r(0,W);p.y=r(-80,-10);p.l=r(140,260)}}}
function dr(){x.fillStyle="#050005";x.fillRect(0,0,W,H);x.fillStyle="#1a0a05";x.beginPath();x.moveTo(W*.1,H);x.lineTo(W*.45,H*.65);x.lineTo(W*.55,H*.65);x.lineTo(W*.9,H);x.closePath();x.fill();
x.strokeStyle=`rgb(255,${100+Math.sin(t*.05)*50},0)`;x.lineWidth=5;x.lineCap="round";x.beginPath();x.moveTo(W*.46,H*.66);x.bezierCurveTo(W*.4,H*.75,W*.45,H*.85,W*.35,H);x.moveTo(W*.54,H*.66);x.bezierCurveTo(W*.6,H*.7,W*.55,H*.8,W*.65,H);x.stroke();
for(const p of sm){x.fillStyle=`rgba(120,120,130,${p.l/160*.35})`;x.beginPath();x.arc(p.x,p.y,p.r,0,TA);x.fill();}for(const p of ash){x.fillStyle=`rgba(170,170,170,${p.l/260*.4})`;x.fillRect(p.x,p.y,p.s,p.s);}for(const p of lava){x.fillStyle=`rgba(255,120,20,${p.l/70})`;x.beginPath();x.arc(p.x,p.y,p.s,0,TA);x.fill();}
x.fillStyle="rgba(0,0,0,.35)";x.fillRect(12,12,140,36);x.fillStyle="#90b6ff";x.font="bold 18px monospace";x.fillText("GEMINI",26,36);}
function loop(){up();dr();requestAnimationFrame(loop)}loop()})();
</script></body></html>
