<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Volcano - Claude</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}body{display:flex;align-items:center;justify-content:center}canvas{display:block}</style></head><body><canvas id="c"></canvas><script>
(()=>{const W=540,H=960,c=document.getElementById("c"),x=c.getContext("2d"),TA=Math.PI*2,r=(a,b)=>a+Math.random()*(b-a);let d=1,s=1,t=0,sm=[],lava=[],rocks=[],lf=0;function rs(){const vw=innerWidth,vh=innerHeight;s=Math.min(vw/W,vh/H);const cw=W*s,ch=H*s;d=Math.max(1,Math.min(3,devicePixelRatio||1));c.style.width=cw+"px";c.style.height=ch+"px";c.width=cw*d;c.height=ch*d;x.setTransform(d*s,0,0,d*s,0,0)}addEventListener("resize",rs,{passive:true});rs();
function up(){t++;const p=.7+.3*Math.sin(t*.04);for(let i=0;i<3;i++)sm.push({x:W/2+r(-16,16),y:560,vx:r(-1,1),vy:r(-2.4,-1.1),r:r(20,40),l:r(90,180)});for(let i=0;i<6;i++)lava.push({x:W/2+r(-8,8),y:560,vx:r(-2.2,2.2),vy:r(-11,-6)*p,s:r(2,5),l:r(22,60)});if(Math.random()<.08)rocks.push({x:W/2,y:560,vx:r(-3,3),vy:r(-9,-6),s:r(4,8),ro:0,vr:r(-.2,.2)});if(Math.random()<.008)lf=8;
for(let i=sm.length-1;i>=0;i--){const q=sm[i];q.x+=q.vx;q.y+=q.vy;q.r+=.25;q.l--;if(q.l<=0)sm.splice(i,1)}for(let i=lava.length-1;i>=0;i--){const q=lava[i];q.x+=q.vx;q.y+=q.vy;q.vy+=.17;q.l--;if(q.l<=0||q.y>H)lava.splice(i,1)}for(let i=rocks.length-1;i>=0;i--){const q=rocks[i];q.x+=q.vx;q.y+=q.vy;q.vy+=.22;q.ro+=q.vr;if(q.y>H)rocks.splice(i,1)}if(lf>0)lf--;}
function dr(){const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#120818");g.addColorStop(.6,"#250b16");g.addColorStop(1,"#090307");x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle="#1a0f15";x.beginPath();x.moveTo(0,H);x.lineTo(140,700);x.lineTo(240,560);x.lineTo(300,560);x.lineTo(400,700);x.lineTo(W,H);x.closePath();x.fill();
x.strokeStyle="rgba(255,90,40,.9)";x.lineWidth=8;x.beginPath();x.moveTo(265,575);x.bezierCurveTo(230,660,200,770,170,930);x.moveTo(275,575);x.bezierCurveTo(315,660,350,780,390,930);x.stroke();
for(const q of sm){const a=q.l/180,rg=x.createRadialGradient(q.x,q.y,q.r*.2,q.x,q.y,q.r);rg.addColorStop(0,`rgba(180,120,120,${a*.2})`);rg.addColorStop(1,"rgba(20,20,20,0)");x.fillStyle=rg;x.beginPath();x.arc(q.x,q.y,q.r,0,TA);x.fill();}
for(const q of lava){x.fillStyle=`rgba(255,${120+Math.floor(80*Math.sin(t*.08))},50,${q.l/60})`;x.beginPath();x.arc(q.x,q.y,q.s,0,TA);x.fill();}
for(const q of rocks){x.save();x.translate(q.x,q.y);x.rotate(q.ro);x.fillStyle="#5a4138";x.fillRect(-q.s/2,-q.s/2,q.s,q.s);x.restore();}
if(lf>0){x.strokeStyle=`rgba(220,230,255,${lf*.1})`;x.lineWidth=2;let lx=W/2+r(-100,100),ly=90;x.beginPath();x.moveTo(lx,ly);for(let i=0;i<6;i++){lx+=r(-24,24);ly+=r(30,60);x.lineTo(lx,ly)}x.stroke();}
x.fillStyle="rgba(0,0,0,.35)";x.fillRect(12,12,140,36);x.fillStyle="#d8c8ff";x.font="bold 18px monospace";x.fillText("CLAUDE",26,36);}
function loop(){up();dr();requestAnimationFrame(loop)}loop()})();
</script></body></html>
