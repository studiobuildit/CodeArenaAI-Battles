<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Volcano - ChatGPT</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}body{display:flex;align-items:center;justify-content:center}canvas{display:block}</style></head><body><canvas id="c"></canvas><script>
(()=>{const W=540,H=960,c=document.getElementById("c"),x=c.getContext("2d"),TA=Math.PI*2,r=(a,b)=>a+Math.random()*(b-a);let d=1,s=1,t=0,sm=[],emb=[],rocks=[],ash=[],flash=0;function rs(){const vw=innerWidth,vh=innerHeight;s=Math.min(vw/W,vh/H);const cw=W*s,ch=H*s;d=Math.max(1,Math.min(3,devicePixelRatio||1));c.style.width=cw+"px";c.style.height=ch+"px";c.width=cw*d;c.height=ch*d;x.setTransform(d*s,0,0,d*s,0,0)}addEventListener("resize",rs,{passive:true});rs();for(let i=0;i<130;i++)ash.push({x:r(0,W),y:r(-H,0),vx:r(-.4,.4),vy:r(.8,1.8),s:r(1,2.6),l:r(180,320)});

function up(){t++;spawn();for(let i=sm.length-1;i>=0;i--){const p=sm[i];p.x+=p.vx;p.y+=p.vy;p.rr+=.18;p.l--;if(p.l<=0)sm.splice(i,1)}for(let i=emb.length-1;i>=0;i--){const p=emb[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.l--;if(p.l<=0||p.y>H)emb.splice(i,1)}for(let i=rocks.length-1;i>=0;i--){const p=rocks[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.24;p.ro+=p.vr;if(p.y>730)rocks.splice(i,1)}for(let i=ash.length-1;i>=0;i--){const p=ash[i];p.x+=p.vx;p.y+=p.vy;p.l--;if(p.y>H||p.l<=0){p.x=r(0,W);p.y=r(-120,-10);p.l=r(180,320)}}if(flash>0)flash--;}
function dr(){const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#030303");g.addColorStop(.45,"#111");g.addColorStop(1,"#000");x.fillStyle=g;x.fillRect(0,0,W,H);for(const a of ash){x.fillStyle="rgba(160,160,160,.45)";x.beginPath();x.arc(a.x,a.y,a.s,0,TA);x.fill();}for(const p of sm){const a=p.l/170,rg=x.createRadialGradient(p.x,p.y,p.rr*.1,p.x,p.y,p.rr);rg.addColorStop(0,"rgba(90,90,90,"+(0.22*a)+")");rg.addColorStop(1,"rgba(30,30,30,0)");x.fillStyle=rg;x.beginPath();x.arc(p.x,p.y,p.rr,0,TA);x.fill();}
x.fillStyle="#1b1b1b";x.beginPath();x.moveTo(0,H);x.lineTo(130,700);x.lineTo(220,600);x.lineTo(245,565);x.lineTo(295,565);x.lineTo(320,600);x.lineTo(410,700);x.lineTo(W,H);x.closePath();x.fill();
x.strokeStyle="rgba(255,130,30,.8)";x.lineWidth=10;x.lineCap="round";x.beginPath();x.moveTo(250,575);x.bezierCurveTo(220,630,195,690,185,760);x.bezierCurveTo(178,810,168,850,160,900);x.stroke();x.beginPath();x.moveTo(290,575);x.bezierCurveTo(322,630,346,700,360,780);x.bezierCurveTo(366,835,376,875,390,920);x.stroke();
for(const p of rocks){x.save();x.translate(p.x,p.y);x.rotate(p.ro);x.fillStyle="#4b4b4b";x.fillRect(-p.s*.6,-p.s*.5,p.s*1.2,p.s);x.restore();}for(const e of emb){x.fillStyle="rgba(255,180,40,"+(e.l/70)+")";x.beginPath();x.arc(e.x,e.y,e.s,0,TA);x.fill();}
if(flash>0){x.strokeStyle="rgba(190,220,255,"+(flash*.12)+")";x.lineWidth=3;let lx=180+Math.sin(t)*80,ly=90;x.beginPath();x.moveTo(lx,ly);for(let i=0;i<7;i++){lx+=r(-28,28);ly+=r(32,68);x.lineTo(lx,ly)}x.stroke();}
x.fillStyle="rgba(0,0,0,.35)";x.fillRect(12,12,150,36);x.fillStyle="#ffd084";x.font="bold 18px monospace";x.fillText("CHATGPT",24,36);}
function loop(){up();dr();requestAnimationFrame(loop)}loop()})();
</script></body></html>
