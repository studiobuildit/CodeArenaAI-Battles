<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightning Storm</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

const rain = [];
for (let i = 0; i < 300; i++) {
  rain.push({
    x: Math.random() * W,
    y: Math.random() * H,
    speed: 8 + Math.random() * 6
  });
}

let lightning = [];
let flash = 0;

function createLightning() {
  const path = [];
  let x = Math.random() * W;
  let y = 0;

  while (y < H - 200) {
    path.push({ x, y });
    x += (Math.random() - 0.5) * 40;
    y += 30 + Math.random() * 40;
  }

  path.push({ x, y: H - 100 });

  lightning.push({
    path,
    life: 10
  });

  flash = 1;
}

let frame = 0;
function update() {
  frame++;

  rain.forEach(r => {
    r.y += r.speed;
    r.x += 2;

    if (r.y > H) {
      r.y = -10;
      r.x = Math.random() * W;
    }
    if (r.x > W) r.x = 0;
  });

  if (Math.random() < 0.02) {
    createLightning();
  }

  lightning.forEach(l => l.life--);
  lightning = lightning.filter(l => l.life > 0);

  flash *= 0.9;
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#05060a");
  g.addColorStop(1, "#000000");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawClouds() {
  ctx.fillStyle = "#111";
  for (let i = 0; i < 6; i++) {
    const x = i * 120;
    ctx.beginPath();
    ctx.arc(x + 60, 120, 80, 0, Math.PI * 2);
    ctx.arc(x + 120, 140, 90, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawRain() {
  ctx.strokeStyle = "rgba(180,180,255,0.3)";
  ctx.lineWidth = 1;

  rain.forEach(r => {
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x - 4, r.y - 12);
    ctx.stroke();
  });
}

function drawLightning() {
  lightning.forEach(l => {
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 3;
    ctx.shadowBlur = 20;
    ctx.shadowColor = "white";

    ctx.beginPath();
    ctx.moveTo(l.path[0].x, l.path[0].y);

    for (let i = 1; i < l.path.length; i++) {
      ctx.lineTo(l.path[i].x, l.path[i].y);
    }

    ctx.stroke();
    ctx.shadowBlur = 0;
  });
}

function drawFlash() {
  if (flash > 0.01) {
    ctx.fillStyle = `rgba(255,255,255,${flash * 0.3})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawGround() {
  ctx.fillStyle = "#020202";
  ctx.fillRect(0, H - 100, W, 100);
}

function draw() {
  drawSky();
  drawClouds();
  drawRain();
  drawLightning();
  drawFlash();
  drawGround();
}

function animate() {
  update();

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw/W)*dpr, 0, 0, (vph/H)*dpr, 0, 0);

  draw();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
