<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightning Storm</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
}
canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 540, H = 960;
let dpr = window.devicePixelRatio || 1;
let vpw = window.innerWidth;
let vph = window.innerHeight;

function resize() {
    dpr = window.devicePixelRatio || 1;
    vpw = window.innerWidth;
    vph = window.innerHeight;
    canvas.width = Math.floor(vpw * dpr);
    canvas.height = Math.floor(vph * dpr);
}

window.addEventListener('resize', resize);
resize();

const raindrops = [];
const lightningBolts = [];
let flashIntensity = 0;
let nextStrikeTime = 0;

for (let i = 0; i < 300; i++) {
    raindrops.push({
        x: Math.random() * W,
        y: Math.random() * H,
        speed: 15 + Math.random() * 10,
        length: 10 + Math.random() * 15
    });
}

function drawClouds() {
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, 180);
    
    for (let i = 0; i < 8; i++) {
        const x = i * 80 - 40;
        const y = 40 + Math.sin(i * 0.7) * 20;
        const w = 120 + Math.random() * 40;
        
        const grad = ctx.createRadialGradient(x + w/2, y + 30, 0, x + w/2, y + 30, w/2);
        grad.addColorStop(0, '#1a1a25');
        grad.addColorStop(0.6, '#0f0f15');
        grad.addColorStop(1, 'transparent');
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(x + w/2, y + 30, w/2, 50, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.fillStyle = 'rgba(5, 5, 8, 0.8)';
    ctx.fillRect(0, 120, W, 60);
}

function generateLightning(startX, startY) {
    const segments = [];
    let x = startX;
    let y = startY;
    const targetY = H - 50;
    
    while (y < targetY) {
        const angle = (Math.random() - 0.5) * 1.5 + Math.PI / 2;
        const length = 20 + Math.random() * 30;
        
        const nextX = x + Math.cos(angle) * length;
        const nextY = y + Math.sin(angle) * length;
        
        segments.push({ x1: x, y1: y, x2: nextX, y2: nextY });
        
        x = nextX;
        y = nextY;
        
        if (Math.random() < 0.3 && segments.length > 5) {
            const branchAngle = angle + (Math.random() - 0.5) * 2;
            const branchLength = length * 0.7;
            const branchX = x + Math.cos(branchAngle) * branchLength;
            const branchY = y + Math.sin(branchAngle) * branchLength;
            segments.push({ 
                x1: x, y1: y, x2: branchX, y2: branchY, 
                isBranch: true, life: 0.5 + Math.random() * 0.5 
            });
        }
    }
    
    return { segments, life: 1.0, maxLife: 1.0 };
}

function drawLightning(bolt) {
    ctx.globalCompositeOperation = 'screen';
    const alpha = bolt.life / bolt.maxLife;
    
    bolt.segments.forEach(seg => {
        const isBranch = seg.isBranch || false;
        const segAlpha = isBranch ? alpha * (seg.life || 0.5) : alpha;
        
        ctx.shadowBlur = isBranch ? 15 : 30;
        ctx.shadowColor = 'rgba(200, 220, 255, 0.8)';
        ctx.strokeStyle = `rgba(255, 255, 255, ${segAlpha})`;
        ctx.lineWidth = isBranch ? 1 : 3;
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
        
        ctx.strokeStyle = `rgba(180, 200, 255, ${segAlpha * 0.5})`;
        ctx.lineWidth = isBranch ? 3 : 6;
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
    });
    
    ctx.shadowBlur = 0;
    ctx.globalCompositeOperation = 'source-over';
}

function drawRain() {
    ctx.strokeStyle = 'rgba(150, 160, 180, 0.3)';
    ctx.lineWidth = 1;
    
    raindrops.forEach(drop => {
        drop.y += drop.speed;
        drop.x -= 2;
        
        if (drop.y > H) {
            drop.y = -drop.length;
            drop.x = Math.random() * (W + 100) - 50;
        }
        
        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(drop.x - 2, drop.y + drop.length);
        ctx.stroke();
    });
}

function drawGround() {
    const grad = ctx.createLinearGradient(0, H - 100, 0, H);
    grad.addColorStop(0, '#0a0a0f');
    grad.addColorStop(0.5, '#050508');
    grad.addColorStop(1, '#000');
    ctx.fillStyle = grad;
    ctx.fillRect(0, H - 100, W, 100);
    
    ctx.fillStyle = '#020204';
    for (let i = 0; i < W; i += 30) {
        const h = 20 + Math.random() * 40;
        ctx.fillRect(i, H - h, 25, h);
    }
}

let frame = 0;

function animate() {
    const now = Date.now();
    
    ctx.setTransform((vpw/W) * dpr, 0, 0, (vph/H) * dpr, 0, 0);
    
    if (flashIntensity > 0) {
        const flashAlpha = Math.min(0.3, flashIntensity);
        ctx.fillStyle = `rgba(240, 240, 255, ${flashAlpha})`;
        ctx.fillRect(0, 0, W, H);
        flashIntensity *= 0.85;
        if (flashIntensity < 0.01) flashIntensity = 0;
    } else {
        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, W, H);
    }
    
    drawClouds();
    drawGround();
    drawRain();
    
    if (now > nextStrikeTime && lightningBolts.length === 0) {
        const startX = 100 + Math.random() * (W - 200);
        lightningBolts.push(generateLightning(startX, 120));
        flashIntensity = 1;
        nextStrikeTime = now + 800 + Math.random() * 2500;
    }
    
    for (let i = lightningBolts.length - 1; i >= 0; i--) {
        const bolt = lightningBolts[i];
        drawLightning(bolt);
        bolt.life -= 0.08;
        
        if (bolt.life <= 0) {
            lightningBolts.splice(i, 1);
        }
    }
    
    if (flashIntensity > 0.5 && Math.random() < 0.3) {
        const flicker = generateLightning(150 + Math.random() * (W - 300), 120);
        flicker.life = 0.3;
        flicker.maxLife = 0.3;
        lightningBolts.push(flicker);
    }
    
    frame++;
    requestAnimationFrame(animate);
}

nextStrikeTime = Date.now() + 500;
animate();
</script>
</body>
</html>
