<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #080810;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="clk"></canvas>
<script>
(function () {
  const cv = document.getElementById('clk');
  const cx = cv.getContext('2d');

  let vpw = Math.max(1, window.innerWidth);
  let vph = Math.max(1, window.innerHeight);
  let dpr = 1;
  let SIZE = Math.min(vpw, vph) * 0.82;
  let C = SIZE / 2;
  let R = SIZE * 0.44;

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    vpw = Math.max(1, window.innerWidth);
    vph = Math.max(1, window.innerHeight);
    SIZE = Math.min(vpw, vph) * 0.82;
    C = SIZE / 2;
    R = SIZE * 0.44;
    cv.width = Math.floor(vpw * dpr);
    cv.height = Math.floor(vph * dpr);
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx.fillStyle = '#080810';
    cx.fillRect(0, 0, vpw, vph);

    const ox = (vpw - SIZE) / 2;
    const oy = (vph - SIZE) / 2;
    cx.save();
    cx.translate(ox, oy);

    const now = new Date();
    const ms  = now.getMilliseconds();
    const sec = now.getSeconds() + ms / 1000;
    const min = now.getMinutes() + sec / 60;
    const hr  = (now.getHours() % 12) + min / 60;

    cx.clearRect(0, 0, SIZE, SIZE);
    cx.fillStyle = '#080810';
    cx.fillRect(0, 0, SIZE, SIZE);

    cx.save();
    cx.shadowColor = 'rgba(0,0,0,0.95)';
    cx.shadowBlur  = 60;
    cx.beginPath();
    cx.arc(C, C, R + 18, 0, Math.PI * 2);
    cx.fillStyle = '#12121a';
    cx.fill();
    cx.restore();

    cx.beginPath();
    cx.arc(C, C, R + 18, 0, Math.PI * 2);
    cx.fillStyle = '#0f0f18';
    cx.fill();

    cx.beginPath();
    cx.arc(C, C, R + 18, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(255,255,255,0.07)';
    cx.lineWidth = 1.5;
    cx.stroke();

    cx.beginPath();
    cx.arc(C, C, R + 10, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(255,255,255,0.025)';
    cx.lineWidth = 8;
    cx.stroke();

    for (let i = 0; i < 60; i++) {
      const a      = (i / 60) * Math.PI * 2 - Math.PI / 2;
      const isHour = i % 5 === 0;
      const inner  = isHour ? R - 16 : R - 8;

      cx.beginPath();
      cx.moveTo(C + Math.cos(a) * inner, C + Math.sin(a) * inner);
      cx.lineTo(C + Math.cos(a) * R,     C + Math.sin(a) * R);

      if (isHour) {
        cx.save();
        cx.shadowColor = 'rgba(200,200,255,0.7)';
        cx.shadowBlur  = 10;
        cx.strokeStyle = 'rgba(220,220,255,0.92)';
        cx.lineWidth   = 2.5;
        cx.stroke();
        cx.restore();
      } else {
        cx.strokeStyle = 'rgba(255,255,255,0.18)';
        cx.lineWidth   = 1;
        cx.stroke();
      }
    }

    const numR = R - 34;
    cx.font         = `500 ${Math.round(SIZE * 0.038)}px -apple-system,BlinkMacSystemFont,sans-serif`;
    cx.textAlign    = 'center';
    cx.textBaseline = 'middle';
    cx.fillStyle    = 'rgba(200,200,220,0.72)';
    for (let i = 1; i <= 12; i++) {
      const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
      cx.fillText(String(i), C + Math.cos(a) * numR, C + Math.sin(a) * numR);
    }

    function hand(angle, length, width, color, glowColor, glowBlur, tailRatio) {
      const tail = tailRatio ?? 0.18;
      const ax = C + Math.cos(angle) * length;
      const ay = C + Math.sin(angle) * length;
      const bx = C - Math.cos(angle) * length * tail;
      const by = C - Math.sin(angle) * length * tail;
      cx.save();
      cx.shadowColor = glowColor;
      cx.shadowBlur  = glowBlur;
      cx.beginPath();
      cx.moveTo(bx, by);
      cx.lineTo(ax, ay);
      cx.strokeStyle = color;
      cx.lineWidth   = width;
      cx.lineCap     = 'round';
      cx.stroke();
      cx.restore();
    }

    const hrAngle  = (hr  / 12) * Math.PI * 2 - Math.PI / 2;
    const minAngle = (min / 60) * Math.PI * 2 - Math.PI / 2;
    const secAngle = (sec / 60) * Math.PI * 2 - Math.PI / 2;

    hand(hrAngle,  R * 0.52, SIZE * 0.016, 'rgba(230,230,248,0.95)', 'rgba(180,180,255,0.45)', 18);
    hand(minAngle, R * 0.75, SIZE * 0.011, 'rgba(210,210,238,0.95)', 'rgba(180,180,255,0.30)', 12);
    hand(secAngle, R * 0.84, SIZE * 0.005, '#e05555',                'rgba(220,60,60,0.65)',   20, 0.22);

    cx.save();
    cx.shadowColor = 'rgba(220,80,80,0.9)';
    cx.shadowBlur  = 16;
    cx.beginPath();
    cx.arc(C, C, SIZE * 0.016, 0, Math.PI * 2);
    cx.fillStyle = '#e05555';
    cx.fill();
    cx.restore();

    cx.beginPath();
    cx.arc(C, C, SIZE * 0.008, 0, Math.PI * 2);
    cx.fillStyle = '#ffffff';
    cx.fill();

    cx.restore();

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
</body>
</html>
