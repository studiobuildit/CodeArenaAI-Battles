<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Analog Clock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
        }
    </style>
</head>
<body>
    <canvas id="clockCanvas"></canvas>

    <script>
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');

        const size = 400;
        const radius = size / 2 - 20;

        let vpw = Math.max(1, window.innerWidth);
        let vph = Math.max(1, window.innerHeight);
        let dpr = 1;

        function syncViewport() {
            dpr = Math.max(1, window.devicePixelRatio || 1);
            vpw = Math.max(1, window.innerWidth);
            vph = Math.max(1, window.innerHeight);
            canvas.width = Math.floor(vpw * dpr);
            canvas.height = Math.floor(vph * dpr);
        }

        function beginFrame() {
            syncViewport();
            ctx.setTransform((vpw / size) * dpr, 0, 0, (vph / size) * dpr, 0, 0);
        }

        function drawClock() {
            beginFrame();
            ctx.clearRect(0, 0, size, size);
            const now = new Date();

            const ms = now.getMilliseconds();
            const sec = now.getSeconds() + ms / 1000;
            const min = now.getMinutes() + sec / 60;
            const hr = (now.getHours() % 12) + min / 60;

            ctx.save();
            ctx.translate(size / 2, size / 2);
            ctx.rotate(-Math.PI / 2);

            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 8;
            ctx.stroke();

            for (let i = 0; i < 12; i++) {
                const angle = (i * Math.PI) / 6;
                const x1 = Math.cos(angle) * (radius - 10);
                const y1 = Math.sin(angle) * (radius - 10);
                const x2 = Math.cos(angle) * (radius - 30);
                const y2 = Math.sin(angle) * (radius - 30);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.strokeStyle = i % 3 === 0 ? '#00f2ff' : '#333';
                if (i % 3 === 0) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00f2ff';
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.stroke();
            }

            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowOffsetX = 5;
            ctx.shadowOffsetY = 5;

            ctx.save();
            ctx.rotate((hr * Math.PI) / 6);
            ctx.beginPath();
            ctx.moveTo(-15, 0);
            ctx.lineTo(radius * 0.5, 0);
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#ffffff';
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();

            ctx.save();
            ctx.rotate((min * Math.PI) / 30);
            ctx.beginPath();
            ctx.moveTo(-20, 0);
            ctx.lineTo(radius * 0.75, 0);
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#cccccc';
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();

            ctx.save();
            ctx.rotate((sec * Math.PI) / 30);
            ctx.shadowColor = 'rgba(255, 50, 50, 0.4)';
            ctx.beginPath();
            ctx.moveTo(-30, 0);
            ctx.lineTo(radius * 0.85, 0);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#ff3333';
            ctx.lineCap = 'round';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(-30, 0, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#ff3333';
            ctx.fill();
            ctx.restore();

            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(0, 0, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0a';
            ctx.fill();

            ctx.restore();

            requestAnimationFrame(drawClock);
        }

        syncViewport();
        window.addEventListener('resize', syncViewport);
        drawClock();
    </script>
</body>
</html>
