<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Warp Speed | Hyperspace Starfield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>
<body>
<canvas id="warpCanvas"></canvas>

<script>
    (function(){
        const canvas = document.getElementById('warpCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, dpr = 1;
        let centerX, centerY;

        class WarpStar {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = (Math.random() - 0.5) * 8;
                this.y = (Math.random() - 0.5) * 8;
                this.angle = Math.atan2(this.y, this.x);
                this.distance = 0;
                this.speed = 4 + Math.random() * 12;
                this.baseSize = 1.2 + Math.random() * 2.5;
                this.trail = [];
                this.maxTrail = 12;
                this.hue = 180 + Math.random() * 180;
                this.brightness = 0.7 + Math.random() * 0.5;
            }

            update() {
                this.distance += this.speed;

                this.x = Math.cos(this.angle) * this.distance;
                this.y = Math.sin(this.angle) * this.distance;

                this.trail.unshift({ x: this.x, y: this.y, dist: this.distance });
                if (this.trail.length > this.maxTrail) this.trail.pop();

                const maxDist = Math.max(width, height) * 0.9;
                if (this.distance > maxDist) {
                    this.reset();
                }

                let t = Math.min(1, this.distance / (Math.max(width, height) * 0.7));
                this.currentBrightness = this.brightness * (0.4 + t * 1.2);
                this.currentSize = this.baseSize * (0.5 + t * 1.8);
            }

            draw() {
                const screenX = centerX + this.x;
                const screenY = centerY + this.y;

                if (screenX < -50 || screenX > width + 50 || screenY < -50 || screenY > height + 50) return;

                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailX = centerX + t.x;
                    const trailY = centerY + t.y;
                    const trailFactor = 1 - (i / this.trail.length);
                    const trailAlpha = 0.5 * trailFactor * (this.currentBrightness || 0.6);
                    const trailSize = (this.currentSize || this.baseSize) * (0.4 + trailFactor * 0.4);

                    ctx.beginPath();
                    ctx.arc(trailX, trailY, trailSize, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 65%, ${trailAlpha})`;
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.arc(screenX, screenY, this.currentSize, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, ${55 + this.currentBrightness * 25}%)`;
                ctx.shadowBlur = 12;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 65%)`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(screenX - 1, screenY - 1, this.currentSize * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 210, ${0.7 + this.currentBrightness * 0.3})`;
                ctx.fill();
            }
        }

        let stars = [];
        const STAR_COUNT = 400;

        let centralGlow = 0;

        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push(new WarpStar());
            }
        }

        function resizeCanvas() {
            dpr = Math.max(1, window.devicePixelRatio || 1);
            width = Math.max(1, window.innerWidth);
            height = Math.max(1, window.innerHeight);
            canvas.width = Math.floor(width * dpr);
            canvas.height = Math.floor(height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            centerX = width / 2;
            centerY = height / 2;
            initStars();
            initStreaks();
        }

        function drawBackground() {
            const grad = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, Math.max(width, height) * 0.8);
            grad.addColorStop(0, '#020410');
            grad.addColorStop(0.5, '#010208');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'rgba(255, 255, 200, 0.3)';
            for (let i = 0; i < 300; i++) {
                if (Math.random() > 0.97) {
                    ctx.fillRect((i * 131) % width, (i * 253) % height, 1, 1);
                }
            }
        }

        function drawCentralGlow() {
            centralGlow = 0.4 + Math.sin(Date.now() * 0.008) * 0.2;
            const grad = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 70);
            grad.addColorStop(0, `rgba(80, 160, 255, ${0.25 + centralGlow * 0.15})`);
            grad.addColorStop(0.6, `rgba(40, 80, 160, 0.1)`);
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            ctx.beginPath();
            ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 220, 255, 0.8)`;
            ctx.fill();
        }

        function updateStars() {
            for (let star of stars) {
                star.update();
            }
        }

        function drawStars() {
            for (let star of stars) {
                star.draw();
            }
        }

        const STREAK_COUNT = 80;

        class WarpStreak {
            constructor() {
                this.reset();
            }
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.length = 20 + Math.random() * 100;
                this.speed = 2 + Math.random() * 6;
                this.progress = Math.random();
                this.hue = 200 + Math.random() * 140;
            }
            update() {
                this.progress += this.speed * 0.008;
                if (this.progress >= 1) {
                    this.progress = 0;
                    this.angle = Math.random() * Math.PI * 2;
                }
            }
            draw() {
                const startDist = this.progress * Math.max(width, height) * 0.9;
                const endDist = startDist + this.length;
                const startX = centerX + Math.cos(this.angle) * startDist;
                const startY = centerY + Math.sin(this.angle) * startDist;
                const endX = centerX + Math.cos(this.angle) * endDist;
                const endY = centerY + Math.sin(this.angle) * endDist;

                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `hsla(${this.hue}, 90%, 65%, ${0.15 * (1 - this.progress)})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        let warpStreaks = [];
        function initStreaks() {
            warpStreaks = [];
            for (let i = 0; i < STREAK_COUNT; i++) {
                warpStreaks.push(new WarpStreak());
            }
        }

        function updateStreaks() {
            for (let s of warpStreaks) s.update();
        }

        function drawStreaks() {
            for (let s of warpStreaks) s.draw();
        }

        let lastTimestamp = performance.now();
        const frameDelay = 1000 / 60;

        function animate(currentTime) {
            requestAnimationFrame(animate);
            const delta = currentTime - lastTimestamp;
            if (delta < frameDelay) return;
            lastTimestamp = currentTime;

            updateStars();
            updateStreaks();

            drawBackground();
            drawStreaks();
            drawStars();
            drawCentralGlow();

            ctx.shadowBlur = 0;
        }

        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();
        requestAnimationFrame(animate);
    })();
</script>
</body>
</html>
