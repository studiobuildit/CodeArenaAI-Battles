<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Flappy Bird AI</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

let bird, pipes, clouds, score;

function reset() {
  bird = { x: 120, y: H/2, vy: 0 };
  pipes = [];
  clouds = [];
  score = 0;
}

reset();

const GRAVITY = 0.5;
const FLAP = -9;
const PIPE_WIDTH = 80;
const GAP = 220;
const SPEED = 3;

for (let i = 0; i < 6; i++) {
  clouds.push({
    x: Math.random() * W,
    y: Math.random() * (H * 0.5),
    speed: 0.5 + Math.random()
  });
}

function spawnPipe() {
  const gapY = 200 + Math.random() * (H - 400);
  pipes.push({
    x: W + 100,
    gapY
  });
}

function aiControl() {
  if (pipes.length === 0) return;

  const next = pipes.find(p => p.x + PIPE_WIDTH > bird.x) || pipes[0];
  const target = next.gapY;

  if (bird.y > target + 20) {
    bird.vy = FLAP;
  }
}

let frame = 0;
function update() {
  frame++;

  bird.vy += GRAVITY;
  bird.y += bird.vy;

  aiControl();

  if (frame % 90 === 0) spawnPipe();

  pipes.forEach(p => {
    p.x -= SPEED;

    if (
      bird.x > p.x && bird.x < p.x + PIPE_WIDTH &&
      (bird.y < p.gapY - GAP/2 || bird.y > p.gapY + GAP/2)
    ) {
      reset();
    }

    if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
      p.passed = true;
      score++;
    }
  });

  pipes = pipes.filter(p => p.x > -200);

  if (bird.y > H - 40 || bird.y < 0) {
    reset();
  }

  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x < -100) {
      c.x = W + 100;
      c.y = Math.random() * (H * 0.5);
    }
  });
}

function draw() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle = "#70c5ce";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw/W)*dpr,0,0,(vph/H)*dpr,0,0);

  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#70c5ce");
  g.addColorStop(1,"#d0f4f7");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  clouds.forEach(c => {
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.arc(c.x, c.y, 30, 0, Math.PI*2);
    ctx.arc(c.x+30, c.y+10, 25, 0, Math.PI*2);
    ctx.arc(c.x-30, c.y+10, 25, 0, Math.PI*2);
    ctx.fill();
  });

  pipes.forEach(p => {
    ctx.fillStyle = "#3cb043";
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.gapY - GAP/2);
    ctx.fillRect(p.x, p.gapY + GAP/2, PIPE_WIDTH, H);
  });

  ctx.fillStyle = "#ded895";
  ctx.fillRect(0, H-40, W, 40);

  ctx.fillStyle = "#ffcc00";
  ctx.fillRect(bird.x-10, bird.y-10, 20, 20);

  ctx.fillStyle = "#000";
  ctx.fillRect(bird.x+5, bird.y-5, 4, 4);

  ctx.fillStyle = "#000";
  ctx.font = "bold 48px monospace";
  ctx.textAlign = "center";
  ctx.fillText(score, W/2, 80);
}

function animate() {
  update();
  draw();
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
