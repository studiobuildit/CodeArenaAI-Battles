<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0c12;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;width:100vw}canvas{display:block;width:min(86vw,86vh);height:min(86vw,86vh);border-radius:12px;box-shadow:0 0 0 2px #2aff6e20}</style></head><body><canvas id="s"></canvas><script>
const c=document.getElementById('s'),ctx=c.getContext('2d');const SIZE=600,N=20,C=SIZE/N;let dpr=1;function sync(){dpr=Math.max(1,devicePixelRatio||1);c.width=Math.floor(SIZE*dpr);c.height=Math.floor(SIZE*dpr);ctx.setTransform(dpr,0,0,dpr,0,0)}
const D={U:{x:0,y:-1},D:{x:0,y:1},L:{x:-1,y:0},R:{x:1,y:0}};let snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}],food={x:12,y:12},score=0;
function genFood(){do{food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)}}while(snake.some(s=>s.x===food.x&&s.y===food.y))}
function ai(){const h=snake[0],dirs=[D.U,D.R,D.D,D.L];dirs.sort((a,b)=>(Math.abs(h.x+a.x-food.x)+Math.abs(h.y+a.y-food.y))-(Math.abs(h.x+b.x-food.x)+Math.abs(h.y+b.y-food.y)));for(const d of dirs){const p={x:h.x+d.x,y:h.y+d.y};if(p.x>=0&&p.y>=0&&p.x<N&&p.y<N&&!snake.slice(0,-1).some(s=>s.x===p.x&&s.y===p.y))return d}return D.R}
function step(){const d=ai(),h={x:snake[0].x+d.x,y:snake[0].y+d.y};if(h.x<0||h.y<0||h.x>=N||h.y>=N||snake.some(s=>s.x===h.x&&s.y===h.y)){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];score=0;genFood();return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score++;genFood()}else snake.pop()}
function draw(){sync();ctx.fillStyle='#03070f';ctx.fillRect(0,0,SIZE,SIZE);ctx.fillStyle='#ff3366';ctx.beginPath();ctx.arc(food.x*C+C/2,food.y*C+C/2,C*.4,0,Math.PI*2);ctx.fill();snake.forEach((s,i)=>{const g=ctx.createLinearGradient(s.x*C,s.y*C,s.x*C+C,s.y*C+C);g.addColorStop(0,'#4aff6e');g.addColorStop(1,'#00cc44');ctx.fillStyle=g;ctx.fillRect(s.x*C+1,s.y*C+1,C-2,C-2)})}
setInterval(()=>{step();draw()},120);addEventListener('resize',sync);sync();genFood();draw();
</script></body></html>
