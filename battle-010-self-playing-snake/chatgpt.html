<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Auto Snake AI</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;width:100vw;height:100vh}canvas{display:block;width:100vw;height:100vh}</style></head><body><canvas id="c"></canvas><script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');const LOG=400,COLS=40,ROWS=40,SIZE=LOG/COLS;let vpw=innerWidth,vph=innerHeight,dpr=1;function sync(){dpr=Math.max(1,devicePixelRatio||1);vpw=Math.max(1,innerWidth);vph=Math.max(1,innerHeight);canvas.width=Math.floor(vpw*dpr);canvas.height=Math.floor(vph*dpr)}function frame(){sync();ctx.setTransform((vpw/LOG)*dpr,0,0,(vph/LOG)*dpr,0,0)}
let snake,food,score;function reset(){snake=[{x:20,y:20}],food=spawnFood(),score=0}function spawnFood(){return{x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}function hit(x,y){if(x<0||x>=COLS||y<0||y>=ROWS)return true;return snake.some(s=>s.x===x&&s.y===y)}
function dir(){const h=snake[0],d=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];d.sort((a,b)=>(Math.abs(h.x+a.x-food.x)+Math.abs(h.y+a.y-food.y))-(Math.abs(h.x+b.x-food.x)+Math.abs(h.y+b.y-food.y)));for(const k of d){if(!hit(h.x+k.x,h.y+k.y))return k}return d[0]}
function update(){const d=dir(),h={x:snake[0].x+d.x,y:snake[0].y+d.y};if(hit(h.x,h.y)){reset();return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score++;food=spawnFood()}else snake.pop()}
function draw(){frame();ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,0,LOG,LOG);ctx.strokeStyle='rgba(0,255,150,.03)';for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*SIZE,0);ctx.lineTo(i*SIZE,LOG);ctx.stroke()}for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*SIZE);ctx.lineTo(LOG,i*SIZE);ctx.stroke()}ctx.fillStyle='#ff3366';ctx.shadowBlur=12;ctx.shadowColor='#ff3366';ctx.fillRect(food.x*SIZE,food.y*SIZE,SIZE,SIZE);ctx.shadowBlur=0;snake.forEach((s,i)=>{ctx.fillStyle=`rgba(0,255,120,${1-i*.02})`;ctx.shadowBlur=8;ctx.shadowColor='#00ff88';ctx.fillRect(s.x*SIZE,s.y*SIZE,SIZE,SIZE)});ctx.shadowBlur=0;ctx.fillStyle='#00ff88';ctx.font='12px monospace';ctx.fillText('Score: '+score,10,16)}
function loop(){update();draw()}sync();addEventListener('resize',sync);reset();setInterval(loop,60);
</script></body></html>
