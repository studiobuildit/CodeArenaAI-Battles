<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#00ff00;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;width:100vw}#score{font-size:18px;margin-bottom:8px}canvas{display:block;width:min(86vw,86vh);height:min(86vw,86vh);border:2px solid #333;background:#000}</style></head><body><div id="score">Score: 0</div><canvas id="g"></canvas><script>
const c=document.getElementById('g'),x=c.getContext('2d'),scoreEl=document.getElementById('score');const LOG=500,grid=20,N=25;let dpr=1;function sync(){dpr=Math.max(1,devicePixelRatio||1);c.width=Math.floor(LOG*dpr);c.height=Math.floor(LOG*dpr);x.setTransform(dpr,0,0,dpr,0,0)}
let snake=[{x:10,y:10}],food={x:5,y:5},score=0,last=0,speed=55;function body(p){return snake.some(s=>s.x===p.x&&s.y===p.y)}function coll(p){return p.x<0||p.y<0||p.x>=N||p.y>=N||body(p)}
function path(start,target){let q=[[start]],v=new Set([`${start.x},${start.y}`]);while(q.length){let p=q.shift(),n=p[p.length-1];if(n.x===target.x&&n.y===target.y)return p.slice(1);for(let d of [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]){let m={x:n.x+d.x,y:n.y+d.y},k=`${m.x},${m.y}`;if(m.x>=0&&m.y>=0&&m.x<N&&m.y<N&&!body(m)&&!v.has(k)){v.add(k);q.push([...p,m])}}}return null}
function safe(h){return [{x:h.x+1,y:h.y},{x:h.x-1,y:h.y},{x:h.x,y:h.y+1},{x:h.x,y:h.y-1}].find(p=>p.x>=0&&p.y>=0&&p.x<N&&p.y<N&&!body(p))}
function spawn(){do{food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)}}while(body(food))}
function step(){const h=snake[0],p=path(h,food),n=(p&&p[0])||safe(h);if(!n||coll(n)){snake=[{x:10,y:10}];score=0;scoreEl.textContent='Score: 0';spawn();return}snake.unshift(n);if(n.x===food.x&&n.y===food.y){score+=10;scoreEl.textContent='Score: '+score;spawn()}else snake.pop()}
function draw(){sync();x.fillStyle='#000';x.fillRect(0,0,LOG,LOG);x.fillStyle='#ff3131';x.shadowBlur=12;x.shadowColor='#ff3131';x.fillRect(food.x*grid+2,food.y*grid+2,grid-4,grid-4);x.shadowBlur=0;x.shadowBlur=8;x.shadowColor='#00ff00';snake.forEach((s,i)=>{x.fillStyle=i?'#00ff00':'#fff';x.fillRect(s.x*grid+1,s.y*grid+1,grid-2,grid-2)});x.shadowBlur=0}
function loop(ts){if(ts-last>speed){step();last=ts}draw();requestAnimationFrame(loop)}
addEventListener('resize',sync);sync();spawn();requestAnimationFrame(loop);
</script></body></html>
