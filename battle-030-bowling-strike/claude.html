<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bowling Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #game {
    display: block;
    background: #000;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>
<script>
(() => {
  const LOGICAL_W = 540;
  const LOGICAL_H = 960;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const ratio = LOGICAL_W / LOGICAL_H;
    let cssW, cssH;
    if (vw / vh > ratio) {
      cssH = vh;
      cssW = vh * ratio;
    } else {
      cssW = vw;
      cssH = vw / ratio;
    }
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width = Math.floor(LOGICAL_W * dpr);
    canvas.height = Math.floor(LOGICAL_H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const W = LOGICAL_W;
  const H = LOGICAL_H;
  const LANE_X = 90;
  const LANE_W = W - 180;
  const LANE_RIGHT = LANE_X + LANE_W;
  const LANE_TOP = 80;
  const LANE_BOTTOM = H - 60;
  const PIN_DECK_Y = 180;
  const BALL_START_Y = H - 110;
  const PIN_R = 12;

  let pins = [];
  function setupPins() {
    pins = [];
    const centerX = (LANE_X + LANE_RIGHT) / 2;
    const frontY = PIN_DECK_Y + 60;
    const sX = 26, sY = 22;
    pins.push(makePin(centerX, frontY));
    pins.push(makePin(centerX - sX / 2, frontY - sY));
    pins.push(makePin(centerX + sX / 2, frontY - sY));
    pins.push(makePin(centerX - sX, frontY - sY * 2));
    pins.push(makePin(centerX, frontY - sY * 2));
    pins.push(makePin(centerX + sX, frontY - sY * 2));
    pins.push(makePin(centerX - sX * 1.5, frontY - sY * 3));
    pins.push(makePin(centerX - sX * 0.5, frontY - sY * 3));
    pins.push(makePin(centerX + sX * 0.5, frontY - sY * 3));
    pins.push(makePin(centerX + sX * 1.5, frontY - sY * 3));
  }

  function makePin(x, y) {
    return { x, y, homeX:x, homeY:y, vx:0, vy:0, r:PIN_R, standing:true, spin:0, fallen:0 };
  }
  setupPins();

  const ball = { x: W/2, y: BALL_START_Y, vx:0, vy:0, r:16, spin:0, trail:[] };
  let gameState = 'aiming';
  let stateTimer = 90;
  let frameNum = 1;
  let totalScore = 0;
  let resultText = '';
  let resultTimer = 0;

  function startNewRoll() {
    gameState = 'aiming';
    stateTimer = 80;
    setupPins();
    ball.x = W/2 + (Math.random() - 0.5) * 80;
    ball.y = BALL_START_Y;
    ball.vx = 0;
    ball.vy = 0;
    ball.trail = [];
  }

  function launchBall() {
    gameState = 'rolling';
    ball.vy = -(10 + Math.random() * 2);
    ball.vx = ((LANE_X + LANE_RIGHT) / 2 - ball.x) * 0.04;
  }

  function knockPin(p) {
    if (!p.standing) return;
    p.standing = false;
    p.vx = (Math.random() - 0.5) * 3 + ball.vx * 0.4;
    p.vy = (Math.random() - 0.5) * 3 + ball.vy * 0.4;
    p.fallen = 1;
  }

  function update() {
    if (gameState === 'aiming') {
      stateTimer--;
      ball.x += Math.sin(Date.now() * 0.004) * 0.8;
      if (stateTimer <= 0) launchBall();
    } else if (gameState === 'rolling') {
      ball.x += ball.vx;
      ball.y += ball.vy;
      ball.vx *= 0.995;
      ball.spin += 0.2;

      ball.trail.push({ x: ball.x, y: ball.y, life: 1 });
      if (ball.trail.length > 20) ball.trail.shift();
      ball.trail.forEach(t => t.life -= 0.05);

      if (ball.x < LANE_X + ball.r) { ball.x = LANE_X + ball.r; ball.vx *= -0.4; }
      if (ball.x > LANE_RIGHT - ball.r) { ball.x = LANE_RIGHT - ball.r; ball.vx *= -0.4; }

      for (const p of pins) {
        if (!p.standing) continue;
        const dx = ball.x - p.x;
        const dy = ball.y - p.y;
        if (dx*dx + dy*dy < (ball.r + p.r) * (ball.r + p.r)) knockPin(p);
      }

      if (ball.y < PIN_DECK_Y - 80) {
        const knocked = pins.filter(p => !p.standing).length;
        totalScore += knocked;
        resultText = knocked === 10 ? 'STRIKE!' : `${knocked} PINS`;
        resultTimer = 90;
        gameState = 'result';
      }
    } else if (gameState === 'result') {
      resultTimer--;
      if (resultTimer <= 0) {
        frameNum++;
        if (frameNum > 10) { frameNum = 1; totalScore = 0; }
        startNewRoll();
      }
    }

    for (const p of pins) {
      if (p.standing) continue;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.96; p.vy *= 0.96;
      p.spin += (p.vx + p.vy) * 0.02;
      p.fallen = Math.min(1.4, p.fallen + 0.05);
    }
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a0614');
    g.addColorStop(1,'#060410');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
    const laneGrad = ctx.createLinearGradient(LANE_X,0,LANE_RIGHT,0);
    laneGrad.addColorStop(0,'#6b4423');
    laneGrad.addColorStop(0.5,'#8d5a2b');
    laneGrad.addColorStop(1,'#6b4423');
    ctx.fillStyle = laneGrad;
    ctx.fillRect(LANE_X, LANE_TOP, LANE_W, LANE_BOTTOM - LANE_TOP);
  }

  function drawPins() {
    for (const p of pins) {
      ctx.save();
      ctx.translate(p.x, p.y);
      if (!p.standing) ctx.rotate(p.spin);
      if (p.standing) {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#cc2222';
        ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0,0,p.r-3,0,Math.PI*2); ctx.stroke();
      } else {
        ctx.fillStyle = '#ddd';
        ctx.beginPath(); ctx.ellipse(0,0,p.r*1.8,p.r*0.9,0,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawBall() {
    for (const t of ball.trail) {
      if (t.life <= 0) continue;
      ctx.fillStyle = `rgba(120,160,255,${t.life*0.2})`;
      ctx.beginPath(); ctx.arc(t.x,t.y,ball.r*0.9,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#2a55d6';
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0,0,W,68);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 20px monospace';
    ctx.fillText(`FRAME ${frameNum}/10`, 14, 28);
    ctx.fillStyle = '#55ff77';
    ctx.font = 'bold 30px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(String(totalScore).padStart(3,'0'), W-14, 36);
    ctx.textAlign = 'start';
    if (resultTimer > 0 && resultText) {
      ctx.fillStyle = resultText === 'STRIKE!' ? '#ffd54a' : '#fff';
      ctx.font = 'bold 52px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(resultText, W/2, H/2);
      ctx.textAlign = 'start';
    }
  }

  function loop() {
    update();
    drawBackground();
    drawPins();
    if (gameState !== 'result') drawBall();
    drawHUD();
    requestAnimationFrame(loop);
  }

  startNewRoll();
  loop();
})();
</script>
</body>
</html>
