<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Pong: CRT Retro Duel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: black;
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: black;
        }

        body {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        (function() {
            const LOGICAL_W = 540;
            const LOGICAL_H = 960;

            const PADDLE_WIDTH = 10;
            const PADDLE_HEIGHT = 80;
            const BALL_SIZE = 8;
            
            const BASE_SPEED = 200;
            const MAX_SPEED = 800;
            const SPEED_INCREMENT = 12;
            const AI_MAX_SPEED = 480;
            
            const TOP_WALL = 0;
            const BOTTOM_WALL = LOGICAL_H;
            const LEFT_WALL = 0;
            const RIGHT_WALL = LOGICAL_W;
            const MIN_PADDLE_Y = 0;
            const MAX_PADDLE_Y = LOGICAL_H - PADDLE_HEIGHT;
            
            let leftScore = 0;
            let rightScore = 0;
            
            let leftPaddleY = LOGICAL_H/2 - PADDLE_HEIGHT/2;
            let rightPaddleY = LOGICAL_H/2 - PADDLE_HEIGHT/2;
            
            let ball = {
                x: LOGICAL_W/2,
                y: LOGICAL_H/2,
                vx: BASE_SPEED * (Math.random() > 0.5 ? 1 : -1),
                vy: (Math.random() * 140 - 70)
            };
            
            if (Math.abs(ball.vy) < 50) ball.vy = (ball.vy > 0 ? 60 : -60);
            
            let lastTimestamp = 0;
            let animationId = null;
            
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            let canvasWidth = 0, canvasHeight = 0;
            let scaleX = 1, scaleY = 1;
            
            function resizeCanvas() {
                const drawWidth = window.innerWidth;
                const drawHeight = window.innerHeight;
                canvas.width = drawWidth * devicePixelRatio;
                canvas.height = drawHeight * devicePixelRatio;
                canvas.style.width = `${drawWidth}px`;
                canvas.style.height = `${drawHeight}px`;
                
                const physicalW = canvas.width;
                const physicalH = canvas.height;
                scaleX = physicalW / LOGICAL_W;
                scaleY = physicalH / LOGICAL_H;
            }
            
            function updateAI(paddleY, ballY, deltaSec, isLeft) {
                let targetY = ballY - PADDLE_HEIGHT/2;
                targetY = Math.min(MAX_PADDLE_Y, Math.max(MIN_PADDLE_Y, targetY));
                
                let diff = targetY - paddleY;
                let move = 0;
                if (Math.abs(diff) > 1) {
                    move = Math.min(AI_MAX_SPEED * deltaSec, Math.abs(diff));
                    move *= Math.sign(diff);
                }
                let newY = paddleY + move;
                newY = Math.min(MAX_PADDLE_Y, Math.max(MIN_PADDLE_Y, newY));
                return newY;
            }
            
            function updateGame(deltaSec) {
                if (deltaSec > 0.025) deltaSec = 0.025;
                
                let newX = ball.x + ball.vx * deltaSec;
                let newY = ball.y + ball.vy * deltaSec;
                
                if (newY <= TOP_WALL) {
                    newY = TOP_WALL + 1;
                    ball.vy = -ball.vy;
                    let speed = Math.hypot(ball.vx, ball.vy);
                    let newSpeed = Math.min(MAX_SPEED, speed + SPEED_INCREMENT * 0.6);
                    let ratio = newSpeed / speed;
                    ball.vx *= ratio;
                    ball.vy *= ratio;
                } else if (newY + BALL_SIZE >= BOTTOM_WALL) {
                    newY = BOTTOM_WALL - BALL_SIZE - 1;
                    ball.vy = -ball.vy;
                    let speed = Math.hypot(ball.vx, ball.vy);
                    let newSpeed = Math.min(MAX_SPEED, speed + SPEED_INCREMENT * 0.6);
                    let ratio = newSpeed / speed;
                    ball.vx *= ratio;
                    ball.vy *= ratio;
                }
                
                if (ball.vx < 0 && newX <= LEFT_WALL + PADDLE_WIDTH && 
                    newX + BALL_SIZE >= LEFT_WALL && 
                    newY + BALL_SIZE > leftPaddleY && newY < leftPaddleY + PADDLE_HEIGHT) {
                    
                    let hitPos = (newY + BALL_SIZE/2) - (leftPaddleY + PADDLE_HEIGHT/2);
                    let normalized = hitPos / (PADDLE_HEIGHT/2);
                    normalized = Math.min(0.9, Math.max(-0.9, normalized));
                    let angle = normalized * (Math.PI / 3);
                    let rawSpeed = Math.hypot(ball.vx, ball.vy);
                    let newSpeed = Math.min(MAX_SPEED, rawSpeed + SPEED_INCREMENT);
                    let direction = 1;
                    let newVx = Math.abs(Math.cos(angle) * newSpeed) * direction;
                    let newVy = Math.sin(angle) * newSpeed;
                    
                    ball.vx = newVx;
                    ball.vy = newVy;
                    newX = LEFT_WALL + PADDLE_WIDTH + 1;
                }
                else if (ball.vx > 0 && newX + BALL_SIZE >= RIGHT_WALL - PADDLE_WIDTH &&
                         newX <= RIGHT_WALL && 
                         newY + BALL_SIZE > rightPaddleY && newY < rightPaddleY + PADDLE_HEIGHT) {
                    
                    let hitPos = (newY + BALL_SIZE/2) - (rightPaddleY + PADDLE_HEIGHT/2);
                    let normalized = hitPos / (PADDLE_HEIGHT/2);
                    normalized = Math.min(0.9, Math.max(-0.9, normalized));
                    let angle = normalized * (Math.PI / 3);
                    let rawSpeed = Math.hypot(ball.vx, ball.vy);
                    let newSpeed = Math.min(MAX_SPEED, rawSpeed + SPEED_INCREMENT);
                    let newVx = -Math.abs(Math.cos(angle) * newSpeed);
                    let newVy = Math.sin(angle) * newSpeed;
                    ball.vx = newVx;
                    ball.vy = newVy;
                    newX = RIGHT_WALL - PADDLE_WIDTH - BALL_SIZE - 1;
                }
                
                let scored = false;
                if (newX + BALL_SIZE < LEFT_WALL) {
                    rightScore++;
                    scored = true;
                } else if (newX > RIGHT_WALL) {
                    leftScore++;
                    scored = true;
                }
                
                if (scored) {
                    ball.x = LOGICAL_W/2 - BALL_SIZE/2;
                    ball.y = LOGICAL_H/2 - BALL_SIZE/2;
                    let baseVx = BASE_SPEED * (Math.random() > 0.5 ? 1 : -1);
                    let baseVy = (Math.random() * 140 - 70);
                    if (Math.abs(baseVy) < 45) baseVy = (baseVy > 0 ? 55 : -55);
                    ball.vx = baseVx;
                    ball.vy = baseVy;
                    let spd = Math.hypot(ball.vx, ball.vy);
                    if (spd < BASE_SPEED * 0.9) ball.vx = (ball.vx > 0 ? BASE_SPEED : -BASE_SPEED);
                    leftPaddleY = LOGICAL_H/2 - PADDLE_HEIGHT/2;
                    rightPaddleY = LOGICAL_H/2 - PADDLE_HEIGHT/2;
                } else {
                    ball.x = newX;
                    ball.y = newY;
                    ball.y = Math.min(BOTTOM_WALL - BALL_SIZE, Math.max(TOP_WALL, ball.y));
                    ball.x = Math.min(RIGHT_WALL - BALL_SIZE, Math.max(LEFT_WALL, ball.x));
                }
                
                leftPaddleY = updateAI(leftPaddleY, ball.y + BALL_SIZE/2, deltaSec, true);
                rightPaddleY = updateAI(rightPaddleY, ball.y + BALL_SIZE/2, deltaSec, false);
            }
            
            function drawCRTBackground() {
                ctx.fillStyle = "#0a1a0a";
                ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
                
                ctx.beginPath();
                ctx.strokeStyle = "#1f3a1f";
                ctx.lineWidth = 0.5;
                for (let y = 0; y < LOGICAL_H; y += 6) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(LOGICAL_W, y);
                    ctx.stroke();
                }
                ctx.beginPath();
                ctx.strokeStyle = "#143214";
                ctx.lineWidth = 0.3;
                for (let x = 0; x < LOGICAL_W; x += 12) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, LOGICAL_H);
                    ctx.stroke();
                }
            }
            
            function drawPaddles() {
                ctx.fillStyle = "#3aff3a";
                ctx.shadowBlur = 0;
                ctx.fillRect(LEFT_WALL, leftPaddleY, PADDLE_WIDTH, PADDLE_HEIGHT);
                ctx.fillRect(RIGHT_WALL - PADDLE_WIDTH, rightPaddleY, PADDLE_WIDTH, PADDLE_HEIGHT);
                ctx.fillStyle = "#88ff88";
                ctx.globalAlpha = 0.5;
                ctx.fillRect(LEFT_WALL, leftPaddleY, PADDLE_WIDTH, PADDLE_HEIGHT);
                ctx.fillRect(RIGHT_WALL - PADDLE_WIDTH, rightPaddleY, PADDLE_WIDTH, PADDLE_HEIGHT);
                ctx.globalAlpha = 1;
            }
            
            function drawBall() {
                ctx.fillStyle = "#ccff66";
                ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);
                ctx.fillStyle = "#ffffaa";
                ctx.fillRect(ball.x + 2, ball.y + 2, BALL_SIZE - 4, BALL_SIZE - 4);
            }
            
            function drawScores() {
                ctx.font = `bold ${Math.floor(LOGICAL_W * 0.09)}px "Courier New", monospace`;
                ctx.fillStyle = "#3aff3a";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText(leftScore.toString(), LOGICAL_W * 0.25, LOGICAL_H * 0.1);
                ctx.fillText(rightScore.toString(), LOGICAL_W * 0.75, LOGICAL_H * 0.1);
                
                ctx.beginPath();
                ctx.setLineDash([12, 18]);
                ctx.strokeStyle = "#3aff3a";
                ctx.lineWidth = 3;
                ctx.moveTo(LOGICAL_W/2, 0);
                ctx.lineTo(LOGICAL_W/2, LOGICAL_H);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            function drawScanlineOverlay() {
                ctx.globalCompositeOperation = "overlay";
                ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
                for (let i = 0; i < LOGICAL_H; i += 2) {
                    ctx.fillRect(0, i, LOGICAL_W, 1);
                }
                ctx.globalCompositeOperation = "source-over";
                const gradient = ctx.createRadialGradient(LOGICAL_W/2, LOGICAL_H/2, LOGICAL_H*0.3, LOGICAL_W/2, LOGICAL_H/2, LOGICAL_H*0.8);
                gradient.addColorStop(0, "rgba(0,0,0,0)");
                gradient.addColorStop(1, "rgba(0,10,0,0.55)");
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
                
                ctx.fillStyle = "rgba(70, 255, 70, 0.02)";
                for (let i = 0; i < 30; i++) {
                    ctx.fillRect(0, Math.random() * LOGICAL_H, LOGICAL_W, 1);
                }
            }
            
            function renderFrame() {
                if (!ctx) return;
                
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);
                
                drawCRTBackground();
                drawPaddles();
                drawBall();
                drawScores();
                drawScanlineOverlay();
                
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.globalCompositeOperation = "lighter";
                ctx.fillStyle = "rgba(20, 255, 20, 0.03)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = "source-over";
                ctx.globalAlpha = 1.0;
            }
            
            let previousTime = null;
            function gameLoop(nowMs) {
                if (!previousTime) {
                    previousTime = nowMs;
                    requestAnimationFrame(gameLoop);
                    renderFrame();
                    return;
                }
                
                let delta = Math.min(0.033, (nowMs - previousTime) / 1000);
                if (delta <= 0) {
                    previousTime = nowMs;
                    requestAnimationFrame(gameLoop);
                    renderFrame();
                    return;
                }
                
                updateGame(delta);
                renderFrame();
                previousTime = nowMs;
                animationId = requestAnimationFrame(gameLoop);
            }
            
            function handleResize() {
                resizeCanvas();
                if (ctx) renderFrame();
            }
            
            function onPixelRatioChange() {
                handleResize();
            }
            
            window.addEventListener('resize', () => {
                handleResize();
            });
            window.addEventListener('orientationchange', () => {
                setTimeout(handleResize, 30);
            });
            
            resizeCanvas();
            previousTime = null;
            animationId = requestAnimationFrame(gameLoop);
            
            window.addEventListener('load', () => {
                handleResize();
            });
        })();
    </script>
</body>
</html>
