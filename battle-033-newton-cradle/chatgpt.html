<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Newton's Cradle</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
}
canvas{
  display:block;
  background:#000;
  touch-action:none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
(() => {
  const W = 540, H = 960;
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  let scale = 1, dpr = 1;

  function resize(){
    const vw = innerWidth, vh = innerHeight;
    scale = Math.min(vw / W, vh / H);

    const cw = Math.round(W * scale);
    const ch = Math.round(H * scale);

    canvas.style.width = cw + "px";
    canvas.style.height = ch + "px";

    dpr = Math.max(1, Math.min(3, devicePixelRatio || 1));
    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);

    ctx.setTransform(dpr * scale,0,0,dpr * scale,0,0);
    ctx.imageSmoothingEnabled = true;
  }
  addEventListener("resize", resize, {passive:true});
  resize();

  const TAU = Math.PI * 2;

  const cradle = {
    count: 5,
    spacing: 52,
    radius: 24,
    stringLen: 250,
    topY: 220,
    centerX: W/2
  };

  let state = "leftSwing"; // leftSwing rightSwing settle
  let amp = 0.92;
  let phase = 0;
  let flash = 0;
  let flashSide = -1;

  function restart(){
    state = "leftSwing";
    amp = 0.92;
    phase = 0;
    flash = 0;
    flashSide = -1;
  }

  function update(){
    phase += 0.045;

    if(state === "leftSwing"){
      // left ball moving from left max to center then right ball receives energy
      if(phase >= Math.PI){
        phase = 0;
        state = "rightSwing";
        amp *= 0.93;
        flash = 10;
        flashSide = 0;
      }
    } else if(state === "rightSwing"){
      if(phase >= Math.PI){
        phase = 0;
        state = "leftSwing";
        amp *= 0.93;
        flash = 10;
        flashSide = 1;
      }
    }

    if(amp < 0.08){
      amp -= 0.002;
      if(amp <= 0){
        restart();
      }
    }

    if(flash > 0) flash--;
  }

  function getBallAngle(i){
    // 0..4
    if(state === "leftSwing"){
      if(i === 0){
        // cos from max left to center
        return -amp * Math.cos(phase);
      }
      return 0;
    } else {
      if(i === cradle.count-1){
        return amp * Math.cos(phase);
      }
      return 0;
    }
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#050505");
    g.addColorStop(0.6,"#101010");
    g.addColorStop(1,"#000");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  }

  function drawStand(){
    ctx.strokeStyle = "#555";
    ctx.lineWidth = 8;
    ctx.lineCap = "round";

    // legs
    ctx.beginPath();
    ctx.moveTo(120,760);
    ctx.lineTo(160,220);
    ctx.moveTo(420,760);
    ctx.lineTo(380,220);
    ctx.stroke();

    // top beam
    ctx.beginPath();
    ctx.moveTo(140,220);
    ctx.lineTo(400,220);
    ctx.stroke();

    // base
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(90,770);
    ctx.lineTo(450,770);
    ctx.stroke();
  }

  function drawBalls(){
    const startX = cradle.centerX - ((cradle.count-1)*cradle.spacing)/2;

    let centers = [];

    for(let i=0;i<cradle.count;i++){
      const pivotX = startX + i*cradle.spacing;
      const pivotY = cradle.topY;

      const ang = getBallAngle(i);

      const bx = pivotX + Math.sin(ang) * cradle.stringLen;
      const by = pivotY + Math.cos(ang) * cradle.stringLen;

      centers.push({x:bx,y:by});

      // strings
      ctx.strokeStyle = "#aaa";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pivotX,pivotY);
      ctx.lineTo(bx,by);
      ctx.stroke();
    }

    // contact flash center
    if(flash > 0){
      const alpha = flash / 10;
      const fx = flashSide === 0 ? centers[1].x - 18 : centers[3].x + 18;
      const fy = centers[2].y;

      const rg = ctx.createRadialGradient(fx,fy,2,fx,fy,28);
      rg.addColorStop(0,"rgba(255,255,255,"+(0.9*alpha)+")");
      rg.addColorStop(0.4,"rgba(120,220,255,"+(0.55*alpha)+")");
      rg.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.arc(fx,fy,28,0,TAU);
      ctx.fill();
    }

    // balls
    for(let i=0;i<cradle.count;i++){
      const c = centers[i];

      // shadow
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.beginPath();
      ctx.ellipse(c.x, c.y+cradle.radius+10, cradle.radius*0.95, 8, 0, 0, TAU);
      ctx.fill();

      const grad = ctx.createRadialGradient(
        c.x - cradle.radius*0.45,
        c.y - cradle.radius*0.55,
        4,
        c.x,
        c.y,
        cradle.radius
      );
      grad.addColorStop(0,"#ffffff");
      grad.addColorStop(0.18,"#d9d9d9");
      grad.addColorStop(0.55,"#7c7c7c");
      grad.addColorStop(1,"#2d2d2d");

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(c.x,c.y,cradle.radius,0,TAU);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(c.x,c.y,cradle.radius,0,TAU);
      ctx.stroke();
    }
  }

  function drawHUD(){
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.fillRect(16,16,190,44);

    ctx.fillStyle = "#ddd";
    ctx.font = "bold 22px Arial";
    ctx.fillText("NEWTON'S CRADLE", 26, 44);
  }

  function render(){
    drawBackground();
    drawStand();
    drawBalls();
    drawHUD();
  }

  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }

  restart();
  loop();
})();
</script>
</body>
</html>
