<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Sky Fireworks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
<canvas id="fireworksCanvas"></canvas>
<script>
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');

    let vpw = window.innerWidth, vph = window.innerHeight, dpr = 1;
    function resizeCanvas() {
        dpr = Math.max(1, window.devicePixelRatio || 1);
        vpw = window.innerWidth;
        vph = window.innerHeight;
        canvas.width = Math.max(1, Math.floor(vpw * dpr));
        canvas.height = Math.max(1, Math.floor(vph * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resizeCanvas();

    let particles = [];
    let rockets = [];

    class Rocket {
        constructor() {
            this.x = Math.random() * vpw;
            this.y = vph;
            this.targetY = Math.random() * (vph * 0.5);
            this.velY = -(Math.random() * 5 + 8);
            this.hue = Math.floor(Math.random() * 360);
            this.active = true;
        }

        update() {
            this.y += this.velY;
            this.velY += 0.1;

            if (this.velY >= 0 || this.y <= this.targetY) {
                this.explode();
                this.active = false;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
            ctx.fill();
        }

        explode() {
            const count = Math.random() * 60 + 40;
            const pattern = Math.random();
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(this.x, this.y, this.hue, pattern));
            }
        }
    }

    class Particle {
        constructor(x, y, hue, pattern) {
            this.x = x;
            this.y = y;
            this.hue = hue + (Math.random() * 20 - 10);
            this.life = 1.0;
            this.decay = Math.random() * 0.02 + 0.01;

            const angle = Math.random() * Math.PI * 2;
            let speed;

            if (pattern > 0.8) {
                speed = Math.random() * 8 + 2;
            } else {
                speed = Math.random() * 4 + 1;
            }

            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.gravity = 0.08;
            this.friction = 0.96;
        }

        update() {
            this.vx *= this.friction;
            this.vy *= this.friction;
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
        }

        draw() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = this.life;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
            ctx.shadowBlur = 5;
            ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
            ctx.fill();
            ctx.restore();
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, vpw, vph);

        if (Math.random() < 0.05) {
            rockets.push(new Rocket());
        }

        for (let i = rockets.length - 1; i >= 0; i--) {
            rockets[i].update();
            rockets[i].draw();
            if (!rockets[i].active) rockets.splice(i, 1);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resizeCanvas);

    animate();
</script>
</body>
</html>
