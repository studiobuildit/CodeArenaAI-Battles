<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireworks Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: black;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 400, H = 400;
let vpw = window.innerWidth, vph = window.innerHeight, dpr = 1;
function syncViewport() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = Math.max(1, Math.floor(vpw * dpr));
  canvas.height = Math.max(1, Math.floor(vph * dpr));
}
syncViewport();
window.addEventListener("resize", syncViewport);

const rockets = [];
const particles = [];

function randomColor() {
  const hue = Math.floor(Math.random() * 360);
  return `hsl(${hue},100%,60%)`;
}

function launchRocket() {
  rockets.push({
    x: 50 + Math.random() * (W - 100),
    y: H,
    vx: (Math.random() - 0.5) * 1,
    vy: -5 - Math.random() * 2,
    targetY: 100 + Math.random() * 150,
    color: randomColor()
  });
}

function explode(x, y, baseColor) {
  const count = 60 + Math.random() * 60;

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;

    particles.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 60 + Math.random() * 40,
      maxLife: 100,
      size: 2 + Math.random() * 2,
      color: baseColor
    });
  }
}

function updateRockets() {
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    r.x += r.vx;
    r.y += r.vy;

    ctx.fillStyle = r.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = r.color;
    ctx.fillRect(r.x, r.y, 2, 6);
    ctx.shadowBlur = 0;

    if (r.y <= r.targetY) {
      explode(r.x, r.y, r.color);
      rockets.splice(i, 1);
    }
  }

  if (Math.random() < 0.05) {
    launchRocket();
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    p.vy += 0.05;
    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.99;
    p.vy *= 0.99;

    p.life--;

    const alpha = p.life / p.maxLife;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

    ctx.fillStyle = p.color.replace("60%", `${40 + alpha * 20}%`);
    ctx.globalAlpha = alpha;

    ctx.shadowBlur = 15;
    ctx.shadowColor = p.color;
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function animate() {
  syncViewport();
  ctx.setTransform((vpw / W) * dpr, 0, 0, (vph / H) * dpr, 0, 0);

  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, W, H);

  updateRockets();
  updateParticles();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
