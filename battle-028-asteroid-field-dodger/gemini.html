<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Space Autopilot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            display: block;
            image-rendering: auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const W = 540;
        const H = 960;

        let score = 0;
        let speedMult = 1;
        let frameCount = 0;

        const stars = [];
        const asteroids = [];
        const lasers = [];
        const fragments = [];

        const ship = {
            x: W / 2,
            y: H - 150,
            w: 40,
            h: 50,
            targetX: W / 2,
            laserCooldown: 0
        };

        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                size: Math.random() * 2,
                v: 1 + Math.random() * 3
            });
        }

        function spawnAsteroid() {
            const size = 30 + Math.random() * 50;
            asteroids.push({
                x: Math.random() * W,
                y: -size,
                size: size,
                rot: Math.random() * Math.PI * 2,
                rotV: (Math.random() - 0.5) * 0.05,
                v: (2 + Math.random() * 3) * speedMult,
                hp: Math.ceil(size / 20)
            });
        }

        function createFragments(x, y, color) {
            for (let i = 0; i < 8; i++) {
                fragments.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function resetGame() {
            score = 0;
            speedMult = 1;
            asteroids.length = 0;
            lasers.length = 0;
            fragments.length = 0;
            ship.x = W / 2;
        }

        function resize() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            // Use "cover" fit to remove letterboxing/black bars.
            const scale = Math.max(vw / W, vh / H);
            const cssW = Math.round(W * scale);
            const cssH = Math.round(H * scale);
            const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));

            // Keep canvas sizing stable inside iframe normalizers.
            canvas.style.setProperty('width', cssW + 'px', 'important');
            canvas.style.setProperty('height', cssH + 'px', 'important');
            canvas.width = Math.round(cssW * dpr);
            canvas.height = Math.round(cssH * dpr);
            ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
            ctx.imageSmoothingEnabled = true;
        }

        function update() {
            frameCount++;
            speedMult = 1 + (score / 5000);

            stars.forEach(s => {
                s.y += s.v * speedMult;
                if (s.y > H) s.y = 0;
            });

            let nearest = null;
            let minDist = Infinity;
            asteroids.forEach(a => {
                const dy = ship.y - a.y;
                if (dy > 0 && dy < minDist) {
                    minDist = dy;
                    nearest = a;
                }
            });

            if (nearest) {
                ship.targetX = nearest.x;
            } else {
                ship.targetX = W / 2;
            }

            ship.x += (ship.targetX - ship.x) * 0.15;

            if (ship.laserCooldown <= 0) {
                lasers.push({ x: ship.x, y: ship.y - 20, v: 12 });
                ship.laserCooldown = 15;
            }
            if (ship.laserCooldown > 0) ship.laserCooldown--;

            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= lasers[i].v;
                if (lasers[i].y < -20) lasers.splice(i, 1);
            }

            if (frameCount % Math.max(10, Math.floor(40 / speedMult)) === 0) spawnAsteroid();

            for (let i = asteroids.length - 1; i >= 0; i--) {
                const a = asteroids[i];
                a.y += a.v;
                a.rot += a.rotV;

                lasers.forEach((l, lIdx) => {
                    const dist = Math.hypot(l.x - a.x, l.y - a.y);
                    if (dist < a.size) {
                        a.hp--;
                        lasers.splice(lIdx, 1);
                        createFragments(l.x, l.y, '#0ff');
                        score += 10;
                    }
                });

                const shipDist = Math.hypot(ship.x - a.x, ship.y - a.y);
                if (shipDist < a.size + 15) {
                    createFragments(ship.x, ship.y, '#f00');
                    resetGame();
                    return;
                }

                if (a.hp <= 0) {
                    createFragments(a.x, a.y, '#888');
                    score += 50;
                    asteroids.splice(i, 1);
                } else if (a.y > H + 100) {
                    asteroids.splice(i, 1);
                }
            }

            for (let i = fragments.length - 1; i >= 0; i--) {
                const f = fragments[i];
                f.x += f.vx;
                f.y += f.vy;
                f.life -= 0.03;
                if (f.life <= 0) fragments.splice(i, 1);
            }

            score++;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.globalAlpha = s.size / 2;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1;

            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 3;
            lasers.forEach(l => {
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x, l.y + 15);
                ctx.stroke();
            });

            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 2;
            asteroids.forEach(a => {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.rot);
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const r = a.size * (0.8 + Math.random() * 0.2);
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fillStyle = '#222';
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });

            fragments.forEach(f => {
                ctx.fillStyle = f.color;
                ctx.globalAlpha = f.life;
                ctx.fillRect(f.x, f.y, 3, 3);
            });
            ctx.globalAlpha = 1;

            ctx.save();
            ctx.translate(ship.x, ship.y);
            const glow = (Math.sin(frameCount * 0.5) + 1) * 5;
            ctx.fillStyle = '#f60';
            ctx.beginPath();
            ctx.moveTo(-10, 20);
            ctx.lineTo(0, 30 + glow);
            ctx.lineTo(10, 20);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(20, 20);
            ctx.lineTo(0, 10);
            ctx.lineTo(-20, 20);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#0cf';
            ctx.fillRect(-5, -5, 10, 10);
            ctx.restore();

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 30px monospace';
            ctx.textAlign = 'right';
            ctx.fillText(score.toString().padStart(6, '0'), W - 20, 50);

            ctx.textAlign = 'left';
            ctx.font = '16px monospace';
            ctx.fillStyle = '#0ff';
            ctx.fillText(`WARP: x${speedMult.toFixed(1)}`, 20, 50);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize, { passive: true });
        window.addEventListener('load', () => requestAnimationFrame(resize), { once: true });
        resize();
        loop();
    </script>
</body>
</html>
