<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aurora Borealis | Northern Lights</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>
<body>
<canvas id="auroraCanvas"></canvas>

<script>
    (function(){
        const canvas = document.getElementById('auroraCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 540;
        const H = 960;
        let time = 0;
        const STAR_COUNT = 450;
        let stars = [];
        let auroraLayers = [];
        let mountainPoints = [];
        
        function rand(min, max) {
            return min + Math.random() * (max - min);
        }
        
        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: rand(0, W),
                    y: rand(0, H * 0.75),
                    radius: rand(0.8, 2.2),
                    alpha: rand(0.3, 0.9),
                    twinkleSpeed: rand(0.5, 2.5),
                    twinklePhase: rand(0, Math.PI * 2)
                });
            }
        }
        
        function drawStars() {
            for (let star of stars) {
                const twinkle = 0.5 + 0.5 * Math.sin(time * star.twinkleSpeed + star.twinklePhase);
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 240, 200, ${star.alpha * (0.4 + twinkle * 0.6)})`;
                ctx.fill();
            }
        }
        
        class AuroraLayer {
            constructor(yOffset, colorHue, speed, intensity, widthFactor) {
                this.yOffset = yOffset;
                this.colorHue = colorHue;
                this.speed = speed;
                this.intensity = intensity;
                this.widthFactor = widthFactor;
                this.wave1Freq = rand(0.008, 0.018);
                this.wave2Freq = rand(0.022, 0.038);
                this.wave3Freq = rand(0.045, 0.065);
                this.noiseSeed = rand(0, 100);
            }
            
            getIntensityAt(x, t) {
                let yWave = 0;
                yWave += Math.sin(x * this.wave1Freq + t * this.speed) * 0.35;
                yWave += Math.sin(x * this.wave2Freq + t * this.speed * 1.3) * 0.25;
                yWave += Math.sin(x * this.wave3Freq + t * this.speed * 0.7) * 0.2;
                return Math.max(0, Math.min(1, (yWave + 0.55) * 0.9));
            }
            
            draw(t) {
                const steps = 38;
                const stepWidth = W / steps;
                
                for (let i = 0; i < steps; i++) {
                    const x = i * stepWidth;
                    const xCenter = x + stepWidth / 2;
                    const intensityVal = this.getIntensityAt(xCenter, t);
                    const columnHeight = 70 + intensityVal * 130;
                    const topY = this.yOffset - columnHeight * 0.6;
                    const bottomY = this.yOffset + columnHeight * 0.3;
                    const grad = ctx.createLinearGradient(x, topY, x + stepWidth, bottomY);
                    const alphaBase = this.intensity * (0.35 + intensityVal * 0.45);
                    const hue1 = this.colorHue;
                    const hue2 = (this.colorHue + 40) % 360;
                    const hue3 = (this.colorHue - 30 + 360) % 360;
                    
                    grad.addColorStop(0, `hsla(${hue1}, 85%, 65%, ${alphaBase * 0.4})`);
                    grad.addColorStop(0.4, `hsla(${hue2}, 90%, 70%, ${alphaBase * 0.8})`);
                    grad.addColorStop(0.8, `hsla(${hue3}, 85%, 60%, ${alphaBase * 0.6})`);
                    grad.addColorStop(1, `hsla(${hue1}, 80%, 50%, ${alphaBase * 0.2})`);
                    
                    ctx.fillStyle = grad;
                    ctx.fillRect(x, topY, stepWidth + 1, bottomY - topY);
                    
                    ctx.globalCompositeOperation = 'lighter';
                    const glowGrad = ctx.createLinearGradient(x, topY, x + stepWidth, bottomY - 15);
                    glowGrad.addColorStop(0, `hsla(${hue2}, 95%, 75%, ${alphaBase * 0.3})`);
                    glowGrad.addColorStop(1, `hsla(${hue1}, 85%, 60%, 0)`);
                    ctx.fillStyle = glowGrad;
                    ctx.fillRect(x, topY - 5, stepWidth + 1, (bottomY - topY) * 0.7);
                    ctx.globalCompositeOperation = 'source-over';
                }
                
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 24; i++) {
                    const xOffset = (i * 35 + t * 18) % W;
                    const intensityBlend = this.getIntensityAt(xOffset, t);
                    if (intensityBlend > 0.4) {
                        const streakHeight = 8 + intensityBlend * 18;
                        const streakY = this.yOffset - 25 + Math.sin(xOffset * 0.03 + t * 1.5) * 28;
                        ctx.fillStyle = `hsla(${this.colorHue + 15}, 90%, 72%, ${intensityBlend * 0.25})`;
                        ctx.fillRect(xOffset - 12, streakY, 28, streakHeight);
                    }
                }
                ctx.globalCompositeOperation = 'source-over';
            }
        }
        
        function initAurora() {
            auroraLayers = [
                new AuroraLayer(H * 0.28, 145, 0.32, 0.7, 1.2),
                new AuroraLayer(H * 0.35, 280, 0.28, 0.65, 1.1),
                new AuroraLayer(H * 0.22, 175, 0.38, 0.6, 1.3),
                new AuroraLayer(H * 0.42, 310, 0.25, 0.55, 1.0),
                new AuroraLayer(H * 0.18, 135, 0.42, 0.5, 1.15)
            ];
        }
        
        function generateMountains() {
            mountainPoints = [];
            const segments = 38;
            const step = W / segments;
            for (let i = 0; i <= segments; i++) {
                const x = i * step;
                let y;
                if (i === 0 || i === segments) {
                    y = H - 25;
                } else {
                    const peakFactor = Math.sin(i * 0.45) * 0.3 + Math.sin(i * 1.2) * 0.2;
                    const spike = Math.random() > 0.7 ? Math.random() * 28 : 0;
                    y = H - 95 + Math.sin(i * 0.7) * 32 + peakFactor * 25 + spike;
                    y = Math.min(H - 45, Math.max(H - 160, y));
                }
                mountainPoints.push({ x, y });
            }
        }
        
        function drawMountains() {
            if (mountainPoints.length < 2) return;
            
            ctx.beginPath();
            ctx.moveTo(0, H);
            for (let p of mountainPoints) ctx.lineTo(p.x, p.y);
            ctx.lineTo(W, H);
            ctx.closePath();
            
            const grad = ctx.createLinearGradient(0, H - 150, 0, H);
            grad.addColorStop(0, "#1a2838");
            grad.addColorStop(0.6, "#0e1622");
            grad.addColorStop(1, "#050810");
            ctx.fillStyle = grad;
            ctx.fill();
            
            for (let i = 1; i < mountainPoints.length - 1; i++) {
                const p = mountainPoints[i];
                const prev = mountainPoints[i-1];
                const next = mountainPoints[i+1];
                if (p.y < prev.y && p.y < next.y && p.y < H - 100) {
                    ctx.beginPath();
                    ctx.moveTo(p.x - 9, p.y);
                    ctx.lineTo(p.x, p.y - 11);
                    ctx.lineTo(p.x + 9, p.y);
                    ctx.fillStyle = `rgba(210, 225, 245, ${0.35 + Math.sin(time * 0.8 + i) * 0.1})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y - 2, 7, 4, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(230, 240, 255, 0.4)`;
                    ctx.fill();
                }
            }
            
            ctx.fillStyle = "#0a1018";
            for (let i = 0; i < W; i += 12) {
                const yBase = H - 48 + Math.sin(i * 0.08) * 12;
                ctx.fillRect(i, yBase - 18, 3, 22);
                ctx.fillRect(i + 4, yBase - 12, 2, 18);
            }
        }
        
        function drawMountainGlow() {
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 45; i++) {
                const x = (i * 17 + time * 20) % W;
                const y = H - 65 + Math.sin(x * 0.03 + time) * 18;
                ctx.fillStyle = `rgba(100, 180, 140, 0.08)`;
                ctx.fillRect(x - 15, y, 30, 12);
            }
            ctx.globalCompositeOperation = 'source-over';
        }
        
        function drawMist() {
            const mistGrad = ctx.createLinearGradient(0, H - 90, 0, H);
            mistGrad.addColorStop(0, "rgba(80, 120, 100, 0)");
            mistGrad.addColorStop(0.6, "rgba(60, 100, 90, 0.2)");
            mistGrad.addColorStop(1, "rgba(40, 70, 60, 0.4)");
            ctx.fillStyle = mistGrad;
            ctx.fillRect(0, H - 100, W, 100);
        }
        
        let shimmerParticles = [];
        const SHIMMER_COUNT = 180;
        
        class ShimmerParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = rand(0, W);
                this.y = rand(H * 0.2, H * 0.65);
                this.size = rand(0.8, 2.2);
                this.alpha = rand(0.1, 0.4);
                this.speedX = rand(-0.2, 0.2);
                this.speedY = rand(-0.1, -0.4);
                this.life = rand(0.5, 1.0);
                this.hue = rand(120, 300);
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.004;
                if (this.life <= 0.02 || this.y < H * 0.15 || this.x > W + 30 || this.x < -30) {
                    this.reset();
                    this.life = 0.9;
                    this.y = H * 0.65;
                    this.x = rand(0, W);
                }
                this.hue = (this.hue + 0.5) % 360;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.alpha * this.life * 0.6})`;
                ctx.fill();
            }
        }
        
        function initShimmer() {
            for (let i = 0; i < SHIMMER_COUNT; i++) shimmerParticles.push(new ShimmerParticle());
        }
        
        let dpr = window.devicePixelRatio || 1;
        let viewportW = window.innerWidth;
        let viewportH = window.innerHeight;
        
        function resizeCanvas() {
            viewportW = window.innerWidth;
            viewportH = window.innerHeight;
            canvas.width = viewportW * dpr;
            canvas.height = viewportH * dpr;
            canvas.style.width = `${viewportW}px`;
            canvas.style.height = `${viewportH}px`;
        }
        
        function applyTransform() {
            const scaleX = (viewportW * dpr) / W;
            const scaleY = (viewportH * dpr) / H;
            ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);
        }
        
        function animate() {
            time += 0.022;
            for (let p of shimmerParticles) p.update();
            applyTransform();
            
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.6);
            skyGrad.addColorStop(0, "#03061a");
            skyGrad.addColorStop(0.7, "#08142a");
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);
            
            drawStars();
            for (let layer of auroraLayers) layer.draw(time);
            
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = `hsla(160, 80%, 55%, 0.03)`;
                ctx.fillRect(0, 0, W, H * 0.7);
            }
            ctx.globalCompositeOperation = 'source-over';
            
            drawMountains();
            drawMountainGlow();
            drawMist();
            for (let p of shimmerParticles) p.draw();
            ctx.globalCompositeOperation = 'source-over';
        }
        
        function init() {
            initStars();
            initAurora();
            generateMountains();
            initShimmer();
        }
        
        window.addEventListener('resize', () => {
            dpr = window.devicePixelRatio || 1;
            resizeCanvas();
            applyTransform();
        });
        
        init();
        resizeCanvas();
        applyTransform();
        setInterval(() => {
            requestAnimationFrame(animate);
        }, 16);
        animate();
    })();
</script>
</body>
</html>
