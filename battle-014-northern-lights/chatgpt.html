<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Northern Lights</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

const stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H * 0.7,
    size: Math.random() * 2,
    phase: Math.random() * Math.PI * 2
  });
}

const layers = [
  { color: "rgba(0,255,150,0.25)", amp: 60, speed: 0.002, offset: 0 },
  { color: "rgba(100,255,200,0.2)", amp: 80, speed: 0.0015, offset: 2 },
  { color: "rgba(180,100,255,0.18)", amp: 70, speed: 0.0025, offset: 4 }
];

let t = 0;

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#020412");
  g.addColorStop(1, "#000000");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  stars.forEach(s => {
    s.phase += 0.02;
    const alpha = 0.5 + Math.sin(s.phase) * 0.5;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
}

function drawAurora() {
  layers.forEach(layer => {
    ctx.beginPath();

    for (let x = 0; x <= W; x += 2) {
      const y = 200 +
        Math.sin(x * 0.01 + t * layer.speed * 200 + layer.offset) * layer.amp +
        Math.sin(x * 0.02 + t * 0.002) * 30;

      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.lineTo(W, 0);
    ctx.lineTo(0, 0);
    ctx.closePath();

    const grad = ctx.createLinearGradient(0, 0, 0, 400);
    grad.addColorStop(0, layer.color);
    grad.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = grad;
    ctx.globalCompositeOperation = "lighter";
    ctx.fill();
    ctx.globalCompositeOperation = "source-over";
  });
}

function drawMountains() {
  ctx.fillStyle = "#050505";
  ctx.beginPath();

  ctx.moveTo(0, H);

  for (let x = 0; x <= W; x += 20) {
    const y = H - 120 - Math.sin(x * 0.01) * 40;
    ctx.lineTo(x, y);
  }

  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
}

function animate() {
  t++;

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw/W)*dpr, 0, 0, (vph/H)*dpr, 0, 0);

  drawSky();
  drawStars();
  drawAurora();
  drawMountains();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
