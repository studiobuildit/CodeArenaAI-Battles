<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Borealis</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
}
canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 540, H = 960;
let dpr = window.devicePixelRatio || 1;
let vpw = window.innerWidth;
let vph = window.innerHeight;

function resize() {
    dpr = window.devicePixelRatio || 1;
    vpw = window.innerWidth;
    vph = window.innerHeight;
    canvas.width = Math.floor(vpw * dpr);
    canvas.height = Math.floor(vph * dpr);
}

window.addEventListener('resize', resize);
resize();

const stars = [];
for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.7,
        size: Math.random() * 1.5 + 0.5,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.02 + 0.01
    });
}

const auroraLayers = [
    { color: [0, 255, 128], yOffset: 0, amplitude: 60, speed: 0.0003, opacity: 0.4 },
    { color: [128, 0, 255], yOffset: 80, amplitude: 50, speed: 0.0004, opacity: 0.35 },
    { color: [0, 200, 255], yOffset: 150, amplitude: 70, speed: 0.00025, opacity: 0.3 },
    { color: [100, 255, 100], yOffset: 250, amplitude: 55, speed: 0.00035, opacity: 0.25 }
];

let time = 0;

function drawStars() {
    stars.forEach(s => {
        s.twinkle += s.speed;
        const alpha = 0.3 + Math.sin(s.twinkle) * 0.7;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawAuroraLayer(layer, t) {
    const points = [];
    const segments = 30;
    
    for (let i = 0; i <= segments; i++) {
        const x = (i / segments) * W;
        const baseY = H * 0.3 + layer.yOffset;
        const wave1 = Math.sin(x * 0.01 + t * layer.speed * 1000) * layer.amplitude;
        const wave2 = Math.sin(x * 0.005 + t * layer.speed * 800 + 1) * layer.amplitude * 0.5;
        const wave3 = Math.sin(x * 0.02 + t * layer.speed * 1200 + 2) * layer.amplitude * 0.3;
        const y = baseY + wave1 + wave2 + wave3;
        points.push({ x, y });
    }
    
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    const [r, g, b] = layer.color;
    grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0)`);
    grad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${layer.opacity})`);
    grad.addColorStop(0.6, `rgba(${r * 0.8}, ${g * 0.6}, ${b * 1.2}, ${layer.opacity * 0.8})`);
    grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, H);
    
    for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[i];
        const p1 = points[i + 1];
        const midX = (p0.x + p1.x) / 2;
        const midY = (p0.y + p1.y) / 2;
        if (i === 0) ctx.lineTo(p0.x, p0.y);
        ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
    }
    
    ctx.lineTo(W, points[points.length - 1].y);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
    
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < points.length - 1; i += 2) {
        const p = points[i];
        const shimmer = Math.sin(t * 3 + i * 0.5) * 0.5 + 0.5;
        ctx.fillStyle = `rgba(255, 255, 255, ${shimmer * 0.1})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y + 20, 30, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
}

function drawMountains() {
    ctx.fillStyle = '#0a0a15';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, H - 180);
    
    for (let x = 0; x <= W; x += 30) {
        const height = H - 180 - Math.sin(x * 0.02) * 40 - Math.sin(x * 0.05) * 20;
        ctx.lineTo(x, height);
    }
    
    ctx.lineTo(W, H - 180);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#050508';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, H - 120);
    
    for (let x = 0; x <= W; x += 20) {
        const height = H - 120 - Math.sin(x * 0.03 + 1) * 30 - Math.sin(x * 0.08) * 15;
        ctx.lineTo(x, height);
    }
    
    ctx.lineTo(W, H - 120);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = 'rgba(200, 220, 255, 0.15)';
    ctx.beginPath();
    ctx.moveTo(0, H);
    
    for (let x = 0; x <= W; x += 20) {
        const height = H - 120 - Math.sin(x * 0.03 + 1) * 30 - Math.sin(x * 0.08) * 15;
        if (height < H - 140) {
            ctx.lineTo(x, height);
            ctx.lineTo(x + 10, height + 8);
        } else {
            ctx.lineTo(x, H);
        }
    }
    
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
}

function animate() {
    ctx.setTransform((vpw/W) * dpr, 0, 0, (vph/H) * dpr, 0, 0);
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#000011');
    skyGrad.addColorStop(0.3, '#0a0a1a');
    skyGrad.addColorStop(0.7, '#0f0f1f');
    skyGrad.addColorStop(1, '#1a1a2a');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);
    
    time += 0.016;
    drawStars();
    auroraLayers.forEach(layer => drawAuroraLayer(layer, time));
    drawMountains();
    
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
