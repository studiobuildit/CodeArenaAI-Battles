<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Sea Jellyfish</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #00050a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            image-rendering: auto;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const W = 540;
        const H = 960;

        class Jellyfish {
            constructor() {
                this.reset();
                this.y = Math.random() * H;
            }

            reset() {
                this.x = Math.random() * W;
                this.y = H + 100;
                this.size = 30 + Math.random() * 40;
                this.speedY = 0.5 + Math.random() * 1;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                this.color = Math.random() > 0.5 ? '100, 150, 255' : '180, 100, 255';
                this.tentacles = [];
                for (let i = 0; i < 8; i++) {
                    this.tentacles.push({
                        phase: Math.random() * Math.PI * 2,
                        offset: (i - 3.5) * (this.size / 5)
                    });
                }
            }

            update() {
                this.pulse += this.pulseSpeed;
                const pulseFactor = Math.sin(this.pulse);
                const moveSpeed = this.speedY * (1 + pulseFactor * 0.5);
                this.y -= moveSpeed;
                this.x += Math.sin(this.pulse * 0.5) * 0.5;

                if (this.y < -this.size * 2) this.reset();
            }

            draw() {
                const s = Math.sin(this.pulse);
                const bellExpansion = 1 + s * 0.2;
                const bellFlatten = 1 - s * 0.2;

                ctx.save();
                ctx.translate(this.x, this.y);

                ctx.shadowBlur = 20;
                ctx.shadowColor = `rgba(${this.color}, 0.8)`;

                ctx.beginPath();
                ctx.strokeStyle = `rgba(${this.color}, 0.3)`;
                ctx.lineWidth = 2;
                this.tentacles.forEach((t, i) => {
                    ctx.moveTo(t.offset * bellExpansion, 0);
                    const tx = t.offset * bellExpansion + Math.sin(this.pulse + i) * 10;
                    const ty = this.size * 1.5 + Math.sin(this.pulse * 0.8 + i) * 15;
                    ctx.quadraticCurveTo(
                        t.offset * bellExpansion, this.size * 0.8,
                        tx, ty
                    );
                });
                ctx.stroke();

                ctx.beginPath();
                ctx.fillStyle = `rgba(${this.color}, 0.4)`;
                ctx.ellipse(0, 0, this.size * bellExpansion, this.size * 0.7 * bellFlatten, 0, Math.PI, 0);
                ctx.fill();
                
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, 0.2)`;
                ctx.ellipse(0, -this.size * 0.2, this.size * 0.6 * bellExpansion, this.size * 0.3, 0, Math.PI, 0);
                ctx.fill();

                ctx.restore();
            }
        }

        const jellies = Array.from({ length: 5 }, () => new Jellyfish());
        const particles = Array.from({ length: 80 }, () => ({
            x: Math.random() * W,
            y: Math.random() * H,
            size: Math.random() * 2,
            speed: 0.2 + Math.random() * 0.5
        }));

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const vpw = window.innerWidth;
            const vph = window.innerHeight;
            
            canvas.width = vpw * dpr;
            canvas.height = vph * dpr;
            canvas.style.width = vpw + 'px';
            canvas.style.height = vph + 'px';
        }

        function animate() {
            const dpr = window.devicePixelRatio || 1;
            const vpw = window.innerWidth;
            const vph = window.innerHeight;
            
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#000a12');
            grad.addColorStop(1, '#000205');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const scale = Math.min(vpw / W, vph / H);
            const offsetX = (vpw - W * scale) / 2;
            const offsetY = (vph - H * scale) / 2;
            ctx.setTransform(scale * dpr, 0, 0, scale * dpr, offsetX * dpr, offsetY * dpr);

            ctx.fillStyle = "rgba(200, 230, 255, 0.3)";
            particles.forEach(p => {
                p.y -= p.speed;
                if (p.y < 0) p.y = H;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            jellies.forEach(j => {
                j.update();
                j.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
