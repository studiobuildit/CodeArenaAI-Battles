<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Glowing Jellyfish | Deep Ocean Bioluminescence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000000;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: black;
        }
    </style>
</head>
<body>
    <canvas id="oceanCanvas"></canvas>

    <script>
        (function() {
            const LOGICAL_W = 540;
            const LOGICAL_H = 960;
            const JELLYFISH_COUNT = 5;
            
            class Jellyfish {
                constructor(x, y, sizeScale, hueShift, speedX, speedY, pulsePhaseOffset) {
                    this.x = x;
                    this.y = y;
                    this.sizeScale = sizeScale;
                    this.hueShift = hueShift;
                    this.speedX = speedX;
                    this.speedY = speedY;
                    this.pulsePhaseOffset = pulsePhaseOffset;
                    this.timeOffset = Math.random() * Math.PI * 2;
                    this.tentaclePhase = Math.random() * Math.PI * 2;
                    this.driftAngle = Math.random() * Math.PI * 2;
                    this.driftRadius = 20 + Math.random() * 35;
                    this.centerX = x;
                    this.centerY = y;
                }
                
                update(deltaSec, globalTime) {
                    this.driftAngle += 0.4 * deltaSec;
                    if (this.driftAngle > Math.PI * 2) this.driftAngle -= Math.PI * 2;
                    let driftX = Math.sin(this.driftAngle) * this.driftRadius * 0.3;
                    let driftY = Math.cos(this.driftAngle * 0.7) * this.driftRadius * 0.25;
                    this.x += this.speedX * deltaSec + driftX * deltaSec;
                    this.y += this.speedY * deltaSec + driftY * deltaSec;
                    if (this.x < -80) this.x = LOGICAL_W + 80;
                    if (this.x > LOGICAL_W + 80) this.x = -80;
                    if (this.y < -100) this.y = LOGICAL_H + 100;
                    if (this.y > LOGICAL_H + 100) this.y = -100;
                    this.tentaclePhase += 2.5 * deltaSec;
                    this.timeOffset += 1.2 * deltaSec;
                }
                
                draw(ctx, globalTime) {
                    const bellRadiusBase = 18 * this.sizeScale;
                    const pulse = 0.85 + Math.sin(globalTime * 3.2 + this.pulsePhaseOffset) * 0.12;
                    const bellRadiusX = bellRadiusBase * (0.9 + pulse * 0.1);
                    const bellRadiusY = bellRadiusBase * (0.7 + pulse * 0.2);
                    const centerX = this.x;
                    const centerY = this.y;
                    const baseHue = 0.55 + (this.hueShift * 0.25);
                    const glowIntensity = 0.7 + Math.sin(globalTime * 4 + this.pulsePhaseOffset) * 0.2;
                    
                    ctx.save();
                    ctx.shadowBlur = 0;
                    
                    for (let i = 3; i >= 1; i--) {
                        const alpha = 0.12 / i;
                        ctx.beginPath();
                        ctx.ellipse(centerX, centerY, bellRadiusX + i*3, bellRadiusY + i*2, 0, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${baseHue * 360}, 85%, 65%, ${alpha * glowIntensity})`;
                        ctx.fill();
                    }
                    
                    const gradient = ctx.createRadialGradient(
                        centerX - 3, centerY - 3, 3,
                        centerX, centerY, bellRadiusX * 0.9
                    );
                    gradient.addColorStop(0, `hsla(${baseHue * 360}, 90%, 70%, 0.9)`);
                    gradient.addColorStop(0.6, `hsla(${baseHue * 360}, 85%, 55%, 0.7)`);
                    gradient.addColorStop(1, `hsla(${baseHue * 360 + 20}, 80%, 45%, 0.5)`);
                    
                    ctx.beginPath();
                    ctx.ellipse(centerX, centerY, bellRadiusX, bellRadiusY, 0, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.ellipse(centerX - 2, centerY - 2, bellRadiusX * 0.3, bellRadiusY * 0.25, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${baseHue * 360 + 10}, 95%, 75%, 0.8)`;
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.strokeStyle = `hsla(${baseHue * 360}, 85%, 70%, 0.5)`;
                    ctx.lineWidth = 1.2;
                    for (let i = -2; i <= 2; i++) {
                        const angle = i * 0.7;
                        const xOff = Math.sin(angle) * bellRadiusX * 0.55;
                        const yOff = Math.cos(angle) * bellRadiusY * 0.55;
                        ctx.beginPath();
                        ctx.moveTo(centerX, centerY);
                        ctx.lineTo(centerX + xOff, centerY + yOff);
                        ctx.stroke();
                    }
                    
                    const tentacleCount = 8 + Math.floor(3 * this.sizeScale);
                    const tentacleLength = 28 * this.sizeScale + 8 * Math.sin(globalTime * 2.2 + this.timeOffset);
                    
                    ctx.beginPath();
                    ctx.lineCap = 'round';
                    for (let i = 0; i < tentacleCount; i++) {
                        const angleOffset = (i / tentacleCount) * Math.PI * 2;
                        const attachX = centerX + Math.sin(angleOffset) * bellRadiusX * 0.7;
                        const attachY = centerY + Math.cos(angleOffset) * bellRadiusY * 0.5 + 2;
                        const waveFreq = 1.8;
                        const waveAmp = 5 * this.sizeScale;
                        const timeFactor = globalTime * 2.0 + this.tentaclePhase + i;
                        const steps = 12;
                        let points = [];
                        for (let s = 0; s <= steps; s++) {
                            const t = s / steps;
                            const lengthRatio = t * tentacleLength;
                            const swayX = Math.sin(timeFactor * 1.5 + t * Math.PI * 2) * waveAmp * (1 - t * 0.4);
                            const swayY = Math.cos(timeFactor * 1.2 + t * 3) * waveAmp * 0.8 * (1 - t * 0.3);
                            const x = attachX + (Math.sin(angleOffset) * lengthRatio * 0.6) + swayX * t;
                            const y = attachY + (Math.cos(angleOffset + 0.5) * lengthRatio) + swayY * t + 4 * t;
                            points.push({x, y});
                        }
                        
                        ctx.beginPath();
                        ctx.moveTo(points[0].x, points[0].y);
                        for (let p = 1; p < points.length; p++) {
                            const cp1x = (points[p-1].x + points[p].x) / 2 + (Math.sin(p * 0.8 + timeFactor) * 1.2);
                            const cp1y = (points[p-1].y + points[p].y) / 2 + (Math.cos(p * 0.6 + timeFactor) * 1);
                            ctx.quadraticCurveTo(points[p-1].x, points[p-1].y, cp1x, cp1y);
                            ctx.lineTo(points[p].x, points[p].y);
                        }
                        ctx.strokeStyle = `hsla(${baseHue * 360 + 15}, 90%, 65%, 0.65)`;
                        ctx.lineWidth = 2.2 * this.sizeScale;
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(points[0].x, points[0].y);
                        for (let p = 1; p < points.length; p++) {
                            ctx.lineTo(points[p].x, points[p].y);
                        }
                        ctx.strokeStyle = `hsla(${baseHue * 360 + 30}, 95%, 70%, 0.45)`;
                        ctx.lineWidth = 1.0;
                        ctx.stroke();
                    }
                    
                    for (let i = 0; i < 12; i++) {
                        const ang = (i / 12) * Math.PI * 2;
                        const dotX = centerX + Math.sin(ang) * bellRadiusX * 0.85;
                        const dotY = centerY + Math.cos(ang) * bellRadiusY * 0.7;
                        ctx.beginPath();
                        ctx.arc(dotX, dotY, 1.2 * this.sizeScale, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${baseHue * 360 + 20}, 100%, 75%, 0.9)`;
                        ctx.fill();
                    }
                    
                    ctx.restore();
                }
            }
            
            const PLANKTON_COUNT = 180;
            class Plankton {
                constructor() {
                    this.x = Math.random() * LOGICAL_W;
                    this.y = Math.random() * LOGICAL_H;
                    this.size = 1 + Math.random() * 2.2;
                    this.speedY = 5 + Math.random() * 15;
                    this.speedX = (Math.random() - 0.5) * 8;
                    this.alpha = 0.3 + Math.random() * 0.5;
                    this.twinkleSpeed = 0.8 + Math.random() * 2;
                    this.phase = Math.random() * Math.PI * 2;
                    this.hue = 0.55 + Math.random() * 0.2;
                }
                
                update(deltaSec) {
                    this.x += this.speedX * deltaSec;
                    this.y -= this.speedY * deltaSec;
                    if (this.y < -10) {
                        this.y = LOGICAL_H + 10;
                        this.x = Math.random() * LOGICAL_W;
                    }
                    if (this.x < -10) this.x = LOGICAL_W + 10;
                    if (this.x > LOGICAL_W + 10) this.x = -10;
                    this.phase += this.twinkleSpeed * deltaSec;
                }
                
                draw(ctx, globalTime) {
                    const twinkle = 0.5 + Math.sin(globalTime * 3 + this.phase) * 0.5;
                    const alphaVal = Math.min(0.85, this.alpha * (0.4 + twinkle * 0.6));
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue * 360}, 85%, 70%, ${alphaVal * 0.7})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 1.2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue * 360 + 20}, 90%, 65%, ${alphaVal * 0.3})`;
                    ctx.fill();
                }
            }
            
            function drawDeepOcean(ctx, globalTime) {
                const grad = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
                grad.addColorStop(0, "#020c1a");
                grad.addColorStop(0.5, "#021024");
                grad.addColorStop(1, "#030b1a");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
                
                ctx.globalCompositeOperation = "lighter";
                for (let i = 0; i < 12; i++) {
                    const rayX = LOGICAL_W * (0.2 + Math.sin(globalTime * 0.2 + i) * 0.15);
                    const rayWidth = 25 + Math.sin(globalTime * 0.5 + i) * 8;
                    const gradRay = ctx.createLinearGradient(rayX, 0, rayX + rayWidth, LOGICAL_H * 0.5);
                    gradRay.addColorStop(0, "rgba(30, 80, 140, 0.04)");
                    gradRay.addColorStop(1, "rgba(10, 40, 90, 0)");
                    ctx.fillStyle = gradRay;
                    ctx.fillRect(rayX, 0, rayWidth, LOGICAL_H);
                }
                ctx.globalCompositeOperation = "source-over";
                
                ctx.fillStyle = "rgba(100, 180, 240, 0.2)";
                for (let i = 0; i < 60; i++) {
                    const bubbleX = (Math.sin(globalTime * 0.7 + i * 37) * 0.5 + 0.5) * LOGICAL_W;
                    const bubbleY = (Math.sin(globalTime * 0.3 + i * 13) * 0.3 + 0.6) * LOGICAL_H;
                    ctx.beginPath();
                    ctx.arc(bubbleX, bubbleY, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            const canvas = document.getElementById('oceanCanvas');
            const ctx = canvas.getContext('2d');
            
            let scaleX = 1, scaleY = 1;
            let vpw = 1, vph = 1;
            
            function resizeCanvas() {
                const drawWidth = window.innerWidth;
                const drawHeight = window.innerHeight;
                const dpr = window.devicePixelRatio || 1;
                canvas.width = drawWidth * dpr;
                canvas.height = drawHeight * dpr;
                canvas.style.width = `${drawWidth}px`;
                canvas.style.height = `${drawHeight}px`;
                
                scaleX = canvas.width / LOGICAL_W;
                scaleY = canvas.height / LOGICAL_H;
                vpw = drawWidth;
                vph = drawHeight;
            }
            
            let jellyfishArray = [];
            function initJellyfish() {
                for (let i = 0; i < JELLYFISH_COUNT; i++) {
                    const x = 80 + Math.random() * (LOGICAL_W - 160);
                    const y = 150 + Math.random() * (LOGICAL_H - 300);
                    const sizeScale = 0.65 + Math.random() * 0.85;
                    const hueShift = Math.random() * 0.35;
                    const speedX = (Math.random() - 0.5) * 18;
                    const speedY = (Math.random() - 0.5) * 12 - 4;
                    const pulsePhaseOffset = Math.random() * Math.PI * 2;
                    const j = new Jellyfish(x, y, sizeScale, hueShift, speedX, speedY, pulsePhaseOffset);
                    jellyfishArray.push(j);
                }
            }
            
            let planktonParticles = [];
            function initPlankton() {
                for (let i = 0; i < PLANKTON_COUNT; i++) planktonParticles.push(new Plankton());
            }
            
            let lastTimestamp = 0;
            let globalTime = 0;
            
            function updateAndDraw(nowMs) {
                if (!lastTimestamp) {
                    lastTimestamp = nowMs;
                    requestAnimationFrame(updateAndDraw);
                    return;
                }
                
                let delta = Math.min(0.033, (nowMs - lastTimestamp) / 1000);
                if (delta <= 0.001) {
                    lastTimestamp = nowMs;
                    requestAnimationFrame(updateAndDraw);
                    return;
                }
                
                globalTime += delta;
                for (let j of jellyfishArray) j.update(delta, globalTime);
                for (let p of planktonParticles) p.update(delta);
                
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);
                
                drawDeepOcean(ctx, globalTime);
                for (let p of planktonParticles) p.draw(ctx, globalTime);
                for (let j of jellyfishArray) j.draw(ctx, globalTime);
                
                ctx.globalCompositeOperation = "screen";
                ctx.fillStyle = "rgba(30, 80, 160, 0.03)";
                ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
                ctx.globalCompositeOperation = "source-over";
                
                ctx.fillStyle = "rgba(100, 150, 255, 0.25)";
                for (let i = 0; i < 30; i++) {
                    const flicker = Math.sin(globalTime * 3.5 + i) * 0.5 + 0.5;
                    const orbX = (Math.sin(globalTime * 0.9 + i) * 0.4 + 0.5) * LOGICAL_W;
                    const orbY = (Math.cos(globalTime * 0.7 + i * 2) * 0.3 + 0.7) * LOGICAL_H;
                    ctx.beginPath();
                    ctx.arc(orbX, orbY, 1.5 * flicker, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.globalCompositeOperation = "overlay";
                ctx.fillStyle = "rgba(0, 20, 60, 0.08)";
                for (let i = 0; i < 40; i++) {
                    ctx.fillRect(0, i * 24 + (globalTime * 20 % 48), LOGICAL_W, 1);
                }
                ctx.globalCompositeOperation = "source-over";
                
                lastTimestamp = nowMs;
                requestAnimationFrame(updateAndDraw);
            }
            
            function handleResize() {
                resizeCanvas();
                if (ctx) {
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    ctx.fillStyle = "#000000";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }
            
            window.addEventListener('resize', () => { handleResize(); });
            window.addEventListener('orientationchange', () => { setTimeout(handleResize, 30); });
            
            initJellyfish();
            initPlankton();
            handleResize();
            
            lastTimestamp = 0;
            requestAnimationFrame(updateAndDraw);
        })();
    </script>
</body>
</html>
