<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescent Jellyfish</title>
    <style>
        html, body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: black;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const W = 540;
        const H = 960;
        
        class Jellyfish {
            constructor(x, y, scale, hue) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.scale = scale;
                this.hue = hue;
                
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.02;
                
                this.swimPhase = Math.random() * Math.PI * 2;
                this.swimSpeed = 0.3 + Math.random() * 0.3;
                this.swimAmpX = 30 + Math.random() * 40;
                this.swimAmpY = 20 + Math.random() * 30;
                
                this.tentacles = [];
                const numTentacles = 6 + Math.floor(Math.random() * 4);
                for (let i = 0; i < numTentacles; i++) {
                    this.tentacles.push({
                        offset: (i / (numTentacles - 1)) - 0.5,
                        length: 80 + Math.random() * 60,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.05 + Math.random() * 0.05,
                        amp: 10 + Math.random() * 10
                    });
                }
            }
            
            update(time) {
                this.pulsePhase += this.pulseSpeed;
                this.swimPhase += this.swimSpeed * 0.01;
                this.x = this.baseX + Math.sin(this.swimPhase) * this.swimAmpX;
                this.y = this.baseY + Math.cos(this.swimPhase * 0.7) * this.swimAmpY;
                
                this.tentacles.forEach(tentacle => {
                    tentacle.phase += tentacle.speed;
                });
            }
            
            draw(ctx, time) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                
                const pulse = 1 + Math.sin(this.pulsePhase) * 0.15;
                
                ctx.shadowBlur = 30;
                ctx.shadowColor = `hsla(${this.hue}, 80%, 60%, 0.8)`;
                
                const bellWidth = 60 * pulse;
                const bellHeight = 45 * pulse;
                
                const outerGradient = ctx.createRadialGradient(0, -10, 0, 0, 0, bellWidth);
                outerGradient.addColorStop(0, `hsla(${this.hue}, 90%, 70%, 0.9)`);
                outerGradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 50%, 0.5)`);
                outerGradient.addColorStop(1, `hsla(${this.hue}, 70%, 40%, 0.1)`);
                
                ctx.fillStyle = outerGradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, bellWidth, bellHeight, 0, Math.PI, 0);
                ctx.fill();
                
                const innerGradient = ctx.createRadialGradient(0, -5, 0, 0, 0, bellWidth * 0.7);
                innerGradient.addColorStop(0, `hsla(${this.hue}, 100%, 80%, 0.6)`);
                innerGradient.addColorStop(1, `hsla(${this.hue}, 80%, 50%, 0.2)`);
                
                ctx.fillStyle = innerGradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, bellWidth * 0.8, bellHeight * 0.8, 0, Math.PI, 0);
                ctx.fill();
                
                ctx.strokeStyle = `hsla(${this.hue}, 90%, 70%, 0.6)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(0, 0, bellWidth, bellHeight, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${this.hue}, 70%, 60%, 0.6)`;
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 65%, 0.7)`;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                
                this.tentacles.forEach(tentacle => {
                    const startX = tentacle.offset * bellWidth * 0.7;
                    const startY = bellHeight * 0.5;
                    
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    
                    for (let i = 1; i <= 20; i++) {
                        const t = i / 20;
                        const wave = Math.sin(tentacle.phase + t * 3) * tentacle.amp * t;
                        const drift = Math.sin(time * 0.002 + tentacle.offset * 2) * 5 * t;
                        
                        const tx = startX + wave + drift;
                        const ty = startY + tentacle.length * t;
                        
                        ctx.lineTo(tx, ty);
                    }
                    
                    ctx.stroke();
                    
                    ctx.strokeStyle = `hsla(${this.hue}, 90%, 75%, 0.3)`;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.strokeStyle = `hsla(${this.hue}, 80%, 65%, 0.7)`;
                    ctx.lineWidth = 2;
                });
                
                ctx.strokeStyle = `hsla(${this.hue}, 85%, 70%, 0.5)`;
                ctx.lineWidth = 3;
                
                for (let i = -1; i <= 1; i += 2) {
                    ctx.beginPath();
                    ctx.moveTo(i * 10, bellHeight * 0.3);
                    
                    for (let j = 1; j <= 15; j++) {
                        const t = j / 15;
                        const wave = Math.sin(this.pulsePhase + t * 2 + i) * 8 * t;
                        const ax = i * 10 + wave;
                        const ay = bellHeight * 0.3 + 50 * t;
                        ctx.lineTo(ax, ay);
                    }
                    
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }
        
        class Plankton {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 0.3 + 0.1;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.hue = Math.random() > 0.5 ? 200 : 280;
                this.twinkle = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.twinkle += 0.05;
                
                if (this.y > H + 10) {
                    this.y = -10;
                    this.x = Math.random() * W;
                }
            }
            
            draw(ctx) {
                const alpha = this.opacity * (0.5 + 0.5 * Math.sin(this.twinkle));
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        const jellyfish = [
            new Jellyfish(W * 0.3, H * 0.25, 0.9, 220),
            new Jellyfish(W * 0.7, H * 0.35, 1.1, 280),
            new Jellyfish(W * 0.5, H * 0.55, 1.0, 200),
            new Jellyfish(W * 0.25, H * 0.7, 0.8, 260),
            new Jellyfish(W * 0.75, H * 0.8, 0.95, 240)
        ];
        
        const plankton = [];
        for (let i = 0; i < 150; i++) plankton.push(new Plankton());
        
        function init() {
            resize();
            window.addEventListener('resize', resize);
            requestAnimationFrame(animate);
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
        }
        
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#000510');
            gradient.addColorStop(0.3, '#000818');
            gradient.addColorStop(0.6, '#000a20');
            gradient.addColorStop(1, '#000c28');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            const rayGradient = ctx.createLinearGradient(0, 0, 0, H * 0.6);
            rayGradient.addColorStop(0, 'rgba(20, 40, 80, 0.15)');
            rayGradient.addColorStop(1, 'rgba(20, 40, 80, 0)');
            ctx.fillStyle = rayGradient;
            ctx.fillRect(0, 0, W, H * 0.6);
        }
        
        function drawBokeh(time) {
            ctx.globalCompositeOperation = 'screen';
            
            const orbs = [
                { x: W * 0.2, y: H * 0.3, r: 80, hue: 220 },
                { x: W * 0.8, y: H * 0.5, r: 100, hue: 280 },
                { x: W * 0.5, y: H * 0.7, r: 90, hue: 200 },
                { x: W * 0.3, y: H * 0.8, r: 70, hue: 260 }
            ];
            
            orbs.forEach((orb, i) => {
                const pulse = 1 + Math.sin(time * 0.001 + i) * 0.2;
                const gradient = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.r * pulse);
                gradient.addColorStop(0, `hsla(${orb.hue}, 60%, 40%, 0.1)`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, orb.r * pulse, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.globalCompositeOperation = 'source-over';
        }
        
        function animate(time) {
            const dpr = window.devicePixelRatio || 1;
            const vpw = window.innerWidth;
            const vph = window.innerHeight;
            
            ctx.setTransform((vpw / W) * dpr, 0, 0, (vph / H) * dpr, 0, 0);
            
            drawBackground();
            drawBokeh(time);
            
            plankton.forEach(p => {
                p.update();
                p.draw(ctx);
            });
            
            jellyfish.forEach(jelly => {
                jelly.update(time);
                jelly.draw(ctx, time);
            });
            
            requestAnimationFrame(animate);
        }
        
        init();
    </script>
</body>
</html>
