<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glowing Jellyfish</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

const jellyfish = [];
const COUNT = 5;

for (let i = 0; i < COUNT; i++) {
  jellyfish.push({
    x: 100 + Math.random()*340,
    y: 200 + Math.random()*500,
    size: 40 + Math.random()*40,
    phase: Math.random()*Math.PI*2,
    speed: 0.3 + Math.random()*0.4,
    hue: 200 + Math.random()*100
  });
}

const particles = [];
for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random()*W,
    y: Math.random()*H,
    vy: 0.2 + Math.random()*0.5,
    size: Math.random()*2
  });
}

let t = 0;

function update() {
  t += 0.02;

  jellyfish.forEach(j => {
    j.phase += 0.05;
    j.y += Math.sin(j.phase) * 0.5 - j.speed;
    j.x += Math.sin(t + j.phase) * 0.3;

    if (j.y < -100) j.y = H + 100;
  });

  particles.forEach(p => {
    p.y += p.vy;
    if (p.y > H) {
      p.y = -10;
      p.x = Math.random()*W;
    }
  });
}

function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#020615");
  g.addColorStop(1, "#000000");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = "rgba(200,220,255,0.3)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawJellyfish(j) {
  const pulse = 1 + Math.sin(j.phase) * 0.2;
  const r = j.size * pulse;

  const color = `hsl(${j.hue},100%,60%)`;

  const g = ctx.createRadialGradient(j.x, j.y, r*0.2, j.x, j.y, r);
  g.addColorStop(0, `hsla(${j.hue},100%,80%,0.8)`);
  g.addColorStop(1, `hsla(${j.hue},100%,40%,0)`);

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(j.x, j.y, r, Math.PI, 0);
  ctx.fill();

  ctx.shadowBlur = 20;
  ctx.shadowColor = color;

  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(j.x + i*6, j.y);

    for (let k = 0; k < 80; k++) {
      const tx = j.x + i*6 + Math.sin(k*0.1 + j.phase) * 6;
      const ty = j.y + k*2;
      ctx.lineTo(tx, ty);
    }

    ctx.strokeStyle = `hsla(${j.hue},100%,70%,0.6)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}

function draw() {
  drawBackground();
  drawParticles();

  jellyfish.forEach(j => drawJellyfish(j));
}

function animate() {
  update();

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw/W)*dpr, 0, 0, (vph/H)*dpr, 0, 0);

  draw();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
