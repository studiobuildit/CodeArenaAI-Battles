<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Typography: AI | Assemble & Float</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #03050a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, monospace;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 2px rgba(80, 140, 200, 0.2);
        }
    </style>
</head>
<body>
<canvas id="particleCanvas" width="1000" height="500"></canvas>

<script>
    (function(){
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 1000, H = 500;
        canvas.width = W;
        canvas.height = H;
        
        const PARTICLE_COUNT = 3800;
        const FORM_DURATION = 3200;
        const FLOAT_STRENGTH = 0.32;
        
        let particles = [];
        let animationStart = null;
        let phase = "scatter";
        let formProgress = 0;
        
        function generateTargetPositions() {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = W;
            offCanvas.height = H;
            const offCtx = offCanvas.getContext('2d');
            
            offCtx.fillStyle = '#000000';
            offCtx.fillRect(0, 0, W, H);
            
            offCtx.font = `bold 210px "Segoe UI", "Inter", system-ui, "Arial Black", sans-serif`;
            offCtx.textAlign = "center";
            offCtx.textBaseline = "middle";
            offCtx.fillStyle = '#ffffff';
            
            const centerX = W / 2;
            const centerY = H / 2;
            offCtx.fillText("AI", centerX, centerY);
            
            const step = 4;
            const positions = [];
            
            const imgData = offCtx.getImageData(0, 0, W, H);
            const data = imgData.data;
            
            for (let y = 0; y < H; y += step) {
                for (let x = 0; x < W; x += step) {
                    const idx = (y * W + x) * 4;
                    if (data[idx] > 200) {
                        let offX = (Math.random() - 0.5) * 2.2;
                        let offY = (Math.random() - 0.5) * 2.2;
                        positions.push({ x: x + offX, y: y + offY });
                    }
                }
            }
            
            const targetList = [];
            if (positions.length >= PARTICLE_COUNT) {
                const shuffled = [...positions];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    targetList.push(shuffled[i % shuffled.length]);
                }
            } else {
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const src = positions[i % positions.length];
                    const jitterX = (Math.random() - 0.5) * 3.5;
                    const jitterY = (Math.random() - 0.5) * 3.5;
                    targetList.push({ x: src.x + jitterX, y: src.y + jitterY });
                }
            }
            
            return targetList;
        }
        
        let targetPositions = [];
        
        class Particle {
            constructor(targetPos, index) {
                this.target = { x: targetPos.x, y: targetPos.y };
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.vx = (Math.random() - 0.5) * 3.2;
                this.vy = (Math.random() - 0.5) * 2.8;
                this.baseSize = 1.8 + Math.random() * 2.2;
                this.size = this.baseSize;
                this.glow = 0.5 + Math.random() * 0.8;
                this.phase = Math.random() * Math.PI * 2;
                this.floatOffsetX = 0;
                this.floatOffsetY = 0;
                this.floatSpeed = 0.005 + Math.random() * 0.012;
                this.floatRadius = 3 + Math.random() * 7;
            }
            
            update(progress, time) {
                if (phase === "scatter") {
                    this.vx *= 0.99;
                    this.vy *= 0.99;
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < -20) this.x = W + 20;
                    if (this.x > W + 20) this.x = -20;
                    if (this.y < -20) this.y = H + 20;
                    if (this.y > H + 20) this.y = -20;
                    this.size = this.baseSize * (0.7 + Math.sin(time * 5 + this.phase) * 0.2);
                } 
                else if (phase === "forming") {
                    const easeOutCubic = 1 - Math.pow(1 - progress, 3);
                    const t = easeOutCubic;
                    this.x = this.x + (this.target.x - this.x) * 0.045 * (1 + t * 1.2);
                    this.y = this.y + (this.target.y - this.y) * 0.045 * (1 + t * 1.2);
                    this.vx *= 0.94;
                    this.vy *= 0.94;
                    this.size = this.baseSize * (0.9 + Math.sin(time * 12 + this.phase) * 0.2);
                } 
                else if (phase === "float") {
                    const floatX = Math.sin(time * this.floatSpeed + this.phase) * this.floatRadius;
                    const floatY = Math.cos(time * this.floatSpeed * 0.7 + this.phase * 1.3) * (this.floatRadius * 0.8);
                    this.x = this.target.x + floatX;
                    this.y = this.target.y + floatY;
                    this.size = this.baseSize * (0.8 + Math.sin(time * 4 + this.phase) * 0.25);
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.85, 0, Math.PI * 2);
                const intensity = 0.75 + Math.sin(Date.now() * 0.003 + this.phase) * 0.2;
                ctx.fillStyle = `rgba(255, 245, 220, ${0.85 + this.glow * 0.15})`;
                ctx.shadowBlur = 11;
                ctx.shadowColor = `rgba(160, 210, 255, 0.9)`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x - 1, this.y - 1, this.size * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 245, 0.95)`;
                ctx.fill();
            }
        }
        
        function initParticles() {
            targetPositions = generateTargetPositions();
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT && i < targetPositions.length; i++) {
                particles.push(new Particle(targetPositions[i], i));
            }
            while (particles.length < PARTICLE_COUNT) {
                const dummyTarget = { x: W/2 + (Math.random() - 0.5)*100, y: H/2 + (Math.random() - 0.5)*80 };
                particles.push(new Particle(dummyTarget, particles.length));
            }
        }
        
        let startTimestamp = null;
        let formationStartTime = null;
        let floatStartTime = null;
        
        function updatePhase(now) {
            if (phase === "scatter") {
                if (now - startTimestamp > 1400) {
                    phase = "forming";
                    formationStartTime = now;
                    formProgress = 0;
                }
            } 
            else if (phase === "forming") {
                const elapsed = now - formationStartTime;
                let rawProgress = Math.min(1.0, elapsed / FORM_DURATION);
                formProgress = rawProgress < 0.5 
                    ? 4 * rawProgress * rawProgress * rawProgress
                    : 1 - Math.pow(-2 * rawProgress + 2, 3) / 2;
                
                if (rawProgress >= 1.0) {
                    phase = "float";
                    floatStartTime = now;
                }
            }
            else if (phase === "float") {
                formProgress = 1.0;
            }
        }
        
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#03060e');
            grad.addColorStop(0.7, '#010208');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            ctx.strokeStyle = "rgba(40, 70, 120, 0.12)";
            ctx.lineWidth = 0.5;
            for (let i = 0; i < W; i += 55) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, H);
                ctx.stroke();
            }
            for (let i = 0; i < H; i += 55) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(W, i);
                ctx.stroke();
            }
        }
        
        let animationFrameId = null;
        let lastTime = 0;
        
        function animate(now) {
            if (!startTimestamp) {
                startTimestamp = now;
                formationStartTime = now;
            }
            
            updatePhase(now);
            let globalTime = now * 0.002;
            
            for (let p of particles) {
                if (phase === "forming") {
                    const ease = Math.min(1.0, formProgress);
                    if (ease < 1.0) {
                        const t = ease;
                        p.x = p.x + (p.target.x - p.x) * 0.058 * (1 + t * 1.5);
                        p.y = p.y + (p.target.y - p.y) * 0.058 * (1 + t * 1.5);
                    } else {
                        p.x = p.x + (p.target.x - p.x) * 0.07;
                        p.y = p.y + (p.target.y - p.y) * 0.07;
                    }
                    p.size = p.baseSize * (0.85 + Math.sin(globalTime * 10 + p.phase) * 0.2);
                } 
                else if (phase === "scatter") {
                    p.vx *= 0.99;
                    p.vy *= 0.99;
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -30) p.x = W + 30;
                    if (p.x > W + 30) p.x = -30;
                    if (p.y < -30) p.y = H + 30;
                    if (p.y > H + 30) p.y = -30;
                    p.size = p.baseSize * (0.6 + Math.sin(globalTime * 7 + p.phase) * 0.25);
                } 
                else if (phase === "float") {
                    const floatX = Math.sin(globalTime * p.floatSpeed + p.phase) * p.floatRadius;
                    const floatY = Math.cos(globalTime * p.floatSpeed * 0.8 + p.phase * 1.2) * (p.floatRadius * 0.9);
                    p.x = p.target.x + floatX;
                    p.y = p.target.y + floatY;
                    p.size = p.baseSize * (0.8 + Math.sin(globalTime * 5 + p.phase) * 0.25);
                }
            }
            
            drawBackground();
            for (let p of particles) p.draw();
            
            if (phase === "float" || (phase === "forming" && formProgress > 0.85)) {
                ctx.shadowBlur = 0;
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = 'rgba(80, 140, 200, 0.03)';
                ctx.fillRect(0, 0, W, H);
                ctx.globalCompositeOperation = 'source-over';
            }
            
            if (phase !== "scatter") {
                for (let i = 0; i < 18; i++) {
                    if (Math.random() < 0.25) {
                        let randPart = particles[Math.floor(Math.random() * particles.length)];
                        ctx.beginPath();
                        ctx.arc(randPart.x + (Math.random() - 0.5)*5, randPart.y + (Math.random() - 0.5)*5, 1.2, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 220, 180, 0.5)`;
                        ctx.fill();
                    }
                }
            }
            
            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }
        
        function startAnimation() {
            initParticles();
            phase = "scatter";
            startTimestamp = null;
            formationStartTime = null;
            formProgress = 0;
            requestAnimationFrame((t) => {
                startTimestamp = t;
                animate(t);
            });
        }
        
        startAnimation();
    })();
</script>
</body>
</html>
