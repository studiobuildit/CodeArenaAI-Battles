<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Particle Assembly Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        const particles = [];
        const textCoords = [];
        
        const targetText = "AI";
        const fontSize = 250;
        const particleCount = 1500;
        const scatterRange = 300;
        const assembleSpeed = 0.015;
        const floatSpeed = 0.1;
        const particleRadius = 1.2;

        let animationState = "scatter";
        let frameCount = 0;

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            particles.length = 0;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * scatterRange,
                    vy: (Math.random() - 0.5) * scatterRange,
                    targetX: null,
                    targetY: null,
                    floatOffset: Math.random() * Math.PI * 2
                });
            }

            generateTextCoordinates();
            distributeParticles();
        }

        function generateTextCoordinates() {
            ctx.fillStyle = "white";
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(targetText, width / 2, height / 2);
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            
            textCoords.length = 0;
            for (let y = 0; y < height; y += 4) {
                for (let x = 0; x < width; x += 4) {
                    const alpha = data[(y * width + x) * 4 + 3];
                    if (alpha > 128) {
                        textCoords.push({ x, y });
                    }
                }
            }
            
            ctx.clearRect(0, 0, width, height);
        }

        function distributeParticles() {
            if (textCoords.length === 0) return;
            const shuffledCoords = textCoords.sort(() => Math.random() - 0.5);
            for (let i = 0; i < particles.length; i++) {
                const particle = particles[i];
                const targetCoord = shuffledCoords[i % shuffledCoords.length];
                particle.targetX = targetCoord.x;
                particle.targetY = targetCoord.y;
            }
        }

        function drawParticle(p) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, particleRadius, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.closePath();
        }

        function update() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = "white";
            
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, width, height);
            
            ctx.shadowBlur = 0; 
            ctx.shadowColor = "transparent";

            let allAssembled = true;
            
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];

                if (animationState === "scatter") {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.95;
                    p.vy *= 0.95;
                    
                    if (Math.abs(p.vx) < 0.1 && Math.abs(p.vy) < 0.1) {
                        if (frameCount > 60) {
                            animationState = "assemble";
                        }
                    }
                } else if (animationState === "assemble") {
                    const dx = p.targetX - p.x;
                    const dy = p.targetY - p.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > 0.5) {
                        p.x += dx * assembleSpeed;
                        p.y += dy * assembleSpeed;
                        allAssembled = false;
                    } else {
                        p.x = p.targetX;
                        p.y = p.targetY;
                    }
                } else if (animationState === "float") {
                    p.floatOffset += 0.01;
                    p.x = p.targetX + Math.sin(p.floatOffset) * floatSpeed;
                    p.y = p.targetY + Math.cos(p.floatOffset) * floatSpeed;
                }

                ctx.shadowBlur = 6;
                ctx.shadowColor = "rgba(255, 255, 255, 0.5)";
                drawParticle(p);
                ctx.shadowBlur = 0;
            }

            if (animationState === "assemble" && allAssembled) {
                animationState = "float";
            }
            
            frameCount++;
            requestAnimationFrame(update);
        }

        function handleResize() {
            init();
            animationState = "scatter";
            frameCount = 0;
        }

        window.addEventListener('resize', handleResize);

        init();
        update();
    </script>
</body>
</html>
