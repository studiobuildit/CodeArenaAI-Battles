<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendulum Wave</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
}
canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 540, H = 960;
const numPendulums = 15;
const baseLength = 180;
const lengthIncrement = 25;
const originY = 200;

let dpr = window.devicePixelRatio || 1;
let vpw = window.innerWidth;
let vph = window.innerHeight;

function resize() {
    dpr = window.devicePixelRatio || 1;
    vpw = window.innerWidth;
    vph = window.innerHeight;
    canvas.width = Math.floor(vpw * dpr);
    canvas.height = Math.floor(vph * dpr);
}

window.addEventListener('resize', resize);
resize();

const colors = [
    '#ff0000', '#ff4000', '#ff8000', '#ffbf00', '#ffff00',
    '#bfff00', '#80ff00', '#40ff00', '#00ff00', '#00ff40',
    '#00ff80', '#00ffbf', '#00ffff', '#00bfff', '#0080ff'
];

const pendulums = [];

class Pendulum {
    constructor(index) {
        this.index = index;
        this.length = baseLength + index * lengthIncrement;
        this.angle = Math.PI / 3;
        this.angularVelocity = 0;
        this.gravity = 0.5;
        this.damping = 0.9995;
        this.color = colors[index];
        this.trail = [];
        this.maxTrail = 40;
    }
    
    update() {
        const angularAcceleration = (-this.gravity / this.length) * Math.sin(this.angle);
        this.angularVelocity += angularAcceleration;
        this.angularVelocity *= this.damping;
        this.angle += this.angularVelocity;
        
        this.x = W/2 + Math.sin(this.angle) * this.length;
        this.y = originY + Math.cos(this.angle) * this.length;
        
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > this.maxTrail) this.trail.shift();
    }
    
    draw() {
        if (this.trail.length > 1) {
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < this.trail.length - 1; i++) {
                const alpha = (i / this.trail.length) * 0.5;
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(this.trail[i].x, this.trail[i].y);
                ctx.lineTo(this.trail[i+1].x, this.trail[i+1].y);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';
        }
        
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(W/2, originY);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();
        
        ctx.shadowBlur = 25;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 14, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.arc(this.x - 4, this.y - 4, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

for (let i = 0; i < numPendulums; i++) {
    pendulums.push(new Pendulum(i));
}

function drawCeiling() {
    const grad = ctx.createLinearGradient(W/2 - 250, 0, W/2 + 250, 0);
    grad.addColorStop(0, '#333');
    grad.addColorStop(0.5, '#666');
    grad.addColorStop(1, '#333');
    ctx.fillStyle = grad;
    ctx.fillRect(W/2 - 250, originY - 15, 500, 30);
    
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(W/2 - 250, originY - 5, 500, 10);
}

function animate() {
    ctx.setTransform((vpw/W) * dpr, 0, 0, (vph/H) * dpr, 0, 0);
    
    ctx.fillStyle = 'rgba(10,10,15,0.12)';
    ctx.fillRect(0, 0, W, H);
    
    drawCeiling();
    
    pendulums.forEach(p => {
        p.update();
        p.draw();
    });
    
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
