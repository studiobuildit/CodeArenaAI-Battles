<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pendulum Wave 9:16</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;

  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

const COUNT = 15;
const pendulums = [];

function hsl(i) {
  return `hsl(${i * (360 / COUNT)}, 100%, 60%)`;
}

const BASE_LENGTH = 180;
const SPACING = 28;
const CENTER_X = W / 2;
const TOP = 120;

for (let i = 0; i < COUNT; i++) {
  const length = BASE_LENGTH + i * 18;

  pendulums.push({
    length,
    phase: i * 0.15,
    color: hsl(i)
  });
}

let t = 0;

function update() {
  t += 0.016;
}

function draw() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw / W) * dpr, 0, 0, (vph / H) * dpr, 0, 0);

  const g = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 600);
  g.addColorStop(0, "rgba(0,255,150,0.05)");
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  pendulums.forEach((p, i) => {
    const x0 = CENTER_X + (i - COUNT/2) * SPACING;
    const y0 = TOP;

    const omega = 1.5 + i * 0.03;
    const angle = Math.sin(t * omega + p.phase) * 0.6;

    const x = x0 + Math.sin(angle) * p.length;
    const y = y0 + Math.cos(angle) * p.length;

    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x, y);
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = p.color;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function animate() {
  update();
  draw();
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
