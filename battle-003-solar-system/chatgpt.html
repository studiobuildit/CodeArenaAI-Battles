<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>400x400 Solar System</title>
<style>
body{
  margin:0;
  background:#000;
  width:100vw;
  height:100vh;
  overflow:hidden;
}
canvas{
  display:block;
  width:100vw;
  height:100vh;
}
</style>
</head>
<body>
<canvas id="c" width="400" height="400"></canvas>
<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

const W=400, H=400;
const cx=W/2, cy=H/2;
const base=170;
let dpr=1;
let viewW=0, viewH=0;

function resize(){
  dpr=Math.max(1, window.devicePixelRatio || 1);
  viewW=window.innerWidth;
  viewH=window.innerHeight;
  canvas.width=Math.max(1, Math.floor(viewW*dpr));
  canvas.height=Math.max(1, Math.floor(viewH*dpr));
}
resize();
window.addEventListener("resize", resize);

// stars
const stars=Array.from({length:120},()=>({
  x:Math.random()*W,
  y:Math.random()*H,
  r:Math.random()*1.2,
  phase:Math.random()*Math.PI*2
}));

// planets
const planets=[
 {d:0.15,s:0.03,size:2,color:"#aaa"},
 {d:0.22,s:0.025,size:3,color:"#f5c542"},
 {d:0.30,s:0.020,size:4,color:"#3fa9f5"},
 {d:0.38,s:0.017,size:3,color:"#f54e42"},
 {d:0.50,s:0.013,size:6,color:"#f5a142"},
 {d:0.62,s:0.010,size:5,color:"#d9c27f"},
 {d:0.75,s:0.008,size:5,color:"#42d1f5"},
 {d:0.88,s:0.006,size:5,color:"#6f42f5"}
];

let t=0;

function draw(){
  const sx=viewW/W;
  const sy=viewH/H;
  ctx.setTransform(sx*dpr,0,0,sy*dpr,0,0);
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,W,H);

  // stars
  stars.forEach(s=>{
    s.phase+=0.03;
    const tw=(Math.sin(s.phase)+1)/2;
    ctx.fillStyle=`rgba(255,255,255,${0.3+tw*0.7})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r+tw*0.6,0,Math.PI*2);
    ctx.fill();
  });

  // sun
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,base*0.15);
  g.addColorStop(0,"#fff8a6");
  g.addColorStop(0.4,"#ffcc33");
  g.addColorStop(1,"#ff6600");

  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(cx,cy,base*0.08,0,Math.PI*2);
  ctx.fill();

  // planets
  planets.forEach(p=>{
    const r=base*p.d;

    // orbit
    ctx.strokeStyle="rgba(255,255,255,0.05)";
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke();

    const angle=t*p.s;
    const x=cx+Math.cos(angle)*r;
    const y=cy+Math.sin(angle)*r;

    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  t+=1;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
