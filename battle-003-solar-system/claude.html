<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100vw;height:100vh;overflow:hidden;background:#04050c}
  canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// --- Canvas Setup ---
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W, H, dpr, CX, CY, U;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  cv.width  = W * dpr;
  cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CX = W / 2;
  CY = H * 0.5;
  U  = Math.min(W, H);
}
resize();
window.addEventListener('resize', resize);

// --- Helpers ---
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const lerp = (a, b, t) => a + (b - a) * t;

function hexShift(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, Math.max(0, r + amt));
  g = Math.min(255, Math.max(0, g + amt));
  b = Math.min(255, Math.max(0, b + amt));
  return `rgb(${r},${g},${b})`;
}

function maxOrbitR() {
  const marginX = W * 0.09;
  const marginTop = H * 0.09;
  const marginBot = H * 0.09;
  const fitW = (W - marginX * 2) / 2;
  const fitUp = (CY - marginTop);
  const fitDn = (H - marginBot - CY);
  const fitH = Math.min(fitUp, fitDn) / 0.40;
  return Math.min(fitW, fitH);
}

// --- Stars ---
const STARS = 220;
const stars = Array.from({length: STARS}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.2 + 0.2,
  phase: Math.random() * TAU,
  speed: 0.6 + Math.random() * 2,
  warm: Math.random() < 0.12,
}));

function drawStars(t) {
  const sc = U / 1000;
  stars.forEach(s => {
    const a = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed));
    const v = Math.floor(170 + 80 * a);
    cx.fillStyle = s.warm
      ? `rgba(${v},${v - 30},${v - 70},${a * 0.9})`
      : `rgba(${v - 10},${v},${Math.min(255, v + 12)},${a * 0.85})`;
    cx.beginPath();
    cx.arc(s.x * W, s.y * H, s.r * sc, 0, TAU);
    cx.fill();
  });
}

// --- Nebula wisps ---
const nebulae = [
  {x:.22, y:.18, rx:.10, ry:.07, hue:240, a:.015},
  {x:.78, y:.30, rx:.08, ry:.10, hue:300, a:.012},
  {x:.50, y:.82, rx:.14, ry:.06, hue:210, a:.010},
];
function drawNebulae() {
  nebulae.forEach(n => {
    const g = cx.createRadialGradient(n.x*W, n.y*H, 0, n.x*W, n.y*H, n.rx*U);
    g.addColorStop(0, `hsla(${n.hue},45%,28%,${n.a*1.6})`);
    g.addColorStop(1, `hsla(${n.hue},30%,12%,0)`);
    cx.fillStyle = g;
    cx.beginPath();
    cx.ellipse(n.x*W, n.y*H, n.rx*U, n.ry*U, 0, 0, TAU);
    cx.fill();
  });
}

// --- Sun ---
function drawSun(t) {
  const base = U * 0.032;
  const pulse = 1 + 0.035 * Math.sin(t * 1.8) + 0.02 * Math.sin(t * 3.3);
  const r = base * pulse;

  for (let i = 3; i >= 0; i--) {
    const cr = r * (2.2 + i * 1.1);
    const g = cx.createRadialGradient(CX, CY, r * 0.3, CX, CY, cr);
    const a = [0.018, 0.013, 0.009, 0.005][i];
    g.addColorStop(0, `rgba(255,200,80,${a * 2})`);
    g.addColorStop(0.4, `rgba(255,150,40,${a})`);
    g.addColorStop(1, 'rgba(255,90,15,0)');
    cx.fillStyle = g;
    cx.beginPath(); cx.arc(CX, CY, cr, 0, TAU); cx.fill();
  }

  const ig = cx.createRadialGradient(CX, CY, 0, CX, CY, r * 2);
  ig.addColorStop(0, 'rgba(255,245,210,0.45)');
  ig.addColorStop(0.25,'rgba(255,200,100,0.25)');
  ig.addColorStop(0.6, 'rgba(255,130,35,0.08)');
  ig.addColorStop(1,   'rgba(255,70,10,0)');
  cx.fillStyle = ig;
  cx.beginPath(); cx.arc(CX, CY, r * 2, 0, TAU); cx.fill();

  const bg = cx.createRadialGradient(CX - r * .25, CY - r * .25, r * .08, CX, CY, r);
  bg.addColorStop(0,  '#fffce8');
  bg.addColorStop(0.3,'#ffe46a');
  bg.addColorStop(0.7,'#ffb428');
  bg.addColorStop(1,  '#e07018');
  cx.fillStyle = bg;
  cx.beginPath(); cx.arc(CX, CY, r, 0, TAU); cx.fill();
}

// --- Planets ---
const planets = [
  { name:'Mercury', dist:.14,  sz:.0055, period:3.8,  ph:1.2, c:'#b5a89a', c2:'#8a7d6f' },
  { name:'Venus',   dist:.22,  sz:.008,  period:6.5,  ph:4.1, c:'#e8c87a', c2:'#c4943a' },
  { name:'Earth',   dist:.31,  sz:.009,  period:10,   ph:0,   c:'#4a9edb', c2:'#2d6e45',
    moon:{ d:.018, sz:.003, per:2.4, c:'#aab4be' }},
  { name:'Mars',    dist:.40,  sz:.007,  period:14,   ph:2.8, c:'#d46a4a', c2:'#a04028' },
  { name:'Jupiter', dist:.54,  sz:.020,  period:26,   ph:5.0, c:'#d4a96a', c2:'#b87840', bands:true,
    moons:[{d:.028,sz:.0035,per:3,c:'#c8b894'},{d:.035,sz:.003,per:4.5,c:'#b0a880'}]},
  { name:'Saturn',  dist:.67,  sz:.017,  period:38,   ph:3.3, c:'#e0c880', c2:'#b89850', ring:true,
    moon:{ d:.026, sz:.003, per:3.8, c:'#d0c0a0' }},
  { name:'Uranus',  dist:.80,  sz:.013,  period:52,   ph:1.7, c:'#7accc8', c2:'#4a9a98', ringThin:true },
  { name:'Neptune', dist:.92,  sz:.012,  period:68,   ph:4.5, c:'#4466cc', c2:'#2a3a88' },
];

const SQUASH = 0.40;

function drawOrbit(dist) {
  const R = maxOrbitR();
  const rx = dist * R;
  const ry = rx * SQUASH;
  cx.strokeStyle = 'rgba(50,58,90,0.14)';
  cx.lineWidth = 0.6;
  cx.setLineDash([2, 5]);
  cx.beginPath();
  cx.ellipse(CX, CY, rx, ry, 0, 0, TAU);
  cx.stroke();
  cx.setLineDash([]);
}

function drawRing(px, py, pr, p, dim) {
  cx.save();
  cx.globalAlpha = dim * 0.65;
  const mid = p.ringThin ? pr * 1.5 : pr * 1.7;
  cx.strokeStyle = p.ringThin ? 'rgba(120,205,200,0.40)' : 'rgba(210,190,140,0.45)';
  cx.lineWidth = p.ringThin ? Math.max(1, pr * 0.14) : Math.max(1.5, pr * 0.32);
  cx.beginPath();
  cx.ellipse(px, py, mid, mid * 0.24, 0, 0, TAU);
  cx.stroke();
  cx.globalAlpha = 1;
  cx.restore();
}

function drawPlanet(p, t) {
  const R = maxOrbitR();
  const angle = p.ph + (t / p.period) * TAU;
  const rx = p.dist * R;
  const ry = rx * SQUASH;
  const px = CX + Math.cos(angle) * rx;
  const py = CY + Math.sin(angle) * ry;
  const pr = p.sz * U;

  const depth = Math.sin(angle);
  const dim = 0.72 + 0.28 * (0.5 + 0.5 * Math.cos(angle));

  const gl = cx.createRadialGradient(px, py, pr * 0.3, px, py, pr * 3.5);
  gl.addColorStop(0, p.c + '16');
  gl.addColorStop(1, p.c + '00');
  cx.fillStyle = gl;
  cx.beginPath(); cx.arc(px, py, pr * 3.5, 0, TAU); cx.fill();

  if ((p.ring || p.ringThin) && depth > 0) drawRing(px, py, pr, p, dim);

  cx.save();
  cx.globalAlpha = dim;
  const bg = cx.createRadialGradient(px - pr * .3, py - pr * .3, pr * .08, px, py, pr);
  bg.addColorStop(0, hexShift(p.c, 35));
  bg.addColorStop(0.55, p.c);
  bg.addColorStop(1, p.c2);
  cx.fillStyle = bg;
  cx.beginPath(); cx.arc(px, py, pr, 0, TAU); cx.fill();
  cx.globalAlpha = 1;
  cx.restore();

  if ((p.ring || p.ringThin) && depth <= 0) drawRing(px, py, pr, p, dim);
}

// --- Asteroid Belt ---
const AST = 80;
const asteroids = Array.from({length: AST}, () => ({
  angle: Math.random() * TAU,
  dist: 0.46 + Math.random() * 0.06,
  speed: 0.012 + Math.random() * 0.008,
  sz: 0.3 + Math.random() * 0.6,
  a: 0.12 + Math.random() * 0.28,
}));

function drawAsteroids(t) {
  const R = maxOrbitR();
  const sc = U / 1100;
  asteroids.forEach(a => {
    const ang = a.angle + t * a.speed;
    const rx = a.dist * R;
    const ry = rx * SQUASH;
    cx.fillStyle = `rgba(140,132,124,${a.a})`;
    cx.beginPath();
    cx.arc(CX + Math.cos(ang) * rx, CY + Math.sin(ang) * ry, a.sz * sc, 0, TAU);
    cx.fill();
  });
}

let t0 = null;

function frame(ts) {
  if (!t0) t0 = ts;
  const t = (ts - t0) * 0.001;

  cx.fillStyle = '#04050c';
  cx.fillRect(0, 0, W, H);

  const cg = cx.createRadialGradient(CX, CY, 0, CX, CY, U * 0.45);
  cg.addColorStop(0, 'rgba(22,16,36,0.35)');
  cg.addColorStop(1, 'rgba(4,5,12,0)');
  cx.fillStyle = cg;
  cx.fillRect(0, 0, W, H);

  drawNebulae();
  drawStars(t);

  planets.forEach(p => drawOrbit(p.dist));

  const sorted = planets.map(p => {
    const angle = p.ph + (t / p.period) * TAU;
    return { p, depth: Math.sin(angle) };
  }).sort((a, b) => b.depth - a.depth);

  const behind = sorted.filter(s => s.depth > 0);
  const front  = sorted.filter(s => s.depth <= 0);

  behind.forEach(s => drawPlanet(s.p, t));
  drawAsteroids(t);
  drawSun(t);
  front.forEach(s => drawPlanet(s.p, t));

  const vg = cx.createRadialGradient(CX, CY, U * 0.18, CX, CY, Math.hypot(W, H) * 0.52);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  cx.fillStyle = vg;
  cx.fillRect(0, 0, W, H);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
