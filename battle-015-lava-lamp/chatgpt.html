<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lava Lamp</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

const blobs = [];
const COUNT = 14;

for (let i = 0; i < COUNT; i++) {
  blobs.push({
    x: W/2 + (Math.random()-0.5)*120,
    y: 200 + Math.random()*500,
    r: 40 + Math.random()*50,
    vy: (Math.random()-0.5)*0.6,
    phase: Math.random()*Math.PI*2,
    speed: 0.5 + Math.random()*0.5
  });
}

let t = 0;

function update() {
  t += 0.016;

  blobs.forEach(b => {
    b.vy += Math.sin(t + b.phase) * 0.02;

    b.y += b.vy;

    b.x += Math.sin(t * b.speed + b.phase) * 0.8;

    if (b.y < 160) b.vy += 0.08;
    if (b.y > H-160) b.vy -= 0.08;
  });
}

function drawBlobs() {
  ctx.globalCompositeOperation = "lighter";

  blobs.forEach(b => {
    const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    g.addColorStop(0, "rgba(255,200,50,0.9)");
    g.addColorStop(0.4, "rgba(255,120,0,0.6)");
    g.addColorStop(1, "rgba(255,0,0,0)");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.globalCompositeOperation = "source-over";
}

function drawGlass() {
  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 4;

  ctx.beginPath();
  ctx.roundRect(W/2 - 160, 120, 320, H-240, 80);
  ctx.stroke();

  const g = ctx.createLinearGradient(W/2-160,0,W/2+160,0);
  g.addColorStop(0,"rgba(255,255,255,0.05)");
  g.addColorStop(0.5,"rgba(255,255,255,0.15)");
  g.addColorStop(1,"rgba(255,255,255,0.05)");
  ctx.fillStyle = g;
  ctx.fillRect(W/2 - 160, 120, 320, H-240);
}

function drawBase() {
  ctx.fillStyle = "#111";
  ctx.fillRect(W/2 - 180, H-120, 360, 60);

  ctx.fillStyle = "#222";
  ctx.fillRect(W/2 - 140, H-160, 280, 40);
}

function drawBackground() {
  const g = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 800);
  g.addColorStop(0, "#120000");
  g.addColorStop(1, "#000000");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function draw() {
  drawBackground();
  drawBlobs();
  drawGlass();
  drawBase();
}

function animate() {
  update();

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw/W)*dpr, 0, 0, (vph/H)*dpr, 0, 0);

  draw();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
