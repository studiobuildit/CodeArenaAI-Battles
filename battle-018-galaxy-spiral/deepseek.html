<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spiral Galaxy | Cosmic Rotation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>
<body>
<canvas id="galaxyCanvas"></canvas>

<script>
    (function(){
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 540;
        const H = 960;
        const CENTER_X = W / 2;
        const CENTER_Y = H / 2;
        
        const ARM_COUNT = 4;
        const STAR_COUNT = 6500;
        const DUST_COUNT = 1800;
        const CORE_RADIUS = 28;
        const MAX_RADIUS = Math.min(W, H) * 0.38;
        
        let galaxyRotation = 0;
        const ROTATION_SPEED = 0.0018;
        
        let stars = [];
        let dustParticles = [];
        let bgStars = [];
        const BG_STAR_COUNT = 900;
        let time = 0;
        
        class GalaxyStar {
            constructor() {
                this.reset();
            }
            reset() {
                this.radius = Math.pow(Math.random(), 1.2) * MAX_RADIUS;
                const armIndex = Math.floor(Math.random() * ARM_COUNT);
                const armAngleOffset = (armIndex / ARM_COUNT) * Math.PI * 2;
                const spiralFactor = 4.2;
                let angle = armAngleOffset + spiralFactor * Math.log(this.radius + 12);
                const armWidth = 0.55 + Math.random() * 0.5;
                angle += (Math.random() - 0.5) * armWidth;
                this.angle = angle;
                this.initialAngle = angle;
                this.size = 0.8 + Math.random() * 2.2;
                this.brightness = 0.3 + Math.random() * 0.7;
                this.twinkleSpeed = 0.5 + Math.random() * 1.5;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.hue = 45 + Math.random() * 25;
            }
            
            updatePosition(rotation) {
                this.currentAngle = this.initialAngle + rotation;
                this.x = CENTER_X + Math.cos(this.currentAngle) * this.radius;
                this.y = CENTER_Y + Math.sin(this.currentAngle) * this.radius;
            }
            
            draw() {
                const twinkle = 0.7 + 0.3 * Math.sin(time * this.twinkleSpeed + this.twinklePhase);
                const alpha = Math.min(0.95, this.brightness * twinkle * 0.9);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * (0.7 + twinkle * 0.3), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 85%, 65%, ${alpha})`;
                ctx.fill();
                ctx.shadowBlur = 3;
                ctx.shadowColor = `hsla(${this.hue}, 90%, 60%, 0.5)`;
            }
        }
        
        class DustParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.radius = Math.pow(Math.random(), 1.1) * MAX_RADIUS;
                const armIndex = Math.floor(Math.random() * ARM_COUNT);
                const armAngleOffset = (armIndex / ARM_COUNT) * Math.PI * 2;
                const spiralFactor = 4.2;
                let angle = armAngleOffset + spiralFactor * Math.log(this.radius + 12);
                angle += (Math.random() - 0.5) * 1.2;
                this.initialAngle = angle;
                this.size = 1.5 + Math.random() * 3.5;
                this.opacity = 0.2 + Math.random() * 0.4;
            }
            updatePosition(rotation) {
                this.currentAngle = this.initialAngle + rotation;
                this.x = CENTER_X + Math.cos(this.currentAngle) * this.radius;
                this.y = CENTER_Y + Math.sin(this.currentAngle) * this.radius;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(25, 20, 30, ${this.opacity * 0.6})`;
                ctx.fill();
            }
        }
        
        class BackgroundStar {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = 0.6 + Math.random() * 1.5;
                this.alpha = 0.2 + Math.random() * 0.5;
                this.twinkleSpeed = 0.3 + Math.random() * 1.2;
                this.phase = Math.random() * Math.PI * 2;
            }
            draw() {
                const twinkle = 0.6 + 0.4 * Math.sin(time * this.twinkleSpeed + this.phase);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 235, 190, ${this.alpha * twinkle * 0.7})`;
                ctx.fill();
            }
        }
        
        function initGalaxy() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) stars.push(new GalaxyStar());
            dustParticles = [];
            for (let i = 0; i < DUST_COUNT; i++) dustParticles.push(new DustParticle());
            bgStars = [];
            for (let i = 0; i < BG_STAR_COUNT; i++) bgStars.push(new BackgroundStar());
        }
        
        function updateGalaxy() {
            for (let star of stars) star.updatePosition(galaxyRotation);
            for (let dust of dustParticles) dust.updatePosition(galaxyRotation);
        }
        
        function drawCore() {
            const coreGrad = ctx.createRadialGradient(CENTER_X, CENTER_Y, 5, CENTER_X, CENTER_Y, CORE_RADIUS + 18);
            coreGrad.addColorStop(0, `rgba(255, 220, 140, 0.95)`);
            coreGrad.addColorStop(0.3, `rgba(255, 180, 80, 0.8)`);
            coreGrad.addColorStop(0.6, `rgba(140, 80, 40, 0.5)`);
            coreGrad.addColorStop(1, `rgba(30, 20, 15, 0)`);
            ctx.fillStyle = coreGrad;
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, CORE_RADIUS + 25, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, 12, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 235, 170, 0.9)`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(CENTER_X - 2, CENTER_Y - 2, 5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 210, 1)`;
            ctx.fill();
            
            const haloGrad = ctx.createRadialGradient(CENTER_X, CENTER_Y, 20, CENTER_X, CENTER_Y, 70);
            haloGrad.addColorStop(0, `rgba(255, 200, 100, 0.4)`);
            haloGrad.addColorStop(1, `rgba(80, 50, 30, 0)`);
            ctx.fillStyle = haloGrad;
            ctx.fillRect(0, 0, W, H);
        }
        
        function drawArmGlow() {
            for (let arm = 0; arm < ARM_COUNT; arm++) {
                const armAngleBase = (arm / ARM_COUNT) * Math.PI * 2 + galaxyRotation;
                for (let r = 30; r < MAX_RADIUS; r += 18) {
                    const spiralOffset = 4.2 * Math.log(r + 12);
                    const angle = armAngleBase + spiralOffset;
                    const x = CENTER_X + Math.cos(angle) * r;
                    const y = CENTER_Y + Math.sin(angle) * r;
                    const intensity = 1 - (r / MAX_RADIUS) * 0.7;
                    ctx.beginPath();
                    ctx.ellipse(x, y, 12, 5, angle, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(100, 70, 45, ${0.06 * intensity})`;
                    ctx.fill();
                }
            }
        }
        
        let haloStars = [];
        const HALO_COUNT = 800;
        class HaloStar {
            constructor() {
                this.radius = MAX_RADIUS + Math.random() * 45;
                this.angle = Math.random() * Math.PI * 2;
                this.size = 0.7 + Math.random() * 1.3;
                this.alpha = 0.15 + Math.random() * 0.3;
            }
            draw(rotation) {
                const finalAngle = this.angle + rotation * 0.3;
                const x = CENTER_X + Math.cos(finalAngle) * this.radius;
                const y = CENTER_Y + Math.sin(finalAngle) * this.radius;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 170, 140, ${this.alpha * 0.5})`;
                ctx.fill();
            }
        }
        
        function initHalo() {
            for (let i = 0; i < HALO_COUNT; i++) haloStars.push(new HaloStar());
        }
        
        function drawDeepSpace() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, "#02040c");
            grad.addColorStop(0.5, "#03050f");
            grad.addColorStop(1, "#010208");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            const nebula = ctx.createRadialGradient(CENTER_X - 50, CENTER_Y - 30, 80, CENTER_X, CENTER_Y, 280);
            nebula.addColorStop(0, "rgba(40, 30, 60, 0.08)");
            nebula.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = nebula;
            ctx.fillRect(0, 0, W, H);
        }
        
        function drawStars() {
            for (let star of stars) star.draw();
            for (let halo of haloStars) halo.draw(galaxyRotation);
        }
        
        function drawBackgroundStars() {
            for (let bg of bgStars) bg.draw();
        }
        
        function drawDust() {
            for (let dust of dustParticles) dust.draw();
        }
        
        let dpr = window.devicePixelRatio || 1;
        let viewportW = window.innerWidth;
        let viewportH = window.innerHeight;
        
        function resizeCanvas() {
            viewportW = window.innerWidth;
            viewportH = window.innerHeight;
            canvas.width = viewportW * dpr;
            canvas.height = viewportH * dpr;
            canvas.style.width = `${viewportW}px`;
            canvas.style.height = `${viewportH}px`;
        }
        
        function applyTransform() {
            const scaleX = (viewportW * dpr) / W;
            const scaleY = (viewportH * dpr) / H;
            ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);
        }
        
        function animate() {
            time += 0.022;
            galaxyRotation += ROTATION_SPEED;
            if (galaxyRotation > Math.PI * 2) galaxyRotation -= Math.PI * 2;
            
            updateGalaxy();
            
            applyTransform();
            drawDeepSpace();
            drawBackgroundStars();
            drawArmGlow();
            drawDust();
            drawStars();
            drawCore();
            
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = "rgba(100, 80, 50, 0.02)";
            ctx.fillRect(0, 0, W, H);
            ctx.globalCompositeOperation = 'source-over';
            
            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            dpr = window.devicePixelRatio || 1;
            resizeCanvas();
            applyTransform();
        });
        
        initGalaxy();
        initHalo();
        resizeCanvas();
        applyTransform();
        animate();
    })();
</script>
</body>
</html>
