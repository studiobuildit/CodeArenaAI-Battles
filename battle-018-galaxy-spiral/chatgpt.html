<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spiral Galaxy</title>
<style>
  html, body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 540;
const H = 960;

let dpr = window.devicePixelRatio || 1;
let vpw = 0, vph = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  vpw = window.innerWidth;
  vph = window.innerHeight;
  canvas.width = vpw * dpr;
  canvas.height = vph * dpr;
}
window.addEventListener("resize", resize);
resize();

const CENTER_X = W / 2;
const CENTER_Y = H / 2;
const STAR_COUNT = 2500;
const ARMS = 4;
const MAX_RADIUS = 260;

const stars = [];

for (let i = 0; i < STAR_COUNT; i++) {
  const arm = i % ARMS;
  const radius = Math.pow(Math.random(), 0.6) * MAX_RADIUS;

  const angle = (radius * 0.045) + (arm * (Math.PI * 2 / ARMS));

  stars.push({
    radius,
    angle,
    armOffset: arm,
    size: Math.random() * 1.5 + 0.5,
    twinkle: Math.random() * Math.PI * 2
  });
}

let t = 0;

function drawBackground() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);
}

function drawSpaceStars() {
  for (let i = 0; i < 80; i++) {
    const x = (i * 137) % W;
    const y = (i * 251) % H;
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.fillRect(x, y, 1, 1);
  }
}

function drawGalaxy() {
  stars.forEach(s => {
    const a = s.angle + t;

    const spread = (Math.random() - 0.5) * 0.4;
    const x = CENTER_X + Math.cos(a + spread) * s.radius;
    const y = CENTER_Y + Math.sin(a + spread) * s.radius;

    const dustFactor = Math.sin(s.angle * 2 + s.radius * 0.02);
    if (dustFactor < -0.2) return;

    s.twinkle += 0.05;
    const alpha = 0.5 + Math.sin(s.twinkle) * 0.5;

    const tColor = s.radius / MAX_RADIUS;
    const r = 255;
    const g = 200 - tColor * 120;
    const b = 255 - tColor * 200;

    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawCore() {
  const g = ctx.createRadialGradient(
    CENTER_X, CENTER_Y, 0,
    CENTER_X, CENTER_Y, 120
  );
  g.addColorStop(0, "rgba(255,255,255,1)");
  g.addColorStop(0.3, "rgba(255,200,120,0.8)");
  g.addColorStop(1, "rgba(0,0,0,0)");

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(CENTER_X, CENTER_Y, 120, 0, Math.PI * 2);
  ctx.fill();
}

function draw() {
  drawBackground();
  drawSpaceStars();
  drawGalaxy();
  drawCore();
}

function animate() {
  t += 0.002;

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform((vpw/W)*dpr, 0, 0, (vph/H)*dpr, 0, 0);

  draw();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
