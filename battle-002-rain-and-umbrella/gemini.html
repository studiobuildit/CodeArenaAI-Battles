<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainy Day Animation</title>
    <style>
        * { margin: 0; box-sizing: border-box; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; background: #0a0a12; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height, dpr;
let particles = [];
let ripples = [];
const RAIN_COUNT = 120;

// Umbrella state
const umbrella = {
    x: 0,
    y: 0,
    radius: 100,
    angle: 0,
    targetAngle: 0
};

function init() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.max(1, Math.floor(width * dpr));
    canvas.height = Math.max(1, Math.floor(height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    umbrella.x = width / 2;
    umbrella.y = height * 0.65;
}

class Raindrop {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * -height;
        this.speed = 10 + Math.random() * 10;
        this.len = 10 + Math.random() * 15;
        this.bouncing = false;
        this.vx = 0;
        this.vy = this.speed;
    }

    update() {
        // Wind influence
        const wind = Math.sin(Date.now() * 0.001) * 2;
        this.x += wind;
        this.y += this.vy;

        // Collision with Umbrella (Simplified Circular Arc)
        const dx = this.x - umbrella.x;
        const dy = this.y - umbrella.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        // Check if hit the top of the umbrella
        if (distance < umbrella.radius && this.y < umbrella.y && !this.bouncing) {
            this.bouncing = true;
            // Bounce or slide off
            this.vx = dx * 0.1 + wind;
            this.vy = -2;
        }

        if (this.bouncing) {
            this.vy += 0.5; // Gravity on bounce
            this.x += this.vx;
        }

        // Hit ground
        if (this.y > height - 20) {
            ripples.push(new Ripple(this.x, height - 20));
            this.reset();
        }

        // Out of bounds
        if (this.x < -50 || this.x > width + 50) this.reset();
    }

    draw() {
        ctx.strokeStyle = 'rgba(174, 194, 224, 0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + (Math.sin(Date.now() * 0.001) * 2), this.y + this.len);
        ctx.stroke();
    }
}

class Ripple {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.r = 1;
        this.opacity = 0.5;
    }

    update() {
        this.r += 0.8;
        this.opacity -= 0.02;
    }

    draw() {
        ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.r, this.r * 0.3, 0, 0, Math.PI * 2);
        ctx.stroke();
    }
}

function drawUmbrella() {
    // Soft swaying logic
    umbrella.targetAngle = Math.sin(Date.now() * 0.0015) * 0.15;
    umbrella.angle += (umbrella.targetAngle - umbrella.angle) * 0.05;

    ctx.save();
    ctx.translate(umbrella.x, umbrella.y);
    ctx.rotate(umbrella.angle);

    // Handle
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 120);
    ctx.stroke();

    // Fabric (The Dome)
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc(0, 0, umbrella.radius, Math.PI, 0);
    ctx.fill();

    // Highlights
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, umbrella.radius - 5, Math.PI + 0.3, -0.3);
    ctx.stroke();

    ctx.restore();
}

function animate() {
    ctx.fillStyle = 'rgba(10, 10, 18, 0.3)'; // Trail effect
    ctx.fillRect(0, 0, width, height);

    // Update and draw ripples
    ripples = ripples.filter(r => r.opacity > 0);
    ripples.forEach(r => {
        r.update();
        r.draw();
    });

    drawUmbrella();

    // Update and draw rain
    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

// Start
init();
for (let i = 0; i < RAIN_COUNT; i++) {
    particles.push(new Raindrop());
}
window.addEventListener('resize', init);
animate();
</script>
</body>
</html>
